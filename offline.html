<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#27ae60">
  <title>АРАБРУС — офлайн</title>
  <style>
    body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: #f8fafc; color: #1e293b; display: grid; place-items: center; min-height: 100vh; padding: 24px; }
    .card { max-width: 420px; width: 100%; background: #fff; border: 1px solid #e2e8f0; border-radius: 20px; padding: 24px; box-shadow: 0 8px 30px rgba(15,23,42,.08); text-align: center; }
    img { width: 72px; height: 72px; border-radius: 16px; box-shadow: 0 4px 12px rgba(39,174,96,.2); }
    h1 { margin: 16px 0 8px; color: #27ae60; font-size: 28px; }
    p { margin: 0 0 16px; line-height: 1.5; color: #475569; }
    button { border: none; border-radius: 12px; background: #27ae60; color: #fff; font-weight: 700; font-size: 16px; padding: 12px 16px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <img src="icon.png" alt="АРАБРУС">
    <h1>АРАБРУС</h1>
    <p>Офлайн-оболочка загружена. Словарь откроется даже без интернета, а вход и синхронизация вернутся, когда сеть появится.</p>
    <button onclick="location.href='./'">Открыть словарь</button>
  </div>
</body>
</html>
