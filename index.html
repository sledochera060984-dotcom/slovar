<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#27ae60">
    <title>Арабский Словарь Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f4f4f9; margin: 0; padding: 10px; }
        .container { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .user-info { text-align: center; font-size: 11px; color: #888; margin-bottom: 10px; }
        .tabs { display: flex; margin-bottom: 15px; border-radius: 8px; overflow: hidden; border: 1px solid #27ae60; }
        .tab { flex: 1; padding: 10px; text-align: center; background: white; color: #27ae60; border: none; cursor: pointer; }
        .tab.active { background: #27ae60; color: white; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .word-list { list-style: none; padding: 0; }
        .word-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .word-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .arabic { font-size: 22px; font-weight: bold; color: #27ae60; direction: rtl; }
        .russian { font-size: 15px; color: #444; flex: 1; padding-right: 10px; }
        .details { display: none; padding-top: 10px; font-size: 14px; color: #333; line-height: 1.4; border-top: 1px dashed #eee; margin-top: 5px; }
        .expanded .details { display: block; }
        .btn-row { display: flex; gap: 8px; margin-top: 10px; }
        .btn { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
        .btn.active { background: #fffdf0; border-color: #f39c12; color: #f39c12; }
        .google-btn { width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="userInfo" class="user-info">Загрузка...</div>
    <button id="authBtn" class="google-btn" onclick="toggleAuth()">Войти через Google</button>

    <div class="tabs">
        <button id="tabAll" class="tab active" onclick="setTab('all')">Словарь</button>
        <button id="tabFav" class="tab" onclick="setTab('fav')">Избранное</button>
    </div>

    <input type="text" id="searchInput" placeholder="Поиск (араб / рус)..." oninput="filterWords()">
    <div id="list" class="word-list"></div>
</div>

<script src="base.js"></script>

<script>
    // --- FIREBASE CONFIG (ВСТАВЬ СВОЙ!) ---
    const firebaseConfig = { 
        apiKey: "ТВОЙ_КЛЮЧ",
        authDomain: "ТВОЙ_ДОМЕН",
        projectId: "ТВОЙ_ID",
        storageBucket: "...",
        messagingSenderId: "...",
        appId: "..."
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    let currentUser = null;
    let savedFavorites = JSON.parse(localStorage.getItem('favs')) || [];
    let currentTab = 'all';
    let data = (typeof dictBase !== 'undefined') ? dictBase : [];

    // --- УМНЫЙ ПОИСК И СОРТИРОВКА ---
    function normalize(t) { return t ? t.toLowerCase().replace(/[\u064B-\u0652]/g, "").replace(/[أإآ]/g, "ا").replace(/ة/g, "ه").replace(/ى/g, "ي").trim() : ""; }

    function filterWords() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const normQuery = normalize(query);
        const list = document.getElementById('list');
        list.innerHTML = "";

        if (!query && currentTab === 'all') return;

        let filtered = data.filter(w => {
            if (currentTab === 'fav' && !savedFavorites.includes(w.ar)) return false;
            if (!query) return true;
            return w.ru.toLowerCase().includes(query) || normalize(w.ar).includes(normQuery);
        });

        // СОРТИРОВКА: точные совпадения выше всего
        filtered.sort((a, b) => {
            const normA = normalize(a.ar);
            const normB = normalize(b.ar);
            
            // Если запрос совпадает с арабским словом полностью
            if (normA === normQuery && normB !== normQuery) return -1;
            if (normB === normQuery && normA !== normQuery) return 1;
            
            // Если запрос — начало арабского слова
            if (normA.startsWith(normQuery) && !normB.startsWith(normQuery)) return -1;
            if (normB.startsWith(normQuery) && !normA.startsWith(normQuery)) return 1;

            return a.ru.length - b.ru.length; // Короткие переводы выше
        });

        filtered.slice(0, 50).forEach(w => {
            const isFav = savedFavorites.includes(w.ar);
            const item = document.createElement('div');
            item.className = 'word-item';
            item.innerHTML = `
                <div class="word-header" onclick="this.parentElement.classList.toggle('expanded')">
                    <div class="russian">${w.short_ru || w.ru.split(';')[0]}</div>
                    <div class="arabic">${w.ar}</div>
                </div>
                <div class="details">
                    <div>${w.ru}</div>
                    <div class="btn-row">
                        <button class="btn" onclick="speak('${w.ar}')">🔊 Слушать</button>
                        <button class="btn ${isFav?'active':''}" onclick="toggleFav('${w.ar}', this)">${isFav?'★':'☆'} Избранное</button>
                    </div>
                </div>`;
            list.appendChild(item);
        });
    }

    // --- ОСТАЛЬНАЯ ЛОГИКА ---
    function setTab(t) { currentTab = t; document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active')); event.target.classList.add('active'); filterWords(); }

    async function toggleFav(word, btn) {
        if (savedFavorites.includes(word)) savedFavorites = savedFavorites.filter(v => v !== word);
        else savedFavorites.push(word);
        btn.classList.toggle('active');
        btn.innerText = savedFavorites.includes(word) ? '★ Избранное' : '☆ Избранное';
        localStorage.setItem('favs', JSON.stringify(savedFavorites));
        if (currentUser) await db.collection('users').doc(currentUser.uid).set({favs: savedFavorites});
    }

    function speak(t) {
        const audio = new Audio(`https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=ar&client=gtx&q=${encodeURIComponent(t)}`);
        audio.play();
    }

    async function toggleAuth() {
        if (currentUser) auth.signOut();
        else await auth.signInWithPopup(provider);
    }

    auth.onAuthStateChanged(async (user) => {
        currentUser = user;
        document.getElementById('authBtn').innerText = user ? `Выйти (${user.displayName.split(' ')[0]})` : "Войти через Google";
        document.getElementById('userInfo').innerText = user ? `Облако АКТИВНО: ${user.email}` : "Войдите для синхронизации";
        if (user) {
            const doc = await db.collection('users').doc(user.uid).get();
            if (doc.exists) { savedFavorites = doc.data().favs || []; filterWords(); }
        }
    });

    // Регистрация офлайна
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
