<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#27ae60">
    <title>Арабский Словарь Sync</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 15px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 100%; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; font-size: 22px; margin-top: 0; margin-bottom: 5px; }
        .user-info { text-align: center; font-size: 12px; color: #777; margin-bottom: 15px; }
        .auth-bar { display: flex; justify-content: center; margin-bottom: 15px; }
        .google-btn { background: white; border: 1px solid #ddd; padding: 8px 15px; border-radius: 20px; font-size: 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        
        .tabs { display: flex; margin-bottom: 15px; border-radius: 8px; overflow: hidden; border: 1px solid #27ae60; }
        .tab { flex: 1; padding: 10px; text-align: center; background: white; color: #27ae60; border: none; font-size: 14px; cursor: pointer; }
        .tab.active { background: #27ae60; color: white; font-weight: bold; }

        input[type="text"] { width: 100%; padding: 14px; margin-bottom: 20px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        
        .word-list { list-style-type: none; padding: 0; margin: 0; }
        .word-item { border-bottom: 1px solid #f0f0f0; }
        .word-header { padding: 15px 0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .arabic-word { font-size: 24px; font-weight: bold; color: #27ae60; direction: rtl; }
        .short-translation { font-size: 16px; color: #555; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px; }

        .word-details { display: none; padding: 0 0 15px 0; border-top: 1px dashed #eee; padding-top: 15px; }
        .word-item.expanded .word-details { display: block; }
        .word-item.expanded .short-translation { white-space: normal; font-weight: bold; color: #2c3e50; }

        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .action-btn { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ddd; background: white; font-size: 14px; font-weight: bold; cursor: pointer; }
        .fav-btn.active { color: #f39c12; border-color: #f39c12; background: #fffdf5; }

        .settings-panel { display: none; text-align: center; padding: 20px 0; }
        .db-status { font-weight: bold; color: #27ae60; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📖 Словарь</h1>
    <div id="userInfo" class="user-info">Вход не выполнен</div>
    <div class="auth-bar">
        <button id="authBtn" class="google-btn" onclick="toggleAuth()">🌐 Войти через Google</button>
    </div>

    <div class="tabs">
        <button id="tabAll" class="tab active" onclick="setTab('all')">Словарь</button>
        <button id="tabFav" class="tab" onclick="setTab('fav')">Избранное</button>
        <button id="tabSettings" class="tab" onclick="setTab('settings')">⚙️ Инфо</button>
    </div>

    <div id="mainContent">
        <input type="text" id="searchInput" placeholder="Поиск (рус / араб)..." onkeyup="filterWords()">
        <ul id="dictionaryList" class="word-list"></ul>
    </div>

    <div id="settingsPanel" class="settings-panel">
        <div id="dbStatus" class="db-status">⏳ Подключение базы...</div>
        <button class="action-btn" style="color: red; border-color: red;" onclick="clearFavorites()">🗑 Очистить избранное</button>
    </div>
</div>

<audio id="globalAudioPlayer" style="display:none;"></audio>

<script>
    // --- ТВОИ ДАННЫЕ FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyDDwIWq8VCk-ivjjCJJZoio-wGD2gU1rtE",
        authDomain: "arabus-dict-96c12.firebaseapp.com",
        projectId: "arabus-dict-96c12",
        storageBucket: "arabus-dict-96c12.firebasestorage.app",
        messagingSenderId: "814248156149",
        appId: "1:814248156149:web:e2acce197a00eb3ceb5ebc"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    let currentUser = null;
    let savedFavorites = [];
    let dictionaryData = [];
    let currentTab = 'all';

    // 1. Загрузка ОГРОМНОЙ базы (base.js) через fetch
    async function loadDatabase() {
        const statusEl = document.getElementById('dbStatus');
        try {
            const response = await fetch('base.js');
            if (!response.ok) throw new Error();
            const text = await response.text();
            
            // Очищаем текст от JS-обертки "const dictBase =" если она есть
            const jsonStr = text.replace(/^const dictBase\s*=\s*/, '').replace(/;$/, '').trim();
            dictionaryData = JSON.parse(jsonStr);
            
            statusEl.innerHTML = `✅ База: <b>${dictionaryData.length} слов</b>`;
            filterWords();
        } catch (e) {
            statusEl.innerHTML = "❌ Ошибка загрузки базы base.js";
            console.error(e);
        }
    }

    // 2. Управление входом Google
    auth.onAuthStateChanged(async (user) => {
        const authBtn = document.getElementById('authBtn');
        const userInfo = document.getElementById('userInfo');
        if (user) {
            currentUser = user;
            authBtn.innerHTML = "Выйти (" + user.displayName.split(' ')[0] + ")";
            userInfo.innerHTML = "Облако: " + user.email;
            await loadFavoritesFromCloud();
        } else {
            currentUser = null;
            authBtn.innerHTML = "🌐 Войти через Google";
            userInfo.innerHTML = "Режим без синхронизации";
            savedFavorites = JSON.parse(localStorage.getItem('arabic_favorites')) || [];
            filterWords();
        }
    });

    async function toggleAuth() {
        if (currentUser) { auth.signOut(); } 
        else { await auth.signInWithPopup(provider).catch(e => alert("Ошибка входа: " + e.message)); }
    }

    // 3. Синхронизация Избранного
    async function loadFavoritesFromCloud() {
        if (!currentUser) return;
        const doc = await db.collection('users').doc(currentUser.uid).get();
        if (doc.exists) { savedFavorites = doc.data().favorites || []; }
        filterWords();
    }

    async function saveFavorites() {
        localStorage.setItem('arabic_favorites', JSON.stringify(savedFavorites));
        if (currentUser) {
            await db.collection('users').doc(currentUser.uid).set({ favorites: savedFavorites });
        }
    }

    async function toggleFavorite(wordAr, event) {
        event.stopPropagation();
        if (savedFavorites.includes(wordAr)) { savedFavorites = savedFavorites.filter(w => w !== wordAr); } 
        else { savedFavorites.push(wordAr); }
        filterWords();
        await saveFavorites();
    }

    // 4. Озвучка (Облачная)
    function speakWord(text, event) {
        event.stopPropagation();
        const url = `https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=ar&client=gtx&q=${encodeURIComponent(text)}`;
        const audio = document.getElementById('globalAudioPlayer');
        audio.src = url;
        audio.play().catch(() => alert("Звук недоступен. Проверьте интернет."));
    }

    // 5. Поиск и Рендеринг
    function setTab(tabName) {
        currentTab = tabName;
        document.getElementById('tabAll').className = tabName === 'all' ? 'tab active' : 'tab';
        document.getElementById('tabFav').className = tabName === 'fav' ? 'tab active' : 'tab';
        document.getElementById('tabSettings').className = tabName === 'settings' ? 'tab active' : 'tab';
        document.getElementById('mainContent').style.display = tabName === 'settings' ? 'none' : 'block';
        document.getElementById('settingsPanel').style.display = tabName === 'settings' ? 'block' : 'none';
        filterWords();
    }

    function renderWords(words) {
        const listElement = document.getElementById('dictionaryList');
        listElement.innerHTML = "";
        words.slice(0, 50).forEach(word => {
            const isFav = savedFavorites.includes(word.ar);
            const li = document.createElement('li');
            li.className = 'word-item';
            li.innerHTML = `
                <div class="word-header" onclick="this.parentElement.classList.toggle('expanded')">
                    <div class="short-translation">${word.short_ru || word.ru}</div>
                    <div class="arabic-word">${word.ar}</div>
                </div>
                <div class="word-details">
                    <div style="font-size:15px; margin-bottom:10px; line-height:1.5;">${word.ru}</div>
                    <div class="actions">
                        <button class="action-btn" onclick="speakWord('${word.ar}', event)">🔊 Слушать</button>
                        <button class="action-btn fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${word.ar}', event)">
                            ${isFav ? '★ В избранном' : '☆ В избранное'}
                        </button>
                    </div>
                </div>`;
            listElement.appendChild(li);
        });
    }

    function filterWords() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        let filtered = dictionaryData.filter(word => {
            if (currentTab === 'fav' && !savedFavorites.includes(word.ar)) return false;
            if (!query) return true;
            return word.ru.toLowerCase().includes(query) || word.ar.includes(query);
        });
        renderWords(filtered);
    }

    function clearFavorites() {
        if(confirm("Удалить все избранные слова?")) {
            savedFavorites = [];
            saveFavorites();
            filterWords();
        }
    }

    // 6. Регистрация Офлайн-режима (Service Worker)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(() => console.log('SW Active'));
        });
    }

    window.onload = loadDatabase;
</script>
</body>
</html>
