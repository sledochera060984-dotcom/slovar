
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#27ae60">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2907/2907253.png">
    
    <title>Arabus Pro</title>
    
    <!-- Сначала грузим базу -->
    <script src="base.js?v=fixed_final"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #27ae60; --bg: #f8fafc; --text: #1e293b; --gray: #64748b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: env(safe-area-inset-top) 12px 12px 12px; color: var(--text); }
        .card { background: white; padding: 16px; border-radius: 20px; box-shadow: 0 4px 25px rgba(0,0,0,0.06); max-width: 600px; margin: 0 auto; min-height: 85vh; }
        
        .status-bar { text-align: center; padding: 12px; border-radius: 14px; margin-bottom: 12px; font-size: 13px; font-weight: 800; border: 1px solid #e2e8f0; background: #fff; transition: 0.3s; }
        .status-ready { background: #ecfdf5; color: #059669; border-color: #a7f3d0; }
        .status-wait { background: #fffbeb; color: #b45309; border-color: #fde68a; }
        
        .auth-btn { width: 100%; padding: 12px; margin-bottom: 16px; border-radius: 14px; border: 1px solid #e2e8f0; background: white; cursor: pointer; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .tabs { display: flex; background: #f1f5f9; padding: 4px; border-radius: 14px; margin-bottom: 16px; }
        .tab { flex: 1; padding: 10px 4px; border: none; background: none; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--gray); }
        .tab.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        input[type="text"], textarea { width: 100%; padding: 14px 16px; border: 2px solid #f1f5f9; border-radius: 14px; font-size: 16px; outline: none; transition: 0.2s; background: #fff; margin-bottom: 10px; }
        input[type="text"]:focus, textarea:focus { border-color: var(--primary); }
        textarea { height: 80px; resize: none; }

        .list { list-style: none; padding: 0; margin: 0; min-height: 100px; }
        .item { border-bottom: 1px solid #f1f5f9; padding: 14px 0; cursor: pointer; }
        
        /* Словарь: Арабский справа */
        .dict-row { display: flex; justify-content: space-between; align-items: center; }
        .dict-ru { font-size: 16px; color: #334155; flex: 1; padding-right: 12px; }
        .dict-ar { font-size: 24px; font-weight: 700; color: var(--primary); direction: rtl; }
        
        /* Блокнот: Русский сверху */
        .note-header { display: flex; flex-direction: column; }
        .note-ru { font-size: 18px; font-weight: 800; color: #1e293b; margin-bottom: 4px; }
        .note-ar-hint { font-size: 14px; color: var(--gray); direction: rtl; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .details { display: none; padding-top: 16px; border-top: 1px dashed #e2e8f0; margin-top: 12px; }
        .expanded .details { display: block; }
        .ar-full { font-size: 32px; font-weight: 800; color: var(--primary); direction: rtl; display: block; margin-bottom: 16px; line-height: 1.3; }

        .actions { display: flex; gap: 8px; margin-top: 12px; }
        .btn { flex: 1; padding: 12px 8px; border-radius: 12px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-green { background: var(--primary); color: white; border: none; }
        .btn-red { color: #ef4444; border-color: #fee2e2; background: #fef2f2; }
        .btn-star.active { background: #fffbeb; border-color: #fde68a; color: #b45309; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <div id="status" class="status-bar status-wait">⏳ Ожидание базы (8.5 МБ)...</div>
    
    <button id="authBtn" class="auth-btn" onclick="toggleAuth()">🌐 Войти через Google</button>

    <div class="tabs">
        <button id="tabDict" class="tab active" onclick="switchTab('dict')">📚 Словарь</button>
        <button id="tabFav" class="tab" onclick="switchTab('fav')">⭐ Избранное</button>
        <button id="tabTrans" class="tab" onclick="switchTab('trans')">📝 Блокнот</button>
    </div>

    <div id="searchSection">
        <input type="text" id="queryInput" placeholder="Поиск (напр: дверь или الباب)..." oninput="doSearch()" autocomplete="off">
    </div>

    <!-- Блокнот -->
    <div id="translatorSection" style="display:none;">
        <input type="text" id="manualAr" placeholder="Текст на арабском...">
        <textarea id="manualRu" placeholder="Перевод на русский..."></textarea>
        <button class="btn btn-green" style="width: 100%; margin-bottom: 15px;" onclick="saveManualNote()">💾 Сохранить в блокнот</button>
        <div style="font-size: 11px; color: var(--gray); margin: 10px 0 8px 0; font-weight: 800; text-transform: uppercase;">Мои Сохраненные Записи:</div>
    </div>
    
    <div id="list" class="list"></div>
</div>

<script>
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'arabus-pro-final-v1';
    
    let user = null;
    let localFavs = JSON.parse(localStorage.getItem('arabus_favs')) || [];
    let myNotes = []; 
    let activeTab = 'dict';

    // Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDDwIWq8VCk-ivjjCJJZoio-wGD2gU1rtE",
      authDomain: "arabus-dict-96c12.firebaseapp.com",
      projectId: "arabus-dict-96c12",
      storageBucket: "arabus-dict-96c12.firebasestorage.app",
      messagingSenderId: "814248156149",
      appId: "1:814248156149:web:e2acce197a00eb3ceb5ebc"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    // ГИПЕР-АКТИВНАЯ ПРОВЕРКА БАЗЫ
    const initInterval = setInterval(() => {
        const s = document.getElementById('status');
        if (window.dictBase && Array.isArray(window.dictBase)) {
            s.innerText = `✅ База готова: ${window.dictBase.length} слов`;
            s.className = "status-bar status-ready";
            clearInterval(initInterval);
            renderUI();
        }
    }, 100); // Проверяем 10 раз в секунду

    auth.onAuthStateChanged(async (u) => {
        user = u;
        const btn = document.getElementById('authBtn');
        if (user) {
            btn.innerText = `Выйти (${user.displayName.split(' ')[0]})`;
            syncCloud();
        } else {
            btn.innerText = "🌐 Войти через Google";
        }
        renderUI();
    });

    async function syncCloud() {
        if (!user) return;
        // Favs
        const fSnap = await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('data').doc('favs').get();
        if (fSnap.exists) {
            localFavs = fSnap.data().list || [];
            localStorage.setItem('arabus_favs', JSON.stringify(localFavs));
        }
        // Notes
        db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('notes')
          .onSnapshot(snap => {
              myNotes = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              if (activeTab === 'trans') renderUI();
          });
    }

    async function saveManualNote() {
        const ar = document.getElementById('manualAr').value.trim();
        const ru = document.getElementById('manualRu').value.trim();
        if (!ar || !ru) return;
        if (!user) { alert("Войдите в аккаунт для сохранения!"); return; }
        
        try {
            await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('notes').add({ ar, ru, ts: Date.now() });
            document.getElementById('manualAr').value = "";
            document.getElementById('manualRu').value = "";
        } catch (e) { alert("Ошибка сохранения в облако."); }
    }

    async function removeNote(id, e) {
        e.stopPropagation();
        if (confirm("Удалить запись из блокнота?")) await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('notes').doc(id).delete();
    }

    // --- УМНЫЙ ПОИСК ---
    function doSearch() { renderUI(document.getElementById('queryInput').value.toLowerCase().trim()); }

    function normalize(t) { 
        if (!t) return "";
        let res = t.toLowerCase()
            .replace(/[\u064B-\u0652]/g, "") // харакаты
            .replace(/[أإآ]/g, "ا")           // алиф
            .trim();
        // Отсекаем артикль 'Алиф-Лям', если он есть в начале
        if (res.length > 3 && res.startsWith("ال")) {
            res = res.substring(2);
        }
        return res;
    }

    function renderUI(q = "") {
        const list = document.getElementById('list');
        list.innerHTML = "";
        
        if (activeTab === 'trans') {
            // БЛОКНОТ: Русский заголовок ВЕРХУ
            myNotes.sort((a,b) => b.ts - a.ts).forEach(n => {
                const el = document.createElement('div');
                el.className = 'item';
                el.innerHTML = `
                    <div onclick="this.classList.toggle('expanded')">
                        <div class="note-header">
                            <div class="note-ru">${n.ru}</div>
                            <div class="note-ar-hint">${n.ar}</div>
                        </div>
                        <div class="details">
                            <span class="ar-full">${n.ar}</span>
                            <div class="actions">
                                <button class="btn" onclick="speak('${n.ar}', event)">🔊 Слушать</button>
                                <button class="btn btn-red" onclick="removeNote('${n.id}', event)">🗑 Удалить</button>
                            </div>
                        </div>
                    </div>`;
                list.appendChild(el);
            });
            return;
        }

        if (!window.dictBase) return;
        const nQ = normalize(q); 
        
        let filtered = window.dictBase.filter(w => {
            if (activeTab === 'fav' && !localFavs.includes(w.ar)) return false;
            if (!q) return activeTab === 'fav';
            const nWordAr = normalize(w.ar);
            const nWordRu = w.ru.toLowerCase();
            return nWordRu.includes(q) || nWordAr.includes(nQ);
        });

        if (q) {
            filtered.sort((a, b) => {
                const normAAr = normalize(a.ar);
                const normBAr = normalize(b.ar);
                const ruA = (a.short_ru || a.ru).toLowerCase().replace(/^[\d\)\s]+/, '');
                const ruB = (b.short_ru || b.ru).toLowerCase().replace(/^[\d\)\s]+/, '');
                
                // 1. Точное совпадение арабского
                if (normAAr === nQ && normBAr !== nQ) return -1;
                if (normBAr === nQ && normAAr !== nQ) return 1;

                // 2. Начало на русском (Приоритет для "Дверь")
                const startsRuA = ruA.startsWith(q);
                const startsRuB = ruB.startsWith(q);
                if (startsRuA && !startsRuB) return -1;
                if (startsRuB && !startsRuA) return 1;

                return a.ru.length - b.ru.length;
            });
        }

        filtered.slice(0, 50).forEach(w => {
            const active = localFavs.includes(w.ar);
            const el = document.createElement('div');
            el.className = 'item';
            el.innerHTML = `
                <div onclick="this.classList.toggle('expanded')">
                    <div class="dict-row">
                        <div class="dict-ru">${w.short_ru || w.ru.split(';')[0]}</div>
                        <div class="dict-ar">${w.ar}</div>
                    </div>
                    <div class="details">
                        <div style="white-space: pre-wrap; margin-bottom:12px; color:#444; font-size:15px;">${w.ru}</div>
                        <div class="actions">
                            <button class="btn" onclick="speak('${w.ar}', event)">🔊 Слушать</button>
                            <button class="btn btn-star ${active ? 'active' : ''}" onclick="toggleFavorite('${w.ar}', this, event)">
                                ${active ? '★ В избранном' : '☆ В избранное'}
                            </button>
                        </div>
                    </div>
                </div>`;
            list.appendChild(el);
        });
    }

    function switchTab(t) {
        activeTab = t;
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.getElementById({ dict: 'tabDict', fav: 'tabFav', trans: 'tabTrans' }[t]).classList.add('active');
        document.getElementById('searchSection').style.display = t === 'trans' ? 'none' : 'block';
        document.getElementById('translatorSection').style.display = t === 'trans' ? 'block' : 'none';
        renderUI();
    }

    async function toggleFavorite(ar, btn, e) {
        e.stopPropagation();
        if (localFavs.includes(ar)) localFavs = localFavs.filter(v => v !== ar);
        else localFavs.push(ar);
        localStorage.setItem('arabus_favs', JSON.stringify(localFavs));
        btn.classList.toggle('active');
        btn.innerText = localFavs.includes(ar) ? '★ В избранном' : '☆ В избранное';
        if (user) await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('data').doc('favs').set({ list: localFavs });
        if (activeTab === 'fav') renderUI();
    }

    function speak(t, e) {
        e.stopPropagation(); window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t); u.lang = 'ar-SA'; window.speechSynthesis.speak(u);
    }

    async function toggleAuth() { if (user) auth.signOut(); else await auth.signInWithPopup(provider); }

    window.onload = () => { if (window.dictBase) renderUI(); };
</script>
</body>
</html>
