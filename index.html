<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#27ae60">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <title>АРАБРУС</title>

  <script src="base.js"></script>
  <script src="verbs.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --primary: #27ae60;
      --bg: #f8fafc;
      --text: #1e293b;
      --muted: #64748b;
      --line: #e2e8f0;
      --warn: #b45309;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, system-ui, sans-serif;
      padding: env(safe-area-inset-top) 12px 40px 12px;
    }
    .app {
      max-width: 700px;
      margin: 0 auto;
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      min-height: 80vh;
      padding: 16px;
    }
    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .header img {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(39,174,96,0.2);
    }
    .header h1 {
      margin: 0;
      color: var(--primary);
      font-size: 24px;
      font-weight: 800;
    }
    .status {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 12px;
      background: #fff;
    }
    .status.ok { background: #ecfdf5; border-color: #a7f3d0; color: #059669; }
    .status.wait { background: #fffbeb; border-color: #fde68a; color: var(--warn); }
    .status.err { background: #fef2f2; border-color: #fecaca; color: var(--danger); }

    .auth-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .btn, .auth-btn, .tab {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }
    .auth-btn {
      width: 100%;
      padding: 12px;
      font-size: 14px;
    }
    .tabs {
      display: flex;
      gap: 6px;
      background: #f1f5f9;
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 14px;
    }
    .tab {
      flex: 1;
      padding: 10px 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
    }
    .tab.active {
      background: #fff;
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .search, .field, textarea {
      width: 100%;
      border: 2px solid #f1f5f9;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
      background: #fff;
      margin-bottom: 10px;
    }
    .search:focus, .field:focus, textarea:focus { border-color: var(--primary); }
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .toolbar .btn {
      flex: 1;
      padding: 11px 10px;
      font-size: 13px;
    }
    .btn.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .btn.warn {
      background: #fffbeb;
      color: var(--warn);
      border-color: #fde68a;
    }
    .btn.danger {
      background: #fef2f2;
      color: var(--danger);
      border-color: #fecaca;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 26px 10px;
      font-size: 14px;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 60px;
    }
    .item {
      border: 1px solid #eef2f7;
      border-radius: 16px;
      padding: 14px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .item.collapsible { cursor: pointer; }
    .item-details {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed #e2e8f0;
    }
    .item.expanded .item-details { display: block; }
    .item-head {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: space-between;
    }
    .item-left {
      flex: 1;
      min-width: 0;
    }
    .ru {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.45;
      color: #334155;
      margin-bottom: 6px;
      white-space: pre-wrap;
    }
    .ar {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
      direction: rtl;
      line-height: 1.25;
      word-break: break-word;
      text-align: right;
    }
    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      white-space: pre-wrap;
    }
    .full-translation, .full-translation-fav {
      font-size: 14.5px;
      line-height: 1.55;
      color: #334155;
      margin-bottom: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .actions .btn {
      flex: 1;
      min-width: 110px;
      padding: 10px 8px;
      font-size: 13px;
    }
    .verb-box {
      background: #f1f5f9;
      border-radius: 12px;
      padding: 10px 12px;
      margin-top: 10px;
      margin-bottom: 2px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      font-size: 14px;
      color: #475569;
    }
    .verb-box span {
      direction: rtl;
      color: var(--primary);
      font-size: 20px;
      font-weight: 800;
    }
    .lock-card {
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      background: #fff;
      padding: 18px 16px;
      text-align: center;
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .lock-card .lock-icon { font-size: 36px; margin-bottom: 8px; }
    .lock-card .lock-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; color: #0f172a; }
    .lock-card .lock-text { font-size: 14px; line-height: 1.45; color: var(--muted); margin-bottom: 12px; white-space: pre-wrap; }

    .user-line {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
    }

    .toast {
      display: none;
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      background: #1e293b;
      color: #fff;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      z-index: 9999;
      box-shadow: 0 8px 30px rgba(0,0,0,0.18);
      white-space: nowrap;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.56);
      z-index: 9998;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: #fff;
      width: 100%;
      max-width: 420px;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 22px 44px rgba(0,0,0,0.18);
    }
    .modal h3 { margin: 0 0 10px; text-align: center; }
    .modal .ar-preview { font-size: 30px; font-weight: 800; color: var(--primary); direction: rtl; text-align: center; margin-bottom: 14px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }

    /* Reading */
    .reading-home-note {
      text-align: center;
      color: var(--muted);
      padding: 18px 8px 10px;
      font-size: 14px;
    }
    .reading-box {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 4px 18px rgba(0,0,0,0.04);
      padding: 12px;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    .reading-box,
    .reading-box * {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    .reading-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 10px;
    }
    .reading-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .reading-tab {
      border: 1px solid #dbe3ec;
      background: #f8fafc;
      color: #334155;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }
    .reading-tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      box-shadow: 0 4px 12px rgba(39,174,96,0.22);
    }
    .reading-panel {
      margin-top: 10px;
      border: 1px solid #edf2f7;
      border-radius: 16px;
      background: #fcfdfd;
      overflow: hidden;
    }
    .reading-preview {
      padding: 12px 14px;
      cursor: pointer;
    }
    .reading-preview-label {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .reading-preview-line {
      font-size: 22px;
      font-weight: 800;
      color: var(--primary);
      direction: rtl;
      text-align: right;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .reading-preview-line.preview-ru {
      font-size: 14px;
      color: #334155;
      direction: ltr;
      text-align: left;
      font-weight: 700;
    }
    .reading-preview-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }
    .reading-full {
      display: none;
      border-top: 1px dashed #e2e8f0;
      padding: 12px 14px;
    }
    .reading-full.open { display: block; }
    .reading-placeholder {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.45;
    }
    .reading-sentence {
      padding: 10px 0;
      border-top: 1px dashed #e2e8f0;
    }
    .reading-sentence:first-child {
      border-top: none;
      padding-top: 0;
    }
    .reading-line {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 8px;
      direction: rtl;
      align-items: flex-end;
      line-height: 2.15;
    }
    .reading-token {
      position: relative;
      display: inline-flex;
      align-items: flex-end;
      justify-content: flex-end;
      cursor: pointer;
      touch-action: manipulation;
    }
    .reading-ar {
      font-size: 26px;
      font-weight: 800;
      color: var(--primary);
      direction: rtl;
      line-height: 1.35;
      text-align: right;
    }
    .reading-token.phrase .reading-ar {
      padding: 2px 4px;
      border-radius: 10px;
      background: rgba(39,174,96,0.06);
    }
    .reading-translation {
      display: none;
      position: absolute;
      right: 0;
      bottom: calc(100% + 8px);
      min-width: 132px;
      max-width: 240px;
      background: #0f172a;
      color: #fff;
      border-radius: 14px;
      padding: 10px;
      z-index: 50;
      box-shadow: 0 14px 32px rgba(15,23,42,0.26);
    }
    .reading-token.visible .reading-translation { display: block; }
    .reading-translation-text {
      font-size: 13px;
      line-height: 1.42;
      margin-bottom: 8px;
      white-space: normal;
      text-align: left;
      direction: ltr;
    }
    .reading-translation-actions {
      display: flex;
      gap: 6px;
    }
    .reading-translation-actions .btn {
      flex: 1;
      min-width: 0;
      padding: 7px 8px;
      font-size: 12px;
    }

    body.dict-searching .header,
    body.dict-searching #status,
    body.dict-searching #syncIndicator,
    body.dict-searching #trialIndicator,
    body.dict-searching .user-line,
    body.dict-searching .auth-row {
      display: none;
    }
    body.dict-searching .app { padding-top: 10px; }
    body.dict-searching .tabs {
      margin-bottom: 8px;
      padding: 3px;
      gap: 4px;
      position: sticky;
      top: 0;
      z-index: 20;
      background: #f1f5f9;
    }
    body.dict-searching .tab { padding: 8px 6px; font-size: 12px; }
    body.dict-searching #dictSection {
      margin-bottom: 6px;
      position: sticky;
      top: 44px;
      z-index: 19;
      background: #fff;
      padding-bottom: 4px;
    }
    body.dict-searching .search {
      margin-bottom: 6px;
      padding: 12px 14px;
      font-size: 15px;
      border-radius: 12px;
    }
    body.dict-searching .reading-box { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <img src="icon.png" alt="Logo" onerror="this.style.display='none'">
      <h1>АРАБРУС</h1>
    </div>

    <div id="status" class="status wait">⏳ Подключение базы...</div>
    <div id="syncIndicator" class="status wait" style="padding:8px 10px; font-size:12px; margin-bottom:8px;">☁️ Проверка синхронизации...</div>
    <div id="trialIndicator" class="status wait" style="padding:8px 10px; font-size:12px; margin-bottom:8px;">🎁 Проверка пробного периода...</div>
    <div id="userLine" class="user-line">Не выполнен вход</div>

    <div class="auth-row">
      <button id="authBtn" class="auth-btn" onclick="toggleAuth()">🌐 Войти через Google</button>
    </div>

    <div class="tabs">
      <button id="tabDict" class="tab active" onclick="switchTab('dict')">📚 Словарь</button>
      <button id="tabFav" class="tab" onclick="switchTab('fav')">⭐ Избранное</button>
      <button id="tabNotes" class="tab" onclick="switchTab('notes')">📝 Блокнот</button>
    </div>

    <div id="dictSection">
      <input id="queryInput" class="search" type="text" placeholder="Поиск (дверь, باب, قال, يقول)..." oninput="renderApp()" autocomplete="off">
    </div>

    <div id="notesComposer" style="display:none;">
      <input id="manualAr" class="field" type="text" placeholder="Арабский текст">
      <input id="manualRu" class="field" type="text" placeholder="Перевод на русский">
      <div class="toolbar" style="margin-top:6px;">
        <button class="btn primary" onclick="saveNote()">💾 Сохранить в блокнот</button>
      </div>
    </div>

    <div id="favSearchWrap" style="display:none;">
      <input id="favSearchInput" class="field" type="text" placeholder="Поиск по избранному..." oninput="renderApp()">
    </div>

    <div id="noteSearchWrap" style="display:none;">
      <input id="noteSearchInput" class="field" type="text" placeholder="Поиск по блокноту..." oninput="renderApp()">
    </div>

    <div id="list" class="list"></div>
  </div>

  <div id="favModalWrap" class="modal-overlay">
    <div class="modal">
      <h3 id="favModalTitle">В избранное</h3>
      <div id="favModalAr" class="ar-preview"></div>
      <input id="favModalRu" class="field" type="text" placeholder="Ваш перевод">
      <div class="modal-actions">
        <button class="btn primary" onclick="confirmFavModal()">💾 Сохранить</button>
        <button class="btn" onclick="closeFavModal()">Отмена</button>
      </div>
    </div>
  </div>

  <div id="noteEditModalWrap" class="modal-overlay">
    <div class="modal">
      <h3 id="noteEditModalTitle">Редактировать запись</h3>
      <input id="noteEditModalArInput" class="field" type="text" placeholder="Арабский текст" dir="rtl" style="text-align:right; font-size:22px; font-weight:800; color: var(--primary);">
      <input id="noteEditModalRu" class="field" type="text" placeholder="Перевод на русский">
      <div class="modal-actions">
        <button class="btn primary" onclick="confirmNoteEditModal()">💾 Сохранить</button>
        <button class="btn" onclick="closeNoteEditModal()">Отмена</button>
      </div>
    </div>
  </div>

  <div id="authModalWrap" class="modal-overlay">
    <div class="modal" style="text-align:center;">
      <h3 style="margin-bottom: 10px;">Требуется вход</h3>
      <p style="color: var(--muted); font-size: 14px; margin-bottom: 20px; line-height: 1.4;">
        Пожалуйста, войдите в аккаунт Google, чтобы слушать озвучку и сохранять слова.
      </p>
      <div class="toolbar" style="margin-bottom: 0;">
        <button class="btn primary" onclick="closeAuthModal(); toggleAuth();">🌐 Войти через Google</button>
        <button class="btn" onclick="closeAuthModal()">Отмена</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">Сообщение</div>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }

  const firebaseConfig = {
    apiKey: "AIzaSyDDwIWq8VCk-ivjjCJJZoio-wGD2gU1rtE",
    authDomain: "arabus-dict-96c12.firebaseapp.com",
    projectId: "arabus-dict-96c12",
    storageBucket: "arabus-dict-96c12.firebasestorage.app",
    messagingSenderId: "814248156149",
    appId: "1:814248156149:web:e2acce197a00eb3ceb5ebc"
  };

  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const provider = new firebase.auth.GoogleAuthProvider();
  const CONTACT_EMAIL = 'sledochera060984@gmail.com';

  db.enablePersistence().catch((err) => {
    console.error('Persistence error:', err);
  });

  let user = null;
  let activeTab = 'dict';
  let toastTimer = null;
  let currentRenderedWords = [];
  let normalizedVerbs = {};
  let reverseVerbsMap = {};
  let favorites = [];
  let notes = [];
  let userAccess = { premiumActive: false, premiumUntilMs: 0 };
  let unsubAccess = null;
  let unsubFavs = null;
  let unsubNotes = null;
  let favSnapshotPending = false;
  let noteSnapshotPending = false;
  let favModalWord = null;
  let currentEditingNoteId = null;
  let activeReadingSection = '';
  let expandedReadingSection = '';
  let readingPressTimer = null;
  let readingPressState = { id: null, startX: 0, startY: 0, moved: false };

  const statusEl = document.getElementById('status');
  const syncIndicatorEl = document.getElementById('syncIndicator');
  const trialIndicatorEl = document.getElementById('trialIndicator');
  const listEl = document.getElementById('list');

  function showMsg(text) {
    const t = document.getElementById('toast');
    t.innerText = text;
    t.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.style.display = 'none', 2600);
  }

  function setStatus(text, cls) {
    statusEl.className = 'status ' + cls;
    statusEl.innerText = text;
  }

  function clearAllSearchInputs() {
    ['queryInput', 'favSearchInput', 'noteSearchInput'].forEach((id) => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escapeJs(value) {
    return String(value ?? '')
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'")
      .replace(/\n/g, '\\n')
      .replace(/\r/g, '\\r')
      .replace(/\u2028/g, '\\u2028')
      .replace(/\u2029/g, '\\u2029');
  }

  function normalize(t) {
    if (!t) return '';
    let res = String(t).toLowerCase()
      .replace(/[\u064B-\u0652]/g, '')
      .replace(/[أإآ]/g, 'ا')
      .trim();
    if (res.length > 3 && res.startsWith('ال')) res = res.substring(2);
    return res;
  }

  function hashString(str) {
    let h = 2166136261;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
    }
    return (h >>> 0).toString(36);
  }

  function makeFavId(ar, ru) {
    return 'fav_' + hashString(String(ar).trim() + '||' + String(ru).trim());
  }

  function getArabicStems(word) {
    if (!word) return [];
    let stems = [word];
    let w = word;
    if (w.startsWith('س') && w.length > 3) w = w.substring(1);
    if (w.length >= 3 && /^[يتنا]/.test(w)) {
      let core = w.substring(1);
      if (core.endsWith('ون') || core.endsWith('ين') || core.endsWith('ان') || core.endsWith('وا') || core.endsWith('ات')) {
        core = core.substring(0, core.length - 2);
      }
      stems.push(core);
    }
    if (word.endsWith('وا') || word.endsWith('تم') || word.endsWith('نا')) stems.push(word.substring(0, word.length - 2));
    if (word.endsWith('ت')) stems.push(word.substring(0, word.length - 1));
    return stems;
  }

  function getEventPoint(event) {
    const point = (event?.touches && event.touches[0])
      || (event?.changedTouches && event.changedTouches[0])
      || event
      || { clientX: 0, clientY: 0 };
    return {
      x: Number(point.clientX || 0),
      y: Number(point.clientY || 0)
    };
  }

  function getUserCreatedAtMs() {
    if (!user?.metadata?.creationTime) return 0;
    const ms = new Date(user.metadata.creationTime).getTime();
    return Number.isFinite(ms) ? ms : 0;
  }

  function hasPaidAccess() {
    if (!user) return false;
    if (userAccess?.premiumUntilMs) return Date.now() <= userAccess.premiumUntilMs;
    if (userAccess?.premiumActive) return true;
    return false;
  }

  function getTrialInfo() {
    if (!user) return { active: false, expired: false, daysLeft: 0, endMs: 0 };
    const createdAtMs = getUserCreatedAtMs();
    if (!createdAtMs) return { active: false, expired: false, daysLeft: 0, endMs: 0 };

    const trialMs = 14 * 24 * 60 * 60 * 1000;
    const endMs = createdAtMs + trialMs;
    const remainingMs = endMs - Date.now();
    const active = remainingMs > 0;
    const daysLeft = active ? Math.max(1, Math.ceil(remainingMs / (24 * 60 * 60 * 1000))) : 0;
    return { active, expired: !active, daysLeft, endMs };
  }

  function canUsePremiumFeatures() {
    if (!user) return false;
    if (hasPaidAccess()) return true;
    return getTrialInfo().active;
  }

  function isPremiumLocked() {
    return !!user && !canUsePremiumFeatures();
  }

    if (!syncIndicatorEl) return;

    if (!user) {
      syncIndicatorEl.className = 'status wait';
      syncIndicatorEl.innerText = '☁️ Войдите в Google для синхронизации';
      return;
    }

    const hasPending = favSnapshotPending || noteSnapshotPending;

    if (!navigator.onLine && hasPending) {
      syncIndicatorEl.className = 'status wait';
      syncIndicatorEl.innerText = '📴 Нет сети. Изменения ждут синхронизации';
      return;
    }

    if (!navigator.onLine && !hasPending) {
      syncIndicatorEl.className = 'status wait';
      syncIndicatorEl.innerText = '📴 Нет сети. Последние данные доступны локально';
      return;
    }

    if (hasPending) {
      syncIndicatorEl.className = 'status wait';
      syncIndicatorEl.innerText = '🔄 Синхронизация с облаком...';
      return;
    }

    syncIndicatorEl.className = 'status ok';
    syncIndicatorEl.innerText = '✅ Всё сохранено в облаке';
  }

  function updateTrialIndicator() {
    if (!trialIndicatorEl) return;

    if (!user) {
      trialIndicatorEl.className = 'status wait';
      trialIndicatorEl.innerText = '🎁 Войдите в Google — после регистрации начнутся 14 дней бесплатного доступа';
      return;
    }

    if (hasPaidAccess()) {
      trialIndicatorEl.className = 'status ok';
      if (userAccess && userAccess.premiumUntilMs) {
        const d = new Date(userAccess.premiumUntilMs);
        const day = d.getDate().toString().padStart(2, '0');
        const month = (d.getMonth() + 1).toString().padStart(2, '0');
        const year = d.getFullYear();
        trialIndicatorEl.innerText = `💎 Премиум-доступ активен до ${day}.${month}.${year}`;
      } else {
        trialIndicatorEl.innerText = '💎 Премиум-доступ активен';
      }
      return;
    }

    const trial = getTrialInfo();
    if (trial.active) {
      trialIndicatorEl.className = 'status wait';
      trialIndicatorEl.innerText = `🎁 Бесплатный период активен: осталось ${trial.daysLeft} дн.`;
      return;
    }

    trialIndicatorEl.className = 'status err';
    trialIndicatorEl.innerText = '🔒 Пробный период закончился. Нажмите, чтобы написать мне';
  }

  let currentTtsAudio = null;
  let ttsUnlocked = false;

  function stopTtsPlayback() {
    try { window.speechSynthesis.cancel(); } catch (_) {}
    try {
      if (currentTtsAudio) {
        currentTtsAudio.pause();
        currentTtsAudio.currentTime = 0;
      }
    } catch (_) {}
    currentTtsAudio = null;
  }

  function getArabicVoice() {
    try {
      const voices = window.speechSynthesis.getVoices() || [];
      if (!voices.length) return null;
      return (
        voices.find(v => /^ar(-|$)/i.test(v.lang || '') && /google|arabic|العربية/i.test(v.name || '')) ||
        voices.find(v => /^ar(-|$)/i.test(v.lang || '')) ||
        voices.find(v => /arabic|العربية/i.test(v.name || '')) ||
        null
      );
    } catch (_) { return null; }
  }

  function unlockTts() {
    if (ttsUnlocked) return;
    ttsUnlocked = true;
    try { window.speechSynthesis.resume(); } catch (_) {}
  }

  document.addEventListener('click', unlockTts, { passive: true });
  document.addEventListener('touchstart', unlockTts, { passive: true });

  try {
    if ('speechSynthesis' in window) {
      cachedArabicVoice = getArabicVoice();
      window.speechSynthesis.onvoiceschanged = function() {
        cachedArabicVoice = getArabicVoice();
      };
    }
  } catch (_) {}

  function playGoogleTtsFallback(text) {
    try {
      const encoded = encodeURIComponent(String(text || '').trim());
      const url = 'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=ar&q=' + encoded;
      currentTtsAudio = new Audio(url);
      currentTtsAudio.preload = 'auto';
      currentTtsAudio.onended = function() { currentTtsAudio = null; };
      currentTtsAudio.onerror = function() {
        currentTtsAudio = null;
        showMsg('Озвучка недоступна');
      };
      currentTtsAudio.play().catch(function() {
        currentTtsAudio = null;
        showMsg('Озвучка не запустилась');
      });
    } catch (e) {
      console.error('Google TTS fallback error:', e);
      showMsg('Озвучка недоступна');
    }
  }

  function speak(text, e) {
    if (e) e.stopPropagation();

    if (!canUsePremiumFeatures()) {
      showActivationPrompt();
      return;
    }

    const cleanText = String(text || '').trim();
    if (!cleanText) {
      showMsg('Нет текста для озвучки');
      return;
    }

    unlockTts();
    stopTtsPlayback();

    const hasSpeechApi = typeof window !== 'undefined' && 'speechSynthesis' in window && typeof SpeechSynthesisUtterance !== 'undefined';
    if (!hasSpeechApi) {
      playGoogleTtsFallback(cleanText);
      return;
    }

    let usedFallback = false;
    function useFallbackOnce() {
      if (usedFallback) return;
      usedFallback = true;
      try { window.speechSynthesis.cancel(); } catch (_) {}
      playGoogleTtsFallback(cleanText);
    }

    try {
      const utterance = new SpeechSynthesisUtterance(cleanText);
      const voice = cachedArabicVoice || getArabicVoice();
      cachedArabicVoice = voice || cachedArabicVoice;
      utterance.lang = voice && voice.lang ? voice.lang : 'ar-SA';
      if (voice) utterance.voice = voice;
      utterance.rate = 0.9;
      utterance.pitch = 1.0;
      utterance.volume = 1.0;

      const fallbackTimer = setTimeout(function() {
        const speaking = !!window.speechSynthesis.speaking;
        const pending = !!window.speechSynthesis.pending;
        if (!speaking && !pending) useFallbackOnce();
      }, 700);

      utterance.onstart = function() { clearTimeout(fallbackTimer); };
      utterance.onend = function() { clearTimeout(fallbackTimer); };
      utterance.onerror = function(err) {
        clearTimeout(fallbackTimer);
        console.error('Speech synthesis error:', err);
        useFallbackOnce();
      };

      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);

      setTimeout(function() {
        const speaking = !!window.speechSynthesis.speaking;
        const pending = !!window.speechSynthesis.pending;
        if (!speaking && !pending) useFallbackOnce();
      }, 250);
    } catch (err) {
      console.error('Speak error:', err);
      useFallbackOnce();
    }
  }

    if (!canUsePremiumFeatures()) { showActivationPrompt(); return; }

    const ru = document.getElementById('manualRu').value.trim();
    if (!ar || !ru) {
      showMsg('Заполните оба поля');
      return;
    }

    const createdTs = Date.now();
    const localTempId = 'temp_' + createdTs;
    notes.unshift({
      id: localTempId,
      ar,
      ru,
      ts: createdTs,
      isLocalTemp: true
    });
    renderApp();

    document.getElementById('manualAr').value = '';
    document.getElementById('manualRu').value = '';
    showMsg('Фраза добавлена');

    try {
      const createdRef = await db.collection('users').doc(user.uid).collection('notes').add({
        ar,
        ru,
        ts: createdTs,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      notes = notes.map(n => n.id === localTempId ? {
        ...n,
        id: createdRef.id,
        isLocalTemp: false
      } : n);
      renderApp();
    } catch (e) {
      console.error(e);
      notes = notes.filter(n => n.id !== localTempId);
      renderApp();
      showMsg('Ошибка сохранения');
    }
  }

  function setReadingSection(section) {
    activeReadingSection = section;
    expandedReadingSection = '';
    hideReadingTranslations();
    renderApp();
  }

  function toggleReadingArticle(section) {
    if (activeReadingSection !== section) activeReadingSection = section;
    expandedReadingSection = expandedReadingSection === section ? '' : section;
    hideReadingTranslations();
    renderApp();
  }

  function hideReadingTranslations() {
    document.querySelectorAll('.reading-token.visible').forEach(el => {
      el.classList.remove('visible');
    });
  }

  function startReadingPress(id, event) {
    if (event) {
      event.preventDefault();
      event.stopPropagation();
    }

    const point = getEventPoint(event);
    clearTimeout(readingPressTimer);

    readingPressState = {
      id,
      startX: point.x,
      startY: point.y,
      moved: false
    };

    readingPressTimer = setTimeout(() => {
      if (!readingPressState.id || readingPressState.id !== id || readingPressState.moved) return;
      const el = document.getElementById(id);
      if (!el) return;
      const alreadyVisible = el.classList.contains('visible');
      hideReadingTranslations();
      if (!alreadyVisible) el.classList.add('visible');
      readingPressState = { id: null, startX: 0, startY: 0, moved: false };
      readingPressTimer = null;
      try { if (navigator.vibrate) navigator.vibrate(20); } catch (_) {}
    }, 400);
  }

  function moveReadingPress(event) {
    if (!readingPressState.id) return;
    const point = getEventPoint(event);
    const dx = Math.abs(point.x - readingPressState.startX);
    const dy = Math.abs(point.y - readingPressState.startY);
    if (dx > 12 || dy > 12) {
      readingPressState.moved = true;
      cancelReadingPress();
    }
  }

  function cancelReadingPress() {
    clearTimeout(readingPressTimer);
    readingPressTimer = null;
    readingPressState = { id: null, startX: 0, startY: 0, moved: false };
  }

  function renderReadingFullContent(sectionKey) {
    const section = READING_LIBRARY[sectionKey];
    if (!section) return '';

    if (section.placeholder) {
      return `<div class="reading-placeholder">${escapeHtml(section.placeholder)}</div>`;
    }

    return `
      ${section.sentences.map((sentence, sentenceIndex) => `
        <div class="reading-sentence">
          <div class="reading-line">
            ${sentence.map((segment, segmentIndex) => {
              const tokenId = `reading_${sectionKey}_${sentenceIndex}_${segmentIndex}`;
              return `
                <span
                  id="${tokenId}"
                  class="reading-token ${segment.ar.includes(' ') ? 'phrase' : ''}"
                  oncontextmenu="return false"
                  onmousedown="startReadingPress('${tokenId}', event)"
                  onmouseup="cancelReadingPress()"
                  onmouseleave="cancelReadingPress()"
                  onmousemove="moveReadingPress(event)"
                  ontouchstart="startReadingPress('${tokenId}', event)"
                  ontouchend="cancelReadingPress()"
                  ontouchcancel="cancelReadingPress()"
                  ontouchmove="moveReadingPress(event)"
                >
                  <span class="reading-translation">
                    <div class="reading-translation-text">${escapeHtml(segment.ru)}</div>
                    <div class="reading-translation-actions">
                      <button class="btn" onclick="event.stopPropagation(); speak('${escapeJs(segment.ar)}', event)">🔊</button>
                      <button class="btn" onclick="event.stopPropagation(); saveReadingPair('${escapeJs(segment.ar)}', '${escapeJs(segment.ru)}', '${escapeJs(section.title)}')">📝</button>
                    </div>
                  </span>
                  <span class="reading-ar">${escapeHtml(segment.ar)}</span>
                </span>
              `;
            }).join('')}
          </div>
        </div>
      `).join('')}
    `;
  }

  function renderDictionary() {
    if (typeof dictBase === 'undefined' || !Array.isArray(dictBase)) return '<div class="empty">База ещё не загружена</div>';

    const q = document.getElementById('queryInput').value.toLowerCase().trim();

    if (!q) {
      currentRenderedWords = [];
      return `
        <div class="reading-home-note">Начните вводить слово для поиска</div>
        ${renderReadingHub()}
      `;
    }

    const nQ = normalize(q);
    const stems = getArabicStems(nQ);
    const mappedPastTense = reverseVerbsMap[nQ];

    const filtered = dictBase.filter(w => {
      const nWordAr = normalize(w.ar);
      const nRoot = normalize(w.root || '');
      const nWordRu = String(w.ru || '').toLowerCase();

      if (nWordRu.includes(q)) return true;
      if (mappedPastTense && nWordAr === mappedPastTense) return true;
      for (const stem of stems) {
        if (nWordAr.includes(stem) || (nRoot && nRoot.includes(stem))) return true;
      }
      return false;
    });

    filtered.sort((a, b) => {
      const normAAr = normalize(a.ar);
      const normBAr = normalize(b.ar);
      const ruA = String(a.short_ru || a.ru || '').toLowerCase().replace(/^[\d\)\s]+/, '');
      const ruB = String(b.short_ru || b.ru || '').toLowerCase().replace(/^[\d\)\s]+/, '');

      if (mappedPastTense) {
        if (normAAr === mappedPastTense && normBAr !== mappedPastTense) return -1;
        if (normBAr === mappedPastTense && normAAr !== mappedPastTense) return 1;
      }
      if (normAAr === nQ && normBAr !== nQ) return -1;
      if (normBAr === nQ && normAAr !== nQ) return 1;

      const startsRuA = ruA.startsWith(q);
      const startsRuB = ruB.startsWith(q);
      if (startsRuA && !startsRuB) return -1;
      if (startsRuB && !startsRuA) return 1;
      return String(a.ru || '').length - String(b.ru || '').length;
    });

    currentRenderedWords = filtered.slice(0, 50);
    if (!currentRenderedWords.length) return '<div class="empty">Ничего не найдено</div>';

    return currentRenderedWords.map((w, idx) => {
      const fav = getFavoriteByWord(w);
      const present = normalizedVerbs[normalize(w.ar)];
      const locked = isPremiumLocked();

      return `
        <div class="item collapsible" onclick="this.classList.toggle('expanded')">
          <div class="item-head">
            <div class="item-left">
              <div class="ru">${escapeHtml(w.short_ru || String(w.ru || '').split(';')[0] || '')}</div>
              <div class="ar">${escapeHtml(w.ar)}</div>
              ${present ? `<div class="hint">Настоящее время: <b>${escapeHtml(present)}</b></div>` : ''}
              ${fav ? `<div class="hint">⭐ Уже в избранном</div>` : ''}
            </div>
          </div>

          <div class="item-details" onclick="event.stopPropagation()">
            <div class="full-translation">${escapeHtml(w.ru || '')}</div>
            ${present ? `<div class="verb-box"><div>Настоящее время</div><span>${escapeHtml(present)}</span></div>` : ''}
            <div class="actions">
              <button class="btn" onclick="${locked ? "showActivationPrompt()" : `speak('${escapeJs(w.ar)}', event)`}">${locked ? '🔒 Озвучка' : '🔊 Слушать'}</button>
              <button class="btn ${fav ? 'warn' : ''}" onclick="${locked ? "showActivationPrompt()" : `toggleFavoriteDirect(${idx})`}">${locked ? '🔒 Избранное' : (fav ? '★ Уже в избранном' : '☆ В избранное')}</button>
              ${fav && !locked ? `<button class="btn" onclick="openFavModal(${idx})">✏️ Изменить перевод</button>` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderFavorites() {
    if (!user) return '<div class="empty">Войдите через Google, чтобы использовать избранное</div>';
    if (isPremiumLocked()) return renderLockedFeature('Избранное');

    const favQuery = (document.getElementById('favSearchInput')?.value || '').trim().toLowerCase();
    const favQueryNormalized = normalize(favQuery);

    let items = [...favorites].filter(f => {
      if (!favQuery) return true;
      const ar = String(f.ar || '').toLowerCase();
      const ru = String(f.customRu || '').toLowerCase();
      const ruSource = String(f.ruSource || '').toLowerCase();
      return ru.includes(favQuery) || ruSource.includes(favQuery) || ar.includes(favQuery) || normalize(ar).includes(favQueryNormalized);
    });

    items.sort((a, b) => Number(b.ts || 0) - Number(a.ts || 0));
    if (!items.length) return `<div class="empty">${favQuery ? 'Ничего не найдено в избранном' : 'В избранном пока пусто'}</div>`;

    return items.map(f => `

        <div class="item-head">
          <div class="item-left">
            <div class="ru">${escapeHtml(f.customRu || '')}</div>

    const noteTab = document.getElementById('tabNotes');

    favTab.textContent = locked ? '⭐ Избранное 🔒' : '⭐ Избранное';
    noteTab.textContent = locked ? '📝 Блокнот 🔒' : '📝 Блокнот';
    document.getElementById('notesComposer').style.display = activeTab === 'notes' && user && !locked ? 'block' : 'none';
    document.getElementById('favSearchWrap').style.display = activeTab === 'fav' && user && !locked ? 'block' : 'none';

    if (activeTab === 'dict') listEl.innerHTML = renderDictionary();
    else if (activeTab === 'fav') listEl.innerHTML = renderFavorites();
    else listEl.innerHTML = renderNotes();

    if (typeof unsubAccess === 'function') { unsubAccess(); unsubAccess = null; }
    if (typeof unsubFavs === 'function') { unsubFavs(); unsubFavs = null; }
    if (typeof unsubNotes === 'function') { unsubNotes(); unsubNotes = null; }
    favSnapshotPending = false;
    noteSnapshotPending = false;
    userAccess = { premiumActive: false, premiumUntilMs: 0 };
    updateSyncIndicator();
    updateTrialIndicator();
  }

  function startUserListeners() {
    if (!user) return;

    unsubAccess = db.collection('users').doc(user.uid)
      .onSnapshot((doc) => {
        const data = doc.exists ? (doc.data() || {}) : {};
        let premiumEndMs = 0;
        let isActive = !!(data.premiumActive || data.premium || data.isPremium);

        if (data.premiumUntil) {
          if (typeof data.premiumUntil === 'string') {
            const parsedMs = new Date(data.premiumUntil).getTime();
            if (!isNaN(parsedMs)) {
              premiumEndMs = parsedMs;
              isActive = true;
            }
          } else {
            premiumEndMs = Number(data.premiumUntil);
          }
        } else if (data.premiumUntilMs || data.accessUntilMs) {
          premiumEndMs = Number(data.premiumUntilMs || data.accessUntilMs || 0);
        }

        userAccess = {
          premiumActive: isActive,
          premiumUntilMs: premiumEndMs
        };
        updateTrialIndicator();
        renderApp();
      }, (e) => {
        console.error(e);
        userAccess = { premiumActive: false, premiumUntilMs: 0 };
        updateTrialIndicator();
      });

    unsubFavs = db.collection('users').doc(user.uid).collection('favorites')
      .onSnapshot((snap) => {
        favSnapshotPending = !!snap.metadata.hasPendingWrites;
        favorites = snap.docs.map(doc => ({ id: doc.id, ...(doc.data() || {}) }));
        updateSyncIndicator();
        renderApp();
      }, (e) => {
        console.error(e);
        favSnapshotPending = false;
        updateSyncIndicator();
        showMsg('Ошибка синхронизации избранного');
      });

    unsubNotes = db.collection('users').doc(user.uid).collection('notes')
      .onSnapshot((snap) => {
        noteSnapshotPending = !!snap.metadata.hasPendingWrites;
        const cloud = snap.docs.map(doc => ({ id: doc.id, ...(doc.data() || {}) }));
        const temp = notes.filter(n => n.isLocalTemp);
        const merged = [...temp, ...cloud];
        const map = new Map();
        merged.forEach(n => map.set(n.id, n));
        notes = Array.from(map.values());
        updateSyncIndicator();
        renderApp();
      }, (e) => {
        console.error(e);
        noteSnapshotPending = false;
        updateSyncIndicator();
        showMsg('Ошибка синхронизации блокнота');
      });
  }

  async function toggleAuth() {
    try {
      if (user) {
        await auth.signOut();
        return;
      }
      try {
        await auth.signInWithPopup(provider);
      } catch (popupError) {
        console.error('Popup auth error:', popupError);
        const codes = [
          'auth/popup-blocked',
          'auth/popup-closed-by-user',
          'auth/cancelled-popup-request',
          'auth/operation-not-supported-in-this-environment'
        ];
        if (codes.includes(popupError.code)) {
          await auth.signInWithRedirect(provider);
          return;
        }
        throw popupError;
      }
    } catch (e) {
      console.error('Auth error:', e);
      showMsg('Ошибка входа через Google');
    }
  }

  auth.getRedirectResult().catch((e) => {
    console.error('Redirect auth error:', e);
  });

  auth.onAuthStateChanged((u) => {
    stopListeners();
    user = u;
    favorites = [];
    notes = notes.filter(n => n.isLocalTemp);

    const btn = document.getElementById('authBtn');
    const userLine = document.getElementById('userLine');

    if (user) {
      btn.innerText = `Выйти (${(user.displayName || 'Пользователь').split(' ')[0]})`;
      userLine.innerText = user.email || user.uid;
      startUserListeners();
    } else {
      btn.innerText = '🌐 Войти через Google';
      userLine.innerText = 'Не выполнен вход';
    }
    updateSyncIndicator();
    updateTrialIndicator();
    renderApp();
  });

  document.addEventListener('click', (event) => {
    if (!event.target.closest('.reading-token')) hideReadingTranslations();
  }, true);

  document.addEventListener('scroll', () => {
    hideReadingTranslations();
  }, true);

  document.addEventListener('contextmenu', (event) => {
    if (event.target.closest('.reading-box')) event.preventDefault();
  }, true);

  document.addEventListener('selectstart', (event) => {
    if (event.target.closest('.reading-box')) event.preventDefault();
  }, true);

  ['favModalWrap', 'noteEditModalWrap', 'authModalWrap'].forEach(id => {
    const modal = document.getElementById(id);
    modal.addEventListener('click', (e) => {
      if (e.target !== modal) return;
      if (id === 'favModalWrap') closeFavModal();
      if (id === 'noteEditModalWrap') closeNoteEditModal();
      if (id === 'authModalWrap') closeAuthModal();
    });
  });

  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    closeFavModal();
    closeNoteEditModal();
    closeAuthModal();
    hideReadingTranslations();
  });

  trialIndicatorEl?.addEventListener('click', () => {
    if (!user) {
      openAuthModal();
      return;
    }
    openActivationContact();
  });

  window.addEventListener('online', updateSyncIndicator);
  window.addEventListener('offline', updateSyncIndicator);

  const initStartedAt = Date.now();
  const initInterval = setInterval(() => {
    if (typeof dictBase !== 'undefined' && Array.isArray(dictBase)) {
      clearInterval(initInterval);
      setStatus(`✅ База готова: ${dictBase.length} слов`, 'ok');

      if (typeof verbsBase !== 'undefined') {
        for (const pastTense in verbsBase) {
          const presentTense = verbsBase[pastTense];
          normalizedVerbs[normalize(pastTense)] = presentTense;
          reverseVerbsMap[normalize(presentTense)] = normalize(pastTense);
        }
      }
      renderApp();
      return;
    }

    if (Date.now() - initStartedAt > 10000) {
      clearInterval(initInterval);
      setStatus('❌ Не удалось загрузить base.js или verbs.js', 'err');
    }
  }, 100);

  window.addEventListener('load', () => {
    updateSyncIndicator();
    updateTrialIndicator();
    renderApp();
  });
</script>
</body>
</html>
