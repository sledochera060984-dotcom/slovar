<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#27ae60">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <title>АРАБРУС</title>

  <script src="base.js"></script>
  <script src="verbs.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --primary: #27ae60;
      --bg: #f8fafc;
      --text: #1e293b;
      --muted: #64748b;
      --line: #e2e8f0;
      --warn: #b45309;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, system-ui, sans-serif;
      padding: env(safe-area-inset-top) 12px 40px 12px;
    }
    .app {
      max-width: 700px;
      margin: 0 auto;
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      min-height: 80vh;
      padding: 16px;
    }
    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .header img {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(39,174,96,0.2);
    }
    .header h1 {
      margin: 0;
      color: var(--primary);
      font-size: 24px;
      font-weight: 800;
    }
    .status {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 12px;
      background: #fff;
    }
    .status.ok { background: #ecfdf5; border-color: #a7f3d0; color: #059669; }
    .status.wait { background: #fffbeb; border-color: #fde68a; color: var(--warn); }
    .status.err { background: #fef2f2; border-color: #fecaca; color: var(--danger); }
    .auth-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .btn, .auth-btn, .tab, .chip {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }
    .auth-btn {
      width: 100%;
      padding: 12px;
      font-size: 14px;
    }
    .tabs {
      display: flex;
      gap: 6px;
      background: #f1f5f9;
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 14px;
    }
    .tab {
      flex: 1;
      padding: 10px 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
    }
    .tab.active {
      background: #fff;
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .search, .field, textarea {
      width: 100%;
      border: 2px solid #f1f5f9;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
      background: #fff;
      margin-bottom: 10px;
    }
    .search:focus, .field:focus, textarea:focus {
      border-color: var(--primary);
    }
    textarea {
      resize: none;
      min-height: 100px;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .toolbar .btn {
      flex: 1;
      padding: 11px 10px;
      font-size: 13px;
    }
    .btn.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .btn.warn {
      background: #fffbeb;
      color: var(--warn);
      border-color: #fde68a;
    }
    .btn.danger {
      background: #fef2f2;
      color: var(--danger);
      border-color: #fecaca;
    }
    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 10px;
      margin-bottom: 6px;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      white-space: nowrap;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      color: var(--muted);
    }
    .chip.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 26px 10px;
      font-size: 14px;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 60px;
    }
    .item {
      border: 1px solid #eef2f7;
      border-radius: 16px;
      padding: 14px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .item.collapsible { cursor: pointer; }
    .item-details {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed #e2e8f0;
    }
    .item.expanded .item-details { display: block; }
    .item-head {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: space-between;
    }
    .item-left {
      flex: 1;
      min-width: 0;
    }
    .ru {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.45;
      color: #334155;
      margin-bottom: 6px;
      white-space: pre-wrap;
    }
    .ar {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
      direction: rtl;
      line-height: 1.25;
      word-break: break-word;
      text-align: right;
    }
    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      white-space: pre-wrap;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .actions .btn {
      flex: 1;
      min-width: 110px;
      padding: 10px 8px;
      font-size: 13px;
    }
    .verb-box {
      background: #f1f5f9;
      border-radius: 12px;
      padding: 10px 12px;
      margin-top: 10px;
      margin-bottom: 2px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      font-size: 14px;
      color: #475569;
    }
    .verb-box span {
      direction: rtl;
      color: var(--primary);
      font-size: 20px;
      font-weight: 800;
    }
    .section-note {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.45;
    }
    .toast {
      display: none;
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      background: #1e293b;
      color: #fff;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      z-index: 9999;
      box-shadow: 0 8px 30px rgba(0,0,0,0.18);
      white-space: nowrap;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.56);
      z-index: 9998;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: #fff;
      width: 100%;
      max-width: 420px;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 22px 44px rgba(0,0,0,0.18);
    }
    .modal h3 {
      margin: 0 0 10px;
      text-align: center;
    }
    .modal .ar-preview {
      font-size: 30px;
      font-weight: 800;
      color: var(--primary);
      direction: rtl;
      text-align: center;
      margin-bottom: 14px;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .user-line {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <img src="icon.png" alt="Logo" onerror="this.style.display='none'">
      <h1>АРАБРУС</h1>
    </div>

    <div id="status" class="status wait">⏳ Подключение базы...</div>
    <div id="userLine" class="user-line">Не выполнен вход</div>

    <div class="auth-row">
      <button id="authBtn" class="auth-btn" onclick="toggleAuth()">🌐 Войти через Google</button>
    </div>

    <div class="tabs">
      <button id="tabDict" class="tab active" onclick="switchTab('dict')">📚 Словарь</button>
      <button id="tabFav" class="tab" onclick="switchTab('fav')">⭐ Избранное</button>
      <button id="tabNotes" class="tab" onclick="switchTab('notes')">📝 Блокнот</button>
    </div>

    <div id="dictSection">
      <input id="queryInput" class="search" type="text" placeholder="Поиск (дверь, باب, قال, يقول)..." oninput="renderApp()" autocomplete="off">
    </div>

    <div id="notesComposer" style="display:none;">
      <div class="section-note">Это новая упрощённая версия: меньше эффектов, но надёжнее логика хранения и синхронизации.</div>
      <input id="manualAr" class="field" type="text" placeholder="Текст на арабском">
      <textarea id="manualRu" placeholder="Перевод на русский"></textarea>
      <div class="toolbar">
        <button class="btn primary" onclick="saveNote()">💾 Сохранить в блокнот</button>
      </div>
    </div>

    <div id="chips" class="chips" style="display:none;"></div>
    <div id="list" class="list"></div>
  </div>

  <div id="favModalWrap" class="modal-overlay">
    <div class="modal">
      <h3 id="favModalTitle">В избранное</h3>
      <div id="favModalAr" class="ar-preview"></div>
      <input id="favModalRu" class="field" type="text" placeholder="Ваш перевод">
      <div class="modal-actions">
        <button class="btn primary" onclick="confirmFavModal()">💾 Сохранить</button>
        <button class="btn" onclick="closeFavModal()">Отмена</button>
      </div>
    </div>
  </div>

  <div id="folderModalWrap" class="modal-overlay">
    <div class="modal">
      <h3>Папка</h3>
      <div id="folderModalDesc" class="section-note" style="text-align:center; margin-bottom:12px;"></div>
      <input id="folderInput" class="field" type="text" placeholder="Например: Повторить">
      <div class="modal-actions">
        <button class="btn primary" onclick="confirmFolderModal()">💾 Сохранить</button>
        <button class="btn" onclick="closeFolderModal()">Отмена</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">Сообщение</div>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }

  const firebaseConfig = {
    apiKey: "AIzaSyDDwIWq8VCk-ivjjCJJZoio-wGD2gU1rtE",
    authDomain: "arabus-dict-96c12.firebaseapp.com",
    projectId: "arabus-dict-96c12",
    storageBucket: "arabus-dict-96c12.firebasestorage.app",
    messagingSenderId: "814248156149",
    appId: "1:814248156149:web:e2acce197a00eb3ceb5ebc"
  };

  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const provider = new firebase.auth.GoogleAuthProvider();

  db.enablePersistence().catch((err) => {
    console.error('Persistence error:', err);
  });

  let user = null;
  let activeTab = 'dict';
  let activeCollection = 'Все';
  let toastTimer = null;
  let currentRenderedWords = [];
  let normalizedVerbs = {};
  let reverseVerbsMap = {};
  let favModalWord = null;
  let folderModalMode = null;
  let folderModalTargetId = null;
  let favorites = [];
  let notes = [];
  let unsubFavs = null;
  let unsubNotes = null;

  const statusEl = document.getElementById('status');
  const listEl = document.getElementById('list');
  const chipsEl = document.getElementById('chips');

  function showMsg(text) {
    const t = document.getElementById('toast');
    t.innerText = text;
    t.style.display = 'block';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.style.display = 'none', 2600);
  }

  function setStatus(text, cls) {
    statusEl.className = 'status ' + cls;
    statusEl.innerText = text;
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escapeJs(value) {
    return String(value ?? '')
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'")
      .replace(/\n/g, '\\n')
      .replace(/\r/g, '\\r')
      .replace(/\u2028/g, '\\u2028')
      .replace(/\u2029/g, '\\u2029');
  }

  function normalize(t) {
    if (!t) return '';
    let res = String(t).toLowerCase()
      .replace(/[\u064B-\u0652]/g, '')
      .replace(/[أإآ]/g, 'ا')
      .trim();
    if (res.length > 3 && res.startsWith('ال')) res = res.substring(2);
    return res;
  }

  function hashString(str) {
    let h = 2166136261;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
    }
    return (h >>> 0).toString(36);
  }

  function makeFavId(ar, ru) {
    return 'fav_' + hashString(String(ar).trim() + '||' + String(ru).trim());
  }

  function getArabicStems(word) {
    if (!word) return [];
    let stems = [word];
    let w = word;
    if (w.startsWith('س') && w.length > 3) w = w.substring(1);
    if (w.length >= 3 && /^[يتنا]/.test(w)) {
      let core = w.substring(1);
      if (core.endsWith('ون') || core.endsWith('ين') || core.endsWith('ان') || core.endsWith('وا') || core.endsWith('ات')) {
        core = core.substring(0, core.length - 2);
      }
      stems.push(core);
    }
    if (word.endsWith('وا') || word.endsWith('تم') || word.endsWith('نا')) stems.push(word.substring(0, word.length - 2));
    if (word.endsWith('ت')) stems.push(word.substring(0, word.length - 1));
    return stems;
  }

  function speak(text, e) {
    if (e) e.stopPropagation();
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ar-SA';
      window.speechSynthesis.speak(u);
    } catch (_) {}
  }

  function getFavoriteByWord(w) {
    const id = makeFavId(w.ar, w.ru);
    return favorites.find(f => f.id === id) || null;
  }

  function getCollectionsForFavorites() {
    const set = new Set(['Все']);
    favorites.forEach(f => {
      if (f.collection && String(f.collection).trim()) set.add(String(f.collection).trim());
    });
    return Array.from(set);
  }

  function getCollectionsForNotes() {
    const set = new Set(['Все']);
    notes.forEach(n => {
      if (n.collection && String(n.collection).trim()) set.add(String(n.collection).trim());
    });
    return Array.from(set);
  }

  function renderCollections() {
    let cols = [];
    if (activeTab === 'fav') cols = getCollectionsForFavorites();
    else if (activeTab === 'notes') cols = getCollectionsForNotes();

    if (!cols.length || activeTab === 'dict') {
      chipsEl.style.display = 'none';
      chipsEl.innerHTML = '';
      return;
    }

    if (!cols.includes(activeCollection)) activeCollection = 'Все';

    chipsEl.style.display = 'flex';
    chipsEl.innerHTML = cols.map(c =>
      `<button class="chip ${c === activeCollection ? 'active' : ''}" onclick="selectCollection('${escapeJs(c)}')">${escapeHtml(c)}</button>`
    ).join('');
  }

  function selectCollection(name) {
    activeCollection = name;
    renderApp();
  }

  function openFavModal(idx) {
    const w = currentRenderedWords[idx];
    favModalWord = w;
    const existing = getFavoriteByWord(w);
    document.getElementById('favModalAr').innerText = w.ar;
    document.getElementById('favModalRu').value = existing?.customRu || w.short_ru || String(w.ru || '').split(';')[0];
    document.getElementById('favModalTitle').innerText = existing ? 'Изменить перевод' : 'В избранное';
    document.getElementById('favModalWrap').style.display = 'flex';
    setTimeout(() => document.getElementById('favModalRu').focus(), 50);
  }

  function closeFavModal() {
    favModalWord = null;
    document.getElementById('favModalWrap').style.display = 'none';
  }

  async function confirmFavModal() {
    if (!user) {
      showMsg('Сначала войдите через Google');
      return;
    }
    if (!favModalWord) return;

    const w = favModalWord;
    const id = makeFavId(w.ar, w.ru);
    const customRu = document.getElementById('favModalRu').value.trim() || w.short_ru || String(w.ru || '').split(';')[0];
    const existing = getFavoriteByWord(w);

    const payload = {
      ar: w.ar,
      ruSource: w.ru,
      customRu,
      collection: existing?.collection || '',
      ts: existing?.ts || Date.now(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    try {
      await db.collection('users').doc(user.uid).collection('favorites').doc(id).set(payload, { merge: true });
      closeFavModal();
      showMsg(existing ? 'Перевод обновлён' : 'Добавлено в избранное');
    } catch (e) {
      console.error(e);
      showMsg('Ошибка сохранения');
    }
  }

  async function toggleFavoriteDirect(idx) {
    if (!user) {
      showMsg('Сначала войдите через Google');
      return;
    }
    const w = currentRenderedWords[idx];
    const existing = getFavoriteByWord(w);
    if (existing) {
      try {
        await db.collection('users').doc(user.uid).collection('favorites').doc(existing.id).delete();
        showMsg('Удалено из избранного');
      } catch (e) {
        console.error(e);
        showMsg('Ошибка удаления');
      }
    } else {
      openFavModal(idx);
    }
  }

  function openFolderModal(mode, id, label) {
    folderModalMode = mode;
    folderModalTargetId = id;
    document.getElementById('folderModalDesc').innerText = label;
    document.getElementById('folderInput').value = '';
    document.getElementById('folderModalWrap').style.display = 'flex';
    setTimeout(() => document.getElementById('folderInput').focus(), 50);
  }

  function closeFolderModal() {
    folderModalMode = null;
    folderModalTargetId = null;
    document.getElementById('folderModalWrap').style.display = 'none';
  }

  async function confirmFolderModal() {
    const value = document.getElementById('folderInput').value.trim();
    if (!user || !folderModalTargetId || !folderModalMode) {
      closeFolderModal();
      return;
    }

    try {
      if (folderModalMode === 'fav') {
        await db.collection('users').doc(user.uid).collection('favorites').doc(folderModalTargetId).update({
          collection: value,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      } else if (folderModalMode === 'note') {
        await db.collection('users').doc(user.uid).collection('notes').doc(folderModalTargetId).update({
          collection: value,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
      closeFolderModal();
      showMsg('Папка сохранена');
    } catch (e) {
      console.error(e);
      showMsg('Ошибка сохранения папки');
    }
  }

  async function removeFavorite(id) {
    if (!user) return;
    try {
      await db.collection('users').doc(user.uid).collection('favorites').doc(id).delete();
      showMsg('Удалено из избранного');
    } catch (e) {
      console.error(e);
      showMsg('Ошибка удаления');
    }
  }

  async function removeFavoriteFromFolder(id) {
    if (!user) return;
    try {
      await db.collection('users').doc(user.uid).collection('favorites').doc(id).update({
        collection: '',
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showMsg('Убрано из папки');
    } catch (e) {
      console.error(e);
      showMsg('Ошибка изменения папки');
    }
  }

  async function removeNote(id) {
    if (!user) return;
    try {
      await db.collection('users').doc(user.uid).collection('notes').doc(id).delete();
      showMsg('Запись удалена');
    } catch (e) {
      console.error(e);
      showMsg('Ошибка удаления');
    }
  }

  async function removeNoteFromFolder(id) {
    if (!user) return;
    try {
      await db.collection('users').doc(user.uid).collection('notes').doc(id).update({
        collection: '',
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showMsg('Убрано из папки');
    } catch (e) {
      console.error(e);
      showMsg('Ошибка изменения папки');
    }
  }

  async function saveNote() {
    if (!user) {
      showMsg('Сначала войдите через Google');
      return;
    }

    const ar = document.getElementById('manualAr').value.trim();
    const ru = document.getElementById('manualRu').value.trim();
    if (!ar || !ru) {
      showMsg('Заполните оба поля');
      return;
    }

    const localTempId = 'temp_' + Date.now();
    notes.unshift({
      id: localTempId,
      ar,
      ru,
      collection: '',
      ts: Date.now(),
      isLocalTemp: true
    });
    renderApp();

    document.getElementById('manualAr').value = '';
    document.getElementById('manualRu').value = '';
    showMsg('Фраза добавлена');

    try {
      await db.collection('users').doc(user.uid).collection('notes').add({
        ar,
        ru,
        collection: '',
        ts: Date.now(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      notes = notes.filter(n => n.id !== localTempId);
      renderApp();
    } catch (e) {
      console.error(e);
      notes = notes.filter(n => n.id !== localTempId);
      renderApp();
      showMsg('Ошибка сохранения');
    }
  }

  function switchTab(tab) {
    activeTab = tab;
    activeCollection = 'Все';
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.getElementById({ dict: 'tabDict', fav: 'tabFav', notes: 'tabNotes' }[tab]).classList.add('active');
    document.getElementById('dictSection').style.display = tab === 'dict' ? 'block' : 'none';
    document.getElementById('notesComposer').style.display = tab === 'notes' ? 'block' : 'none';
    renderApp();
  }

  function renderDictionary() {
    if (typeof dictBase === 'undefined' || !Array.isArray(dictBase)) return '<div class="empty">База ещё не загружена</div>';

    const q = document.getElementById('queryInput').value.toLowerCase().trim();
    if (!q) return '<div class="empty">Начните вводить слово для поиска</div>';

    const nQ = normalize(q);
    const stems = getArabicStems(nQ);
    const mappedPastTense = reverseVerbsMap[nQ];

    const filtered = dictBase.filter(w => {
      const nWordAr = normalize(w.ar);
      const nRoot = normalize(w.root || '');
      const nWordRu = String(w.ru || '').toLowerCase();

      if (nWordRu.includes(q)) return true;
      if (mappedPastTense && nWordAr === mappedPastTense) return true;
      for (const stem of stems) {
        if (nWordAr.includes(stem) || (nRoot && nRoot.includes(stem))) return true;
      }
      return false;
    });

    filtered.sort((a, b) => {
      const normAAr = normalize(a.ar);
      const normBAr = normalize(b.ar);
      const ruA = String(a.short_ru || a.ru || '').toLowerCase().replace(/^[\d\)\s]+/, '');
      const ruB = String(b.short_ru || b.ru || '').toLowerCase().replace(/^[\d\)\s]+/, '');
      if (mappedPastTense) {
        if (normAAr === mappedPastTense && normBAr !== mappedPastTense) return -1;
        if (normBAr === mappedPastTense && normAAr !== mappedPastTense) return 1;
      }
      if (normAAr === nQ && normBAr !== nQ) return -1;
      if (normBAr === nQ && normAAr !== nQ) return 1;
      const startsRuA = ruA.startsWith(q);
      const startsRuB = ruB.startsWith(q);
      if (startsRuA && !startsRuB) return -1;
      if (startsRuB && !startsRuA) return 1;
      return String(a.ru || '').length - String(b.ru || '').length;
    });

    currentRenderedWords = filtered.slice(0, 50);

    if (!currentRenderedWords.length) return '<div class="empty">Ничего не найдено</div>';

    return currentRenderedWords.map((w, idx) => {
      const fav = getFavoriteByWord(w);
      const present = normalizedVerbs[normalize(w.ar)];
      return `
        <div class="item">
          <div class="item-head">
            <div class="item-left">
              <div class="ru">${escapeHtml(w.short_ru || String(w.ru || '').split(';')[0] || '')}</div>
              <div class="ar">${escapeHtml(w.ar)}</div>
              <div class="hint">${escapeHtml(w.ru || '')}</div>
            </div>
          </div>
          ${present ? `<div class="verb-box"><div>Настоящее время</div><span>${escapeHtml(present)}</span></div>` : ''}
          <div class="actions">
            <button class="btn" onclick="speak('${escapeJs(w.ar)}', event)">🔊 Слушать</button>
            <button class="btn ${fav ? 'warn' : ''}" onclick="toggleFavoriteDirect(${idx})">${fav ? '★ Уже в избранном' : '☆ В избранное'}</button>
            ${fav ? `<button class="btn" onclick="openFavModal(${idx})">✏️ Изменить перевод</button>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  function renderFavorites() {
    if (!user) return '<div class="empty">Войдите через Google, чтобы использовать избранное</div>';

    let items = [...favorites];
    if (activeCollection !== 'Все') items = items.filter(f => String(f.collection || '') === activeCollection);
    items.sort((a, b) => Number(b.ts || 0) - Number(a.ts || 0));

    if (!items.length) return '<div class="empty">В избранном пока пусто</div>';

    return items.map(f => `
      <div class="item collapsible" onclick="this.classList.toggle('expanded')">
        <div class="item-head">
          <div class="item-left">
            <div class="ru">${escapeHtml(f.customRu || '')}</div>
            <div class="ar">${escapeHtml(f.ar || '')}</div>
          </div>
        </div>

        <div class="item-details" onclick="event.stopPropagation()">
          <div class="hint">${escapeHtml(f.ruSource || '')}</div>
          ${f.collection ? `<div class="hint">📁 ${escapeHtml(f.collection)}</div>` : ''}

          <div class="actions">
            <button class="btn" onclick="speak('${escapeJs(f.ar || '')}', event)">🔊 Слушать</button>
            <button class="btn" onclick="openFolderModal('fav', '${escapeJs(f.id)}', 'Укажите папку для слова')">📁 В папку</button>
            ${f.collection ? `<button class="btn warn" onclick="removeFavoriteFromFolder('${escapeJs(f.id)}')">📂 Убрать из папки</button>` : ''}
            <button class="btn danger" onclick="removeFavorite('${escapeJs(f.id)}')">🗑 Удалить</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function renderNotes() {

    if (!user) return '<div class="empty">Войдите через Google, чтобы использовать блокнот</div>';

    let items = [...notes];
    if (activeCollection !== 'Все') items = items.filter(n => String(n.collection || '') === activeCollection);
    items.sort((a, b) => Number(b.ts || 0) - Number(a.ts || 0));

    if (!items.length) return '<div class="empty">В блокноте пока пусто</div>';

    return items.map(n => `
      <div class="item">
        <div class="item-head">
          <div class="item-left">
            <div class="ru">${escapeHtml(n.ru || '')}</div>
            <div class="ar">${escapeHtml(n.ar || '')}</div>
            ${n.collection ? `<div class="hint">📁 ${escapeHtml(n.collection)}</div>` : ''}
          </div>
        </div>
        <div class="actions">
          <button class="btn" onclick="speak('${escapeJs(n.ar || '')}', event)">🔊 Слушать</button>
          <button class="btn" onclick="openFolderModal('note', '${escapeJs(n.id)}', 'Укажите папку для записи')">📁 В папку</button>
          ${n.collection ? `<button class="btn warn" onclick="removeNoteFromFolder('${escapeJs(n.id)}')">📂 Убрать из папки</button>` : ''}
          <button class="btn danger" onclick="removeNote('${escapeJs(n.id)}')">🗑 Удалить</button>
        </div>
      </div>
    `).join('');
  }

  function renderApp() {
    renderCollections();
    if (activeTab === 'dict') listEl.innerHTML = renderDictionary();
    else if (activeTab === 'fav') listEl.innerHTML = renderFavorites();
    else listEl.innerHTML = renderNotes();
  }

  function stopListeners() {
    if (typeof unsubFavs === 'function') { unsubFavs(); unsubFavs = null; }
    if (typeof unsubNotes === 'function') { unsubNotes(); unsubNotes = null; }
  }

  function startUserListeners() {
    if (!user) return;

    unsubFavs = db.collection('users').doc(user.uid).collection('favorites')
      .onSnapshot((snap) => {
        favorites = snap.docs.map(doc => ({ id: doc.id, ...(doc.data() || {}) }));
        renderApp();
      }, (e) => {
        console.error(e);
        showMsg('Ошибка синхронизации избранного');
      });

    unsubNotes = db.collection('users').doc(user.uid).collection('notes')
      .onSnapshot((snap) => {
        const cloud = snap.docs.map(doc => ({ id: doc.id, ...(doc.data() || {}) }));
        const temp = notes.filter(n => n.isLocalTemp);
        const merged = [...temp, ...cloud];
        const map = new Map();
        merged.forEach(n => map.set(n.id, n));
        notes = Array.from(map.values());
        renderApp();
      }, (e) => {
        console.error(e);
        showMsg('Ошибка синхронизации блокнота');
      });
  }

  async function toggleAuth() {
    try {
      if (user) {
        await auth.signOut();
        return;
      }
      try {
        await auth.signInWithPopup(provider);
      } catch (popupError) {
        console.error('Popup auth error:', popupError);
        const codes = [
          'auth/popup-blocked',
          'auth/popup-closed-by-user',
          'auth/cancelled-popup-request',
          'auth/operation-not-supported-in-this-environment'
        ];
        if (codes.includes(popupError.code)) {
          await auth.signInWithRedirect(provider);
          return;
        }
        throw popupError;
      }
    } catch (e) {
      console.error('Auth error:', e);
      showMsg('Ошибка входа через Google');
    }
  }

  auth.getRedirectResult().catch((e) => {
    console.error('Redirect auth error:', e);
  });

  auth.onAuthStateChanged((u) => {
    stopListeners();
    user = u;
    favorites = [];
    notes = notes.filter(n => n.isLocalTemp);

    const btn = document.getElementById('authBtn');
    const userLine = document.getElementById('userLine');

    if (user) {
      btn.innerText = `Выйти (${(user.displayName || 'Пользователь').split(' ')[0]})`;
      userLine.innerText = user.email || user.uid;
      startUserListeners();
    } else {
      btn.innerText = '🌐 Войти через Google';
      userLine.innerText = 'Не выполнен вход';
    }
    renderApp();
  });

  const initStartedAt = Date.now();
  const initInterval = setInterval(() => {
    if (typeof dictBase !== 'undefined' && Array.isArray(dictBase)) {
      clearInterval(initInterval);
      setStatus(`✅ База готова: ${dictBase.length} слов`, 'ok');

      if (typeof verbsBase !== 'undefined') {
        for (const pastTense in verbsBase) {
          const presentTense = verbsBase[pastTense];
          normalizedVerbs[normalize(pastTense)] = presentTense;
          reverseVerbsMap[normalize(presentTense)] = normalize(pastTense);
        }
      }
      renderApp();
      return;
    }

    if (Date.now() - initStartedAt > 10000) {
      clearInterval(initInterval);
      setStatus('❌ Не удалось загрузить base.js или verbs.js', 'err');
    }
  }, 100);

  ['favModalWrap', 'folderModalWrap'].forEach(id => {
    const modal = document.getElementById(id);
    modal.addEventListener('click', (e) => {
      if (e.target !== modal) return;
      if (id === 'favModalWrap') closeFavModal();
      if (id === 'folderModalWrap') closeFolderModal();
    });
  });

  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    closeFavModal();
    closeFolderModal();
  });

  window.addEventListener('load', () => renderApp());
</script>
</body>
</html>
