    <style>
        :root { --primary: #27ae60; --bg: #f8fafc; --text: #1e293b; --gray: #64748b; }

<body>

<div class="card">
    <div id="status" class="status-bar status-wait">⏳ Подключение базы...</div>
    
    <button id="authBtn" class="auth-btn" onclick="toggleAuth()">🌐 Войти через Google</button>

    <div class="tabs">
        <button id="tabDict" class="tab active" onclick="switchTab('dict')">📚 Словарь</button>
        <button id="tabFav" class="tab" onclick="switchTab('fav')">⭐ Избранное</button>
        <button id="tabTrans" class="tab" onclick="switchTab('trans')">📝 Блокнот</button>
    </div>

    <!-- Поиск (Словарь) -->
    <div id="searchSection">
        <input type="text" id="queryInput" placeholder="Поиск (дверь, باب, يقول, كتبت)..." oninput="doSearch()" autocomplete="off">
    </div>

    <!-- Ручной Блокнот -->
    <div id="translatorSection" style="display:none;">
        <input type="text" id="manualAr" placeholder="Текст на арабском (напр: سيارة)...">
        <textarea id="manualRu" placeholder="Перевод на русский (напр: машина)..."></textarea>
        <button class="btn btn-green" style="width: 100%; margin-bottom: 15px;" onclick="saveManualNote()">💾 Сохранить в блокнот</button>
        <div style="font-size: 11px; color: var(--gray); margin: 10px 0 8px 0; font-weight: 800; text-transform: uppercase;">Мои Сохраненные Записи:</div>
    </div>
    
    <div id="list" class="list"></div>
</div>

<!-- Модальное окно -->
<div id="favModal">
    <div class="modal-card">
        <h3 style="margin-top:0; margin-bottom:15px; color:#1e293b; text-align: center;">Добавить в избранное</h3>
        <div id="favModalAr" class="modal-ar"></div>
        <label style="font-size:12px; color:var(--gray); font-weight:800; text-transform:uppercase;">Ваш точный перевод:</label>
        <input type="text" id="favModalRu" style="margin-top:8px; margin-bottom:20px; font-weight: bold; color: #1e293b;">
        <div style="display:flex; gap:10px;">
            <button class="btn btn-green" onclick="confirmFavModal()">💾 Сохранить</button>
            <button class="btn" onclick="closeFavModal()">Отмена</button>
        </div>
    </div>
</div>

<div id="toast">Сообщение</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(()=>{}); });
    }

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'arabus-v22-roots';
    
    let user = null;
    let localFavs = JSON.parse(localStorage.getItem('arabus_favs')) || [];
    let favCustom = JSON.parse(localStorage.getItem('arabus_favs_custom')) || {}; 
    let myNotes = []; 
    let activeTab = 'dict';
    let currentRenderedWords = []; 

    function showMsg(text) {
        const t = document.getElementById('toast');
        t.innerText = text; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    // Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDDwIWq8VCk-ivjjCJJZoio-wGD2gU1rtE",
      authDomain: "arabus-dict-96c12.firebaseapp.com",
      projectId: "arabus-dict-96c12",
      storageBucket: "arabus-dict-96c12.firebasestorage.app",
      messagingSenderId: "814248156149",
      appId: "1:814248156149:web:e2acce197a00eb3ceb5ebc"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    db.enablePersistence().catch(function(err) {});

    const initInterval = setInterval(() => {
        const s = document.getElementById('status');
        if (typeof dictBase !== 'undefined' && Array.isArray(dictBase)) {
            s.innerText = `✅ База готова: ${dictBase.length} слов`;
            s.className = "status-bar status-ready";
            clearInterval(initInterval);
            renderUI();
        }
    }, 100);

    auth.onAuthStateChanged(async (u) => {
        user = u;
        const btn = document.getElementById('authBtn');
        if (user) {
            btn.innerText = `Выйти (${user.displayName.split(' ')[0]})`;
            startLiveSync();
        } else {
            btn.innerText = "🌐 Войти через Google";
        }
        renderUI();
    });

    function startLiveSync() {
        if (!user) return;
        
        db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('data').doc('favs')
          .onSnapshot(doc => {
              if (doc.exists) {
                  localFavs = doc.data().list || [];
                  favCustom = doc.data().custom || {};
                  localStorage.setItem('arabus_favs', JSON.stringify(localFavs));
                  localStorage.setItem('arabus_favs_custom', JSON.stringify(favCustom));
                  renderUI();
              }
          });

        db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('notes')
          .onSnapshot(snap => {
              myNotes = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              if (activeTab === 'trans') renderUI();
          });
    }

    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
            if (user) { db.enableNetwork().catch(() => {}); }
            renderUI();
        }
    });

    // --- УНИКАЛЬНОЕ ИЗБРАННОЕ ---
    function handleFavClick(idx, e) {
        e.stopPropagation();
        const w = currentRenderedWords[idx];
        const itemKey = w.ar + '::' + w.ru; 
        
        if (localFavs.includes(itemKey) || localFavs.includes(w.ar)) {
            localFavs = localFavs.filter(v => v !== itemKey && v !== w.ar);
            delete favCustom[itemKey]; delete favCustom[w.ar];
            saveFavsToCloud(); renderUI();
        } else {
            window.wordToAddKey = itemKey;
            document.getElementById('favModalAr').innerText = w.ar;
            document.getElementById('favModalRu').value = w.short_ru || w.ru.split(';')[0];
            document.getElementById('favModal').style.display = 'flex';
            setTimeout(() => document.getElementById('favModalRu').focus(), 100);
        }
    }

    function confirmFavModal() {
        const key = window.wordToAddKey;
        const ru = document.getElementById('favModalRu').value.trim();
        if (!key || !ru) { showMsg("Заполните перевод!"); return; }

        if (!localFavs.includes(key)) localFavs.push(key);
        favCustom[key] = ru; 
        saveFavsToCloud(); closeFavModal(); renderUI();
    }

    function closeFavModal() {
        document.getElementById('favModal').style.display = 'none';
        window.wordToAddKey = null;
    }

    async function saveFavsToCloud() {
        localStorage.setItem('arabus_favs', JSON.stringify(localFavs));
        localStorage.setItem('arabus_favs_custom', JSON.stringify(favCustom));
        showMsg("Избранное обновлено");
        if (user) {
            try { await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('data').doc('favs').set({ list: localFavs, custom: favCustom }); } 
            catch(e) {}
        }
    }

    // --- БЛОКНОТ ---
    async function saveManualNote() {
        const ar = document.getElementById('manualAr').value.trim();
        const ru = document.getElementById('manualRu').value.trim();
        if (!ar || !ru) { showMsg("Заполните оба поля!"); return; }
        if (!user) { showMsg("Войдите в аккаунт!"); return; }
        try {
            await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('notes').add({ ar, ru, ts: Date.now() });
            document.getElementById('manualAr').value = ""; document.getElementById('manualRu').value = ""; showMsg("Фраза сохранена!");
        } catch (e) { showMsg("Сохранено локально."); }
    }

    async function removeNote(id, e) {
        e.stopPropagation();
        if (confirm("Удалить запись из блокнота?")) {
            await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('notes').doc(id).delete(); showMsg("Удалено");
        }
    }

    // --- УМНЫЙ ПОИСК И АНАЛИЗАТОР КОРНЕЙ (STEMMER) ---
    function doSearch() { renderUI(); }

    function normalize(t) { 
        if (!t) return "";
        let res = t.toLowerCase().replace(/[\u064B-\u0652]/g, "").replace(/[أإآ]/g, "ا").trim();
        if (res.length > 3 && res.startsWith("ال")) res = res.substring(2);
        return res;
    }

    // Алгоритм, который отбрасывает приставки и суффиксы для поиска глаголов
    function getArabicStems(word) {
        if (!word) return [];
        let stems = [word];
        let w = word;
        
        // Убираем приставку будущего времени س
        if (w.startsWith("س") && w.length > 3) w = w.substring(1);
        
        // Приставки настоящего времени (ي, ت, ن, ا) и суффиксы мн.числа/дв.числа
        if (w.length >= 3 && /^[يتنا]/.test(w)) {
            let core = w.substring(1);
            if (core.endsWith("ون") || core.endsWith("ين") || core.endsWith("ان") || core.endsWith("وا") || core.endsWith("ات")) {
                core = core.substring(0, core.length - 2);
            }
            stems.push(core); // Например: يقولون -> قول
        }
        
        // Суффиксы прошедшего времени
        if (word.endsWith("وا") || word.endsWith("تم") || word.endsWith("نا")) {
             stems.push(word.substring(0, word.length - 2)); // كتبوا -> كتب
        }
        if (word.endsWith("ت")) {
             stems.push(word.substring(0, word.length - 1)); // كتبت -> كتب
        }

        return stems;
    }

    function renderUI() {
        const list = document.getElementById('list');
        const q = document.getElementById('queryInput').value.toLowerCase().trim();
        list.innerHTML = "";
        
        if (activeTab === 'trans') {
            myNotes.sort((a,b) => b.ts - a.ts).forEach(n => {
                const el = document.createElement('div');
                el.className = 'item';
                el.innerHTML = `
                    <div onclick="this.classList.toggle('expanded')">
                        <div class="note-header">
                            <div class="note-ru">${n.ru}</div>
                            <div class="note-ar-hint">${n.ar.substring(0, 40)}</div>
                        </div>
                        <div class="details">
                            <span class="ar-full">${n.ar}</span>
                            <div class="actions">
                                <button class="btn" onclick="speak('${n.ar}', event)">🔊 Слушать</button>
                                <button class="btn btn-red" onclick="removeNote('${n.id}', event)">🗑 Удалить</button>
                            </div>
                        </div>
                    </div>`;
                list.appendChild(el);
            });
            return;
        }

        if (typeof dictBase === 'undefined') return;
        
        const nQ = normalize(q); 
        // Получаем список возможных корней, если юзер вбил глагол (например يقول)
        const searchStems = getArabicStems(nQ); 
        
        let filtered = dictBase.filter(w => {
            const itemKey = w.ar + '::' + w.ru;
            const isFav = localFavs.includes(itemKey) || localFavs.includes(w.ar);
            
            if (activeTab === 'fav' && !isFav) return false;
            if (!q) return activeTab === 'fav';
            
            const nWordAr = normalize(w.ar);
            const nWordRu = w.ru.toLowerCase();
            const nRoot = normalize(w.root || ""); 
            
            // Если ищем на русском
            if (nWordRu.includes(q)) return true;
            
            // Если ищем на арабском (проверяем слово и корень по всем формам)
            for (let stem of searchStems) {
                if (nWordAr.includes(stem) || (nRoot && nRoot.includes(stem))) return true;
            }
            
            return false;
        });

        if (q) {
            filtered.sort((a, b) => {
                const normAAr = normalize(a.ar);
                const normBAr = normalize(b.ar);
                const ruA = (a.short_ru || a.ru).toLowerCase().replace(/^[\d\)\s]+/, '');
                const ruB = (b.short_ru || b.ru).toLowerCase().replace(/^[\d\)\s]+/, '');
                
                // Приоритет прямого совпадения
                if (normAAr === nQ && normBAr !== nQ) return -1;
                if (normBAr === nQ && normAAr !== nQ) return 1;

                const startsRuA = ruA.startsWith(q);
                const startsRuB = ruB.startsWith(q);
                if (startsRuA && !startsRuB) return -1;
                if (startsRuB && !startsRuA) return 1;

                return a.ru.length - b.ru.length;
            });
        }

        currentRenderedWords = filtered.slice(0, 50);

        currentRenderedWords.forEach((w, idx) => {
            const itemKey = w.ar + '::' + w.ru;
            const active = localFavs.includes(itemKey) || localFavs.includes(w.ar);
            const customRu = favCustom[itemKey] || favCustom[w.ar];
            const displayRu = (active && customRu) ? customRu : (w.short_ru || w.ru.split(';')[0]);
            
            // Если у слова в базе есть корень, показываем его красиво
            const rootBadge = w.root ? `<div class="root-badge">Корень: <span style="color:var(--primary); font-size:14px;">${w.root}</span></div>` : '';

            const el = document.createElement('div');
            el.className = 'item';
            el.innerHTML = `
                <div onclick="this.classList.toggle('expanded')">
                    <div class="dict-row">
                        <div class="dict-ru" style="${active && customRu ? 'color: var(--primary);' : ''}">${displayRu}</div>
                        <div style="text-align: right;">
                            <div class="dict-ar">${w.ar}</div>
                            ${rootBadge}
                        </div>
                    </div>
                    <div class="details">
                        <div style="white-space: pre-wrap; margin-bottom:12px; color:#444; font-size:15px; line-height: 1.5;">${w.ru}</div>
                        <div class="actions">
                            <button class="btn" onclick="speak('${w.ar}', event)">🔊 Слушать</button>
                            <button class="btn btn-star ${active ? 'active' : ''}" onclick="handleFavClick(${idx}, event)">
                                ${active ? '★ В избранном' : '☆ В избранное'}
                            </button>
                        </div>
                    </div>
                </div>`;
            list.appendChild(el);
        });
    }

    function switchTab(t) {
        activeTab = t;
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.getElementById({ dict: 'tabDict', fav: 'tabFav', trans: 'tabTrans' }[t]).classList.add('active');
        document.getElementById('searchSection').style.display = t === 'trans' ? 'none' : 'block';
        document.getElementById('translatorSection').style.display = t === 'trans' ? 'block' : 'none';
        renderUI();
    }

    function speak(t, e) {
        e.stopPropagation(); window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t); u.lang = 'ar-SA'; window.speechSynthesis.speak(u);
    }

    async function toggleAuth() { if (user) auth.signOut(); else await auth.signInWithPopup(provider); }

    window.onload = () => { if (typeof dictBase !== 'undefined') renderUI(); };
</script>
</body>
</html>
