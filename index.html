<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Словарь‑конспект</title>
    <!--
      Этот файл представляет собой упрощённую версию словаря со встроенным
      блокнотом и избранным. Он не использует Firebase для синхронизации,
      поэтому данные хранятся только в localStorage. Перед использованием
      убедитесь, что файлы base.js и verbs.js лежат рядом и определяют
      переменные dictBase и verbs соответственно.

      Основные отличия от предыдущих версий:
      – уплотнённый интерфейс: меню избранного компактно размещено в одну
        строку, элементы списка занимают меньше места, что позволяет
        видеть 8–10 строк даже на небольших экранах;
      – скрыты карточки и режим плиток для блокнота, чтобы текст не
        растягивал страницу;
      – поиск отображает результаты в виде сворачивающихся строк:
        сначала видны лишь слово и перевод, по нажатию раскрывается
        полный текст;
      – для глаголов в списке слов отображается настоящее время;
      – слова, добавленные в избранное, помечаются значком ♥ уже в
        результатах поиска.

      При желании синхронизировать данные через Firebase можно
      расширить функции loadState() и saveState(), подключив Firestore.
    -->
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #f9f9f9;
      }
      h1 {
        margin: 0;
        padding: 0.5rem;
        font-size: 1.2rem;
        background: #284a7d;
        color: #fff;
      }
      /* Навигация */
      #nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem;
        background: #e6eef7;
        border-bottom: 1px solid #c9d6e3;
      }
      #nav button {
        background: #284a7d;
        color: white;
        border: none;
        padding: 0.3rem 0.6rem;
        border-radius: 3px;
        cursor: pointer;
        font-size: 0.85rem;
      }
      #nav button.active {
        background: #16325c;
      }
      #searchBox {
        flex: 1;
        min-width: 200px;
        padding: 0.3rem;
        font-size: 0.9rem;
        border: 1px solid #c9d6e3;
        border-radius: 3px;
      }
      /* Панели */
      .panel {
        display: none;
        padding: 0.5rem;
      }
      .panel.active {
        display: block;
      }
      /* Общий список */
      ul.list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      li.item {
        border-bottom: 1px solid #e0e8f0;
        padding: 0.4rem 0;
        cursor: pointer;
      }
      li.item > div.summary {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
      }
      li.item > div.summary span.label {
        font-weight: bold;
        color: #284a7d;
      }
      li.item > div.summary span.translation {
        color: #444;
      }
      li.item > div.summary span.verb {
        font-style: italic;
        color: #666;
        font-size: 0.8rem;
      }
      li.item > div.summary span.favorite {
        color: #e63946;
      }
      li.item div.details {
        display: none;
        margin-top: 0.3rem;
        padding-left: 0.5rem;
        font-size: 0.85rem;
        color: #333;
      }
      li.item.expanded div.details {
        display: block;
      }
      /* Меню избранного */
      #favControls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-bottom: 0.5rem;
        align-items: center;
        font-size: 0.85rem;
      }
      #favControls input[type="text"] {
        padding: 0.3rem;
        border: 1px solid #c9d6e3;
        border-radius: 3px;
      }
      #favControls select {
        padding: 0.3rem;
        border-radius: 3px;
      }
      #favControls button {
        padding: 0.3rem 0.6rem;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        background: #284a7d;
        color: white;
      }
      #favList li.item input[type="checkbox"] {
        margin-right: 0.4rem;
      }
      /* Скрытие чекбоксов вне режима выбора */
      #favList li.item:not(.select-mode) input[type="checkbox"] {
        display: none;
      }
      /* Блокнот */
      #notesControls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-bottom: 0.5rem;
        font-size: 0.85rem;
      }
      #notesList li.item {
        padding-left: 0;
      }
      #notesList li.item div.details {
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Арабско‑русский словарь</h1>
    <!-- Навигация и поиск -->
    <div id="nav">
      <input
        id="searchBox"
        type="search"
        placeholder="Поиск арабского или русского слова..."
      />
      <button id="tabDict" class="active">Словарь</button>
      <button id="tabFavs">Избранное</button>
      <button id="tabNotes">Блокнот</button>
    </div>
    <!-- Панель словаря -->
    <div id="panelDict" class="panel active">
      <ul id="dictList" class="list"></ul>
    </div>
    <!-- Панель избранного -->
    <div id="panelFavs" class="panel">
      <div id="favControls">
        <button id="favModeToggle">Выбрать</button>
        <select id="favFolderSelect"></select>
        <button id="favAddToFolder">В папку</button>
        <button id="favRemoveFromFolder">Из папки</button>
        <button id="favDelete">Удалить</button>
        <input id="favNewFolderName" type="text" placeholder="Новая папка" />
        <button id="favCreateFolder">Создать</button>
      </div>
      <ul id="favList" class="list"></ul>
    </div>
    <!-- Панель блокнота -->
    <div id="panelNotes" class="panel">
      <div id="notesControls">
        <input id="noteFilter" type="search" placeholder="Поиск в блокноте..." />
        <button id="notesDelete">Удалить выбранные</button>
      </div>
      <ul id="notesList" class="list"></ul>
    </div>
    <!-- Скрипты данных -->
    <script src="base.js"></script>
    <script src="verbs.js"></script>
    <script>
      // Helper to escape HTML
      function escapeHtml(str) {
        return String(str || "").replace(/[&<>"']/g, function (s) {
          const entityMap = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          };
          return entityMap[s];
        });
      }
      // Преобразуем verbs.js в удобную карту present time
      const presentMap = {};
      if (typeof verbs !== "undefined") {
        Object.keys(verbs).forEach((arWord) => {
          const forms = verbs[arWord];
          if (forms && forms.present) presentMap[arWord] = forms.present;
        });
      }

      // Данные приложения (favorites, notes, folders) хранятся в localStorage
      const APP_KEY = "slovarAppData";
      let appData = {
        favorites: {}, // map of favKey -> { ar, ru, folder }
        folders: [],
        notes: [], // array of { id, ar, ru, text }
      };

      function loadState() {
        try {
          const stored = localStorage.getItem(APP_KEY);
          if (stored) {
            appData = JSON.parse(stored);
          }
        } catch (e) {
          console.error("Failed to load state", e);
        }
      }

      function saveState() {
        try {
          localStorage.setItem(APP_KEY, JSON.stringify(appData));
        } catch (e) {
          console.error("Failed to save state", e);
        }
      }

      function makeFavKey(ar, ru) {
        return `${ar}::${ru}`;
      }

      // Инициализация
      loadState();

      // Элементы DOM
      const dictListEl = document.getElementById("dictList");
      const favListEl = document.getElementById("favList");
      const notesListEl = document.getElementById("notesList");

      const tabDictBtn = document.getElementById("tabDict");
      const tabFavsBtn = document.getElementById("tabFavs");
      const tabNotesBtn = document.getElementById("tabNotes");

      const panelDict = document.getElementById("panelDict");
      const panelFavs = document.getElementById("panelFavs");
      const panelNotes = document.getElementById("panelNotes");

      const searchBox = document.getElementById("searchBox");
      const favModeToggle = document.getElementById("favModeToggle");
      const favFolderSelect = document.getElementById("favFolderSelect");
      const favAddToFolder = document.getElementById("favAddToFolder");
      const favRemoveFromFolder = document.getElementById("favRemoveFromFolder");
      const favDelete = document.getElementById("favDelete");
      const favNewFolderName = document.getElementById("favNewFolderName");
      const favCreateFolder = document.getElementById("favCreateFolder");

      const noteFilter = document.getElementById("noteFilter");
      const notesDelete = document.getElementById("notesDelete");

      // Активная вкладка
      function setActiveTab(tab) {
        tabDictBtn.classList.remove("active");
        tabFavsBtn.classList.remove("active");
        tabNotesBtn.classList.remove("active");
        panelDict.classList.remove("active");
        panelFavs.classList.remove("active");
        panelNotes.classList.remove("active");
        if (tab === "dict") {
          tabDictBtn.classList.add("active");
          panelDict.classList.add("active");
        } else if (tab === "favs") {
          tabFavsBtn.classList.add("active");
          panelFavs.classList.add("active");
        } else if (tab === "notes") {
          tabNotesBtn.classList.add("active");
          panelNotes.classList.add("active");
        }
      }

      tabDictBtn.addEventListener("click", () => setActiveTab("dict"));
      tabFavsBtn.addEventListener("click", () => setActiveTab("favs"));
      tabNotesBtn.addEventListener("click", () => setActiveTab("notes"));

      // Поиск
      function renderDict() {
        const query = searchBox.value.trim().toLowerCase();
        dictListEl.innerHTML = "";
        const results = [];
        // Поиск по dictBase
        if (Array.isArray(dictBase)) {
          for (const w of dictBase) {
            const ar = (w.ar || "").toString();
            const ru = (w.ru || "").toString();
            if (!query || ar.includes(query) || ru.toLowerCase().includes(query)) {
              results.push({ ar, ru });
            }
          }
        }
        results.slice(0, 200).forEach((item) => {
          const key = makeFavKey(item.ar, item.ru);
          const li = document.createElement("li");
          li.className = "item";
          const summary = document.createElement("div");
          summary.className = "summary";
          const labelSpan = document.createElement("span");
          labelSpan.className = "label";
          labelSpan.textContent = item.ar;
          summary.appendChild(labelSpan);
          const translationSpan = document.createElement("span");
          translationSpan.className = "translation";
          translationSpan.textContent = item.ru;
          summary.appendChild(translationSpan);
          // Если глагол, показать настоящее время
          if (presentMap[item.ar]) {
            const verbSpan = document.createElement("span");
            verbSpan.className = "verb";
            verbSpan.textContent = presentMap[item.ar];
            summary.appendChild(verbSpan);
          }
          // Если слово в избранном, помечаем
          if (appData.favorites[key]) {
            const favSpan = document.createElement("span");
            favSpan.className = "favorite";
            favSpan.textContent = "♥";
            summary.appendChild(favSpan);
          }
          li.appendChild(summary);
          // Детали
          const details = document.createElement("div");
          details.className = "details";
          details.innerHTML =
            "<p><strong>Перевод:</strong> " + escapeHtml(item.ru) + "</p>" +
            (presentMap[item.ar]
              ? "<p><strong>Наст.время:</strong> " + escapeHtml(presentMap[item.ar]) + "</p>"
              : "") +
            '<p><button class="addFavBtn">В избранное</button> <button class="addNoteBtn">В блокнот</button></p>';
          li.appendChild(details);
          li.addEventListener("click", (e) => {
            // Не сворачивать, если клик по кнопке
            if (
              e.target.classList.contains("addFavBtn") ||
              e.target.classList.contains("addNoteBtn")
            )
              return;
            li.classList.toggle("expanded");
          });
          // Добавить в избранное
          details.querySelector(".addFavBtn").addEventListener("click", (e) => {
            e.stopPropagation();
            addFavorite(item);
            // Обновить значок избранного
            renderDict();
            renderFavorites();
          });
          // Добавить в блокнот
          details.querySelector(".addNoteBtn").addEventListener("click", (e) => {
            e.stopPropagation();
            const noteText = prompt(
              `Введите дополнительную информацию для слова \"${item.ar}\" (оставьте пустым для однословного заметка)`
            );
            addNote(item, noteText || "");
            renderNotes();
          });
          dictListEl.appendChild(li);
        });
      }

      searchBox.addEventListener("input", renderDict);

      // Работа с избранным
      function addFavorite(item) {
        const key = makeFavKey(item.ar, item.ru);
        if (!appData.favorites[key]) {
          appData.favorites[key] = {
            ar: item.ar,
            ru: item.ru,
            folder: "",
          };
          saveState();
        }
      }

      function removeFavorites(keys) {
        for (const k of keys) {
          delete appData.favorites[k];
        }
        saveState();
      }

      function addFavoritesToFolder(keys, folder) {
        keys.forEach((k) => {
          if (appData.favorites[k]) appData.favorites[k].folder = folder;
        });
        // Добавить папку, если её нет
        if (folder && !appData.folders.includes(folder)) {
          appData.folders.push(folder);
        }
        saveState();
      }

      function removeFavoritesFromFolder(keys) {
        keys.forEach((k) => {
          if (appData.favorites[k]) appData.favorites[k].folder = "";
        });
        saveState();
      }

      function renderFavorites() {
        favListEl.innerHTML = "";
        // Обновить список папок
        favFolderSelect.innerHTML = "<option value="">— папка —</option>";
        appData.folders.sort().forEach((f) => {
          const opt = document.createElement("option");
          opt.value = f;
          opt.textContent = f;
          favFolderSelect.appendChild(opt);
        });
        // Построить список избранного
        const entries = Object.entries(appData.favorites);
        entries.sort((a, b) => {
          // Сортируем сначала по папке, затем по слову
          const fa = a[1];
          const fb = b[1];
          if (fa.folder < fb.folder) return -1;
          if (fa.folder > fb.folder) return 1;
          return fa.ar.localeCompare(fb.ar);
        });
        const selectMode = favModeToggle.dataset.mode === "select";
        for (const [key, item] of entries) {
          const li = document.createElement("li");
          li.className = "item";
          // Для режима выбора добавляем чекбокс
          const summary = document.createElement("div");
          summary.className = "summary";
          if (selectMode) {
            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.dataset.key = key;
            summary.appendChild(checkbox);
          }
          const labelSpan = document.createElement("span");
          labelSpan.className = "label";
          labelSpan.textContent = item.ar;
          summary.appendChild(labelSpan);
          const translationSpan = document.createElement("span");
          translationSpan.className = "translation";
          translationSpan.textContent = item.ru;
          summary.appendChild(translationSpan);
          if (presentMap[item.ar]) {
            const verbSpan = document.createElement("span");
            verbSpan.className = "verb";
            verbSpan.textContent = presentMap[item.ar];
            summary.appendChild(verbSpan);
          }
          if (item.folder) {
            const folderSpan = document.createElement("span");
            folderSpan.style.background = "#d2e3f3";
            folderSpan.style.borderRadius = "3px";
            folderSpan.style.padding = "0 3px";
            folderSpan.style.fontSize = "0.75rem";
            folderSpan.textContent = item.folder;
            summary.appendChild(folderSpan);
          }
          li.appendChild(summary);
          // Детали: кнопка удалить из избранного, перенести
          const details = document.createElement("div");
          details.className = "details";
          details.innerHTML =
            `<p><strong>Перевод:</strong> ${escapeHtml(item.ru)}</p>` +
            (presentMap[item.ar]
              ? `<p><strong>Наст.время:</strong> ${escapeHtml(presentMap[item.ar])}</p>`
              : "") +
            '<p><button class="removeFavBtn">Удалить из избранного</button></p>';
          li.appendChild(details);
          li.addEventListener("click", (e) => {
            // Не сворачивать, если клик по чекбоксу или кнопке
            if (
              e.target.tagName === "INPUT" ||
              e.target.classList.contains("removeFavBtn")
            )
              return;
            li.classList.toggle("expanded");
          });
          details.querySelector(".removeFavBtn").addEventListener("click", (e) => {
            e.stopPropagation();
            removeFavorites([key]);
            renderFavorites();
          });
          favListEl.appendChild(li);
        }
      }

      // Обработчики меню избранного
      favModeToggle.addEventListener("click", () => {
        if (favModeToggle.dataset.mode === "select") {
          // Выходим из режима выбора
          favModeToggle.dataset.mode = "";
          favModeToggle.textContent = "Выбрать";
        } else {
          favModeToggle.dataset.mode = "select";
          favModeToggle.textContent = "Отмена";
        }
        renderFavorites();
      });
      favCreateFolder.addEventListener("click", () => {
        const name = favNewFolderName.value.trim();
        if (name && !appData.folders.includes(name)) {
          appData.folders.push(name);
          favNewFolderName.value = "";
          saveState();
          renderFavorites();
        }
      });
      favAddToFolder.addEventListener("click", () => {
        const folder = favFolderSelect.value || favNewFolderName.value.trim();
        if (!folder) return;
        const keys = getSelectedFavKeys();
        addFavoritesToFolder(keys, folder);
        favNewFolderName.value = "";
        renderFavorites();
      });
      favRemoveFromFolder.addEventListener("click", () => {
        const keys = getSelectedFavKeys();
        removeFavoritesFromFolder(keys);
        renderFavorites();
      });
      favDelete.addEventListener("click", () => {
        const keys = getSelectedFavKeys();
        removeFavorites(keys);
        renderFavorites();
      });
      function getSelectedFavKeys() {
        const boxes = favListEl.querySelectorAll("input[type='checkbox']:checked");
        return Array.from(boxes).map((b) => b.dataset.key);
      }

      // Работа с блокнотом
      function addNote(item, text) {
        const id = Date.now().toString(36) + Math.random().toString(36).slice(2);
        appData.notes.push({ id, ar: item.ar, ru: item.ru, text });
        saveState();
      }
      function removeNotes(ids) {
        appData.notes = appData.notes.filter((n) => !ids.includes(n.id));
        saveState();
      }
      function renderNotes() {
        notesListEl.innerHTML = "";
        const query = noteFilter.value.trim().toLowerCase();
        const selectMode = notesDelete.dataset.mode === "select";
        const notes = appData.notes.filter((n) => {
          return (
            !query ||
            n.ar.includes(query) ||
            n.ru.toLowerCase().includes(query) ||
            n.text.toLowerCase().includes(query)
          );
        });
        notes.forEach((n) => {
          const li = document.createElement("li");
          li.className = "item";
          const summary = document.createElement("div");
          summary.className = "summary";
          if (selectMode) {
            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.dataset.id = n.id;
            summary.appendChild(checkbox);
          }
          const labelSpan = document.createElement("span");
          labelSpan.className = "label";
          labelSpan.textContent = n.ar;
          summary.appendChild(labelSpan);
          const translationSpan = document.createElement("span");
          translationSpan.className = "translation";
          translationSpan.textContent = n.ru;
          summary.appendChild(translationSpan);
          li.appendChild(summary);
          const details = document.createElement("div");
          details.className = "details";
          details.innerHTML =
            `<p><strong>Перевод:</strong> ${escapeHtml(n.ru)}</p>` +
            `<p><strong>Заметка:</strong> ${escapeHtml(n.text)}</p>` +
            '<p><button class="removeNoteBtn">Удалить</button></p>';
          li.appendChild(details);
          li.addEventListener("click", (e) => {
            if (
              e.target.tagName === "INPUT" ||
              e.target.classList.contains("removeNoteBtn")
            )
              return;
            li.classList.toggle("expanded");
          });
          details.querySelector(".removeNoteBtn").addEventListener("click", (e) => {
            e.stopPropagation();
            removeNotes([n.id]);
            renderNotes();
          });
          notesListEl.appendChild(li);
        });
      }
      noteFilter.addEventListener("input", renderNotes);
      notesDelete.addEventListener("click", () => {
        if (notesDelete.dataset.mode === "select") {
          // Второе нажатие — удаляем
          const boxes = notesListEl.querySelectorAll(
            "input[type='checkbox']:checked"
          );
          const ids = Array.from(boxes).map((b) => b.dataset.id);
          removeNotes(ids);
          notesDelete.dataset.mode = "";
          notesDelete.textContent = "Удалить выбранные";
          renderNotes();
        } else {
          // Входим в режим выбора
          notesDelete.dataset.mode = "select";
          notesDelete.textContent = "Удалить";
          renderNotes();
        }
      });

      // Первичный рендер
      renderDict();
      renderFavorites();
      renderNotes();
    </script>
  </body>
</html>
