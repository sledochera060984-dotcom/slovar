
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#27ae60">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <title>АРАБРУС</title>

  <script src="base.js"></script>
  <script src="verbs.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --primary: #27ae60;
      --bg: #f8fafc;
      --text: #1e293b;
      --muted: #64748b;
      --line: #e2e8f0;
      --warn: #b45309;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, system-ui, sans-serif;
      padding: env(safe-area-inset-top) 12px 40px 12px;
    }
    .app {
      max-width: 700px;
      margin: 0 auto;
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      min-height: 80vh;
      padding: 16px;
    }
    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .header img {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(39,174,96,0.2);
    }
    .header h1 {
      margin: 0;
      color: var(--primary);
      font-size: 24px;
      font-weight: 800;
    }
    .status {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 12px;
      background: #fff;
    }
    .status.ok { background: #ecfdf5; border-color: #a7f3d0; color: #059669; }
    .status.wait { background: #fffbeb; border-color: #fde68a; color: var(--warn); }
    .status.err { background: #fef2f2; border-color: #fecaca; color: var(--danger); }
    #syncIndicator {
      transition: opacity .2s ease;
    }
    #trialIndicator {
      transition: opacity .2s ease;
      cursor: pointer;
    }
    #trialIndicator:hover {
      filter: brightness(0.98);
    }
    .lock-card {
      border: 1px dashed #cbd5e1;
      border-radius: 18px;
      background: #fff;
      padding: 18px 16px;
      text-align: center;
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .lock-card .lock-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }
    .lock-card .lock-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #0f172a;
    }
    .lock-card .lock-text {
      font-size: 14px;
      line-height: 1.45;
      color: var(--muted);
      margin-bottom: 12px;
      white-space: pre-wrap;
    }
    .btn.locked {
      opacity: 0.92;
    }
    .auth-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .btn, .auth-btn, .tab {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }
    .auth-btn {
      width: 100%;
      padding: 12px;
      font-size: 14px;
    }
    .tabs {
      display: flex;
      gap: 6px;
      background: #f1f5f9;
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 14px;
    }
    .tab {
      flex: 1;
      padding: 10px 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
    }
    .tab.active {
      background: #fff;
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .search, .field, textarea {
      width: 100%;
      border: 2px solid #f1f5f9;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
      background: #fff;
      margin-bottom: 10px;
    }
    .search:focus, .field:focus, textarea:focus {
      border-color: var(--primary);
    }
    textarea {
      resize: none;
      min-height: 100px;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .toolbar .btn {
      flex: 1;
      padding: 11px 10px;
      font-size: 13px;
    }
    .btn.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .btn.warn {
      background: #fffbeb;
      color: var(--warn);
      border-color: #fde68a;
    }
    .btn.danger {
      background: #fef2f2;
      color: var(--danger);
      border-color: #fecaca;
    }
    .chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 10px;
      margin-bottom: 6px;
    }
    .chips::-webkit-scrollbar { display: none; }
    
    .chip {
      white-space: nowrap;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      color: #475569;
      background: #e2e8f0; 
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .chip.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 2px 8px rgba(39, 174, 96, 0.3);
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 26px 10px;
      font-size: 14px;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 60px;
    }
    .item {
      border: 1px solid #eef2f7;
      border-radius: 16px;
      padding: 14px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .item.collapsible { cursor: pointer; }
    .item-details {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed #e2e8f0;
    }
    .item.expanded .item-details { display: block; }
    .item-head {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: space-between;
    }
    .item-left {
      flex: 1;
      min-width: 0;
    }
    .ru {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.45;
      color: #334155;
      margin-bottom: 6px;
      white-space: pre-wrap;
    }
    .ar {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
      direction: rtl;
      line-height: 1.25;
      word-break: break-word;
      text-align: right;
    }
    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      white-space: pre-wrap;
    }
    
    /* Новый стиль для полного перевода при раскрытии словаря */
    .full-translation {
      font-size: 14.5px;
      line-height: 1.55;
      color: #334155;
      margin-bottom: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .actions .btn {
      flex: 1;
      min-width: 110px;
      padding: 10px 8px;
      font-size: 13px;
    }
    .verb-box {
      background: #f1f5f9;
      border-radius: 12px;
      padding: 10px 12px;
      margin-top: 10px;
      margin-bottom: 2px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      font-size: 14px;
      color: #475569;
    }
    .verb-box span {
      direction: rtl;
      color: var(--primary);
      font-size: 20px;
      font-weight: 800;
    }
    .section-note {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.45;
    }
    .fav-topbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .fav-topbar .btn { flex: 1; min-width: 140px; }
    .selection-panel {
      display: none;
      background: #0f172a;
      color: #fff;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .selection-panel.active { display: block; }
    .selection-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .selection-actions .btn {
      border: none;
      background: rgba(255,255,255,0.14);
      color: #fff;
      min-width: 120px;
    }
    .selection-actions .btn.danger {
      background: #dc2626;
    }
    .select-line {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .select-box {
      width: 22px;
      height: 22px;
      accent-color: var(--primary);
      flex: 0 0 auto;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding-bottom: 30px;
    }
    .card-item {
      min-height: 180px;
      border: 1px solid #eef2f7;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      position: relative;
      perspective: 1000px;
      cursor: pointer;
    }
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 180px;
      transition: transform .55s ease;
      transform-style: preserve-3d;
    }
    .card-item.flipped .card-inner { transform: rotateY(180deg); }
    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 18px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      background: #fff;
    }
    .card-back {
      transform: rotateY(180deg);
      background: #f8fafc;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .card-star {
      position: absolute;
      top: 12px;
      right: 12px;
      color: #f59e0b;
      font-size: 18px;
      font-weight: 900;
      z-index: 2;
    }
    .card-checkbox {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 3;
      width: 22px;
      height: 22px;
      accent-color: var(--primary);
    }
    .card-front-text {
      margin: auto;
      text-align: center;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.35;
      color: #334155;
      white-space: pre-wrap;
    }
    .card-hint {
      text-align: center;
      color: #94a3b8;
      font-size: 11px;
      font-weight: 800;
      margin-top: auto;
      text-transform: uppercase;
    }
    .card-back .ar {
      text-align: center;
      font-size: 30px;
    }
    .folder-select {
      width: 100%;
      border: 2px solid #f1f5f9;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 15px;
      margin-bottom: 10px;
      background: #fff;
      outline: none;
    }

    .note-topbar { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
    .note-topbar .btn { flex:1; min-width:140px; }
    .note-selection-panel {
      display:none;
      background:#0f172a;
      color:#fff;
      border-radius:16px;
      padding:12px;
      margin-bottom:12px;
    }
    .note-selection-panel.active { display:block; }

    /* Компактный режим для вкладки Избранное */
    body.compact-favs .header { margin-bottom: 6px; }
    body.compact-favs .header img { width: 34px; height: 34px; border-radius: 8px; }
    body.compact-favs .header h1 { font-size: 18px; }
    body.compact-favs .status { padding: 8px 10px; font-size: 12px; margin-bottom: 6px; border-radius: 12px; }
    body.compact-favs .user-line { display: none; }
    body.compact-favs .auth-row { margin-bottom: 8px; }
    body.compact-favs .auth-btn { padding: 9px 12px; font-size: 13px; min-height: 40px; }
    body.compact-favs .tabs { margin-bottom: 8px; padding: 3px; gap: 4px; }
    body.compact-favs .tab { padding: 8px 6px; font-size: 12px; }
    body.compact-favs .chips { margin-bottom: 6px; padding-bottom: 6px; }
    body.compact-favs .chip { padding: 6px 10px; font-size: 12px; }
    body.compact-favs #favTopbar { gap: 6px; margin-bottom: 8px; }
    body.compact-favs #favTopbar .btn { min-height: 36px; padding: 8px 10px; font-size: 12px; }
    body.compact-favs #selectionPanel { padding: 10px; margin-bottom: 8px; border-radius: 12px; }
    body.compact-favs #selectionPanel .folder-select,
    body.compact-favs #selectionPanel .field { margin-bottom: 8px; padding: 10px 12px; font-size: 14px; }
    body.compact-favs #selectionPanel .selection-actions .btn { min-height: 34px; padding: 7px 10px; font-size: 12px; }
    body.compact-favs #list { gap: 6px; padding-bottom: 16px; }
    body.compact-favs #list .item { padding: 9px 10px; border-radius: 12px; }
    body.compact-favs #list .item-head { gap: 8px; }
    body.compact-favs #list .ru { font-size: 13px; line-height: 1.15; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    body.compact-favs #list .ar { font-size: 22px; line-height: 1.0; }
    body.compact-favs #list .hint { font-size: 11px; line-height: 1.2; margin-top: 2px; }
    body.compact-favs #list .item-details { margin-top: 8px; padding-top: 8px; }
    body.compact-favs #list .actions { margin-top: 8px; gap: 6px; }
    body.compact-favs #list .actions .btn { min-height: 34px; padding: 7px 8px; font-size: 12px; }

    .note-topbar { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    .note-topbar .field { flex: 1; margin-bottom: 0; padding: 10px 12px; font-size: 14px; }
    .note-topbar .btn { min-width: 130px; min-height: 40px; font-size: 12px; padding: 8px 10px; }

    body.compact-notes .header { margin-bottom: 6px; }
    body.compact-notes .header img { width: 34px; height: 34px; border-radius: 8px; }
    body.compact-notes .header h1 { font-size: 18px; }
    body.compact-notes .status { padding: 8px 10px; font-size: 12px; margin-bottom: 6px; border-radius: 12px; }
    body.compact-notes .user-line { display: none; }
    body.compact-notes .auth-row { margin-bottom: 8px; }
    body.compact-notes .auth-btn { padding: 9px 12px; font-size: 13px; min-height: 40px; }
    body.compact-notes .tabs { margin-bottom: 8px; padding: 3px; gap: 4px; }
    body.compact-notes .tab { padding: 8px 6px; font-size: 12px; }
    body.compact-notes #notesComposer { margin-bottom: 8px; }
    body.compact-notes #notesComposer .field { margin-bottom: 6px; padding: 10px 12px; font-size: 14px; }
    body.compact-notes #notesComposer .toolbar { margin-bottom: 6px; }
    body.compact-notes #notesComposer .btn { min-height: 38px; padding: 8px 10px; font-size: 12px; }
    body.compact-notes .chips { margin-bottom: 6px; padding-bottom: 6px; }
    body.compact-notes .chip { padding: 6px 10px; font-size: 12px; }
    body.compact-notes #noteTopbar { gap: 6px; margin-bottom: 8px; }
    body.compact-notes #noteSelectionPanel { padding: 10px; margin-bottom: 8px; border-radius: 12px; }
    body.compact-notes #noteSelectionPanel .folder-select,
    body.compact-notes #noteSelectionPanel .field { margin-bottom: 8px; padding: 10px 12px; font-size: 14px; }
    body.compact-notes #noteSelectionPanel .selection-actions .btn { min-height: 34px; padding: 7px 10px; font-size: 12px; }
    body.compact-notes #list { gap: 6px; padding-bottom: 16px; }
    body.compact-notes #list .item { padding: 9px 10px; border-radius: 12px; }
    body.compact-notes .note-preview-ru { font-size: 13px; line-height: 1.15; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    body.compact-notes .note-preview-ar { font-size: 20px; line-height: 1.0; direction: rtl; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    body.compact-notes #list .item-details { margin-top: 8px; padding-top: 8px; }
    body.compact-notes #list .actions { margin-top: 8px; gap: 6px; }
    body.compact-notes #list .actions .btn { min-height: 34px; padding: 7px 8px; font-size: 12px; }

    .note-item.expanded .item-head { display: none; }

    /* Компактный режим при поиске в словаре */
    body.dict-searching .header,
    body.dict-searching #status,
    body.dict-searching #syncIndicator,
    body.dict-searching #trialIndicator,
    body.dict-searching .user-line,
    body.dict-searching .auth-row {
      display: none;
    }
    body.dict-searching .app { padding-top: 10px; }
    body.dict-searching .tabs { margin-bottom: 8px; padding: 3px; gap: 4px; position: sticky; top: 0; z-index: 20; background: #f1f5f9; }
    body.dict-searching .tab { padding: 8px 6px; font-size: 12px; }
    body.dict-searching #dictSection { margin-bottom: 6px; position: sticky; top: 44px; z-index: 19; background: #fff; padding-bottom: 4px; }
    body.dict-searching .search { margin-bottom: 6px; padding: 12px 14px; font-size: 15px; border-radius: 12px; }
    body.dict-searching #list { gap: 6px; padding-bottom: 16px; }
    body.dict-searching #list .item { padding: 9px 10px; border-radius: 12px; }
    body.dict-searching #list .item-head { gap: 8px; }
    body.dict-searching #list .ru { font-size: 13px; line-height: 1.15; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
    body.dict-searching #list .ar { font-size: 22px; line-height: 1.0; }
    body.dict-searching #list .hint { font-size: 11px; line-height: 1.2; margin-top: 2px; }
    body.dict-searching #list .verb-box { margin-top: 8px; padding: 8px 10px; border-radius: 10px; font-size: 12px; }
    body.dict-searching #list .verb-box span { font-size: 18px; }
    body.dict-searching #list .item-details { margin-top: 8px; padding-top: 8px; }
    body.dict-searching #list .actions { margin-top: 8px; gap: 6px; }
    body.dict-searching #list .actions .btn { min-height: 34px; padding: 7px 8px; font-size: 12px; }

    .toast {
      display: none;
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      background: #1e293b;
      color: #fff;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      z-index: 9999;
      box-shadow: 0 8px 30px rgba(0,0,0,0.18);
      white-space: nowrap;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.56);
      z-index: 9998;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: #fff;
      width: 100%;
      max-width: 420px;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 22px 44px rgba(0,0,0,0.18);
    }
    .modal h3 { margin: 0 0 10px; text-align: center; }
    .modal .ar-preview { font-size: 30px; font-weight: 800; color: var(--primary); direction: rtl; text-align: center; margin-bottom: 14px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .user-line { text-align: center; color: var(--muted); font-size: 12px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <img src="icon.png" alt="Logo" onerror="this.style.display='none'">
      <h1>АРАБРУС</h1>
    </div>

    <div id="status" class="status wait">⏳ Подключение базы...</div>
    <div id="syncIndicator" class="status wait" style="padding:8px 10px; font-size:12px; margin-bottom:8px;">☁️ Проверка синхронизации...</div>
    <div id="trialIndicator" class="status wait" style="padding:8px 10px; font-size:12px; margin-bottom:8px;">🎁 Проверка пробного периода...</div>
    <div id="userLine" class="user-line">Не выполнен вход</div>

    <div class="auth-row">
      <button id="authBtn" class="auth-btn" onclick="toggleAuth()">🌐 Войти через Google</button>
    </div>

    <div class="tabs">
      <button id="tabDict" class="tab active" onclick="switchTab('dict')">📚 Словарь</button>
      <button id="tabFav" class="tab" onclick="switchTab('fav')">⭐ Избранное</button>
      <button id="tabNotes" class="tab" onclick="switchTab('notes')">📝 Блокнот</button>
    </div>

    <div id="dictSection">
      <input id="queryInput" class="search" type="text" placeholder="Поиск (дверь, باب, قال, يقول)..." oninput="renderApp()" autocomplete="off">
    </div>

    <div id="notesComposer" style="display:none;">
      <input id="manualAr" class="field" type="text" placeholder="Арабский текст">
      <input id="manualRu" class="field" type="text" placeholder="Перевод на русский">
      <div class="toolbar" style="margin-top:6px;">
        <button class="btn primary" onclick="saveNote()">💾 Сохранить в блокнот</button>
      </div>
    </div>

    <div id="chips" class="chips" style="display:none;"></div>
    <div id="favTopbar" class="fav-topbar" style="display:none;"></div>
    <div id="noteTopbar" class="note-topbar" style="display:none;">
      <input id="noteSearchInput" class="field" type="text" placeholder="Поиск по блокноту..." oninput="renderApp()">
      <button id="noteSelectBtn" class="btn" onclick="toggleNoteSelectionMode()"></button>

  function getUserCreatedAtMs() {
    if (!user?.metadata?.creationTime) return 0;

  function hasPaidAccess() {
    if (!user) return false;
    if (userAccess?.premiumUntilMs) {

  function getTrialInfo() {
    if (!user) return { active: false, expired: false, daysLeft: 0, endMs: 0 };
    const createdAtMs = getUserCreatedAtMs();
    if (!createdAtMs) return { active: false, expired: false, daysLeft: 0, endMs: 0 };

    const trialMs = 14 * 24 * 60 * 60 * 1000;
    const endMs = createdAtMs + trialMs;
    const remainingMs = endMs - Date.now();
    const active = remainingMs > 0;
    const daysLeft = active ? Math.max(1, Math.ceil(remainingMs / (24 * 60 * 60 * 1000))) : 0;

    return { active, expired: !active, daysLeft, endMs };
  }

  function canUsePremiumFeatures() {
    if (!user) return false;
    if (hasPaidAccess()) return true;
    return getTrialInfo().active;

Напишите мне для активации доступа.

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escapeJs(value) {
    return String(value ?? '')
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'")
      .replace(/\n/g, '\\n')
      .replace(/\r/g, '\\r')
      .replace(/\u2028/g, '\\u2028')
      .replace(/\u2029/g, '\\u2029');
  }

  function normalize(t) {
    if (!t) return '';
    let res = String(t).toLowerCase()
      .replace(/[\u064B-\u0652]/g, '')
      .replace(/[أإآ]/g, 'ا')
      .trim();
    if (res.length > 3 && res.startsWith('ال')) res = res.substring(2);
    return res;
  }

  function hashString(str) {
    let h = 2166136261;
    for (let i = 0; i < str.length; i++) {
      h ^= str.charCodeAt(i);
      h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
    }
    return (h >>> 0).toString(36);
  }

  function makeFavId(ar, ru) {
    return 'fav_' + hashString(String(ar).trim() + '||' + String(ru).trim());
  }

  function getArabicStems(word) {
    if (!word) return [];
    let stems = [word];
    let w = word;
    if (w.startsWith('س') && w.length > 3) w = w.substring(1);
    if (w.length >= 3 && /^[يتنا]/.test(w)) {
      let core = w.substring(1);
      if (core.endsWith('ون') || core.endsWith('ين') || core.endsWith('ان') || core.endsWith('وا') || core.endsWith('ات')) {
        core = core.substring(0, core.length - 2);
      }
      stems.push(core);
    }
    if (word.endsWith('وا') || word.endsWith('تم') || word.endsWith('نا')) stems.push(word.substring(0, word.length - 2));
    if (word.endsWith('ت')) stems.push(word.substring(0, word.length - 1));
    return stems;
  }

  let currentTtsAudio = null;
  let ttsUnlocked = false;
  let cachedArabicVoice = null;

  function stopTtsPlayback() {
    try { window.speechSynthesis.cancel(); } catch (_) {}
    try {
      if (currentTtsAudio) {
        currentTtsAudio.pause();
        currentTtsAudio.currentTime = 0;
      }
    } catch (_) {}
    currentTtsAudio = null;
  }

  function getArabicVoice() {
    try {
      const voices = window.speechSynthesis.getVoices() || [];
      if (!voices.length) return null;
      return (
        voices.find(v => /^ar(-|$)/i.test(v.lang || '') && /google|arabic|العربية/i.test(v.name || '')) ||
        voices.find(v => /^ar(-|$)/i.test(v.lang || '')) ||
        voices.find(v => /arabic|العربية/i.test(v.name || '')) ||
        null
      );
    } catch (_) { return null; }
  }

  function unlockTts() {
    if (ttsUnlocked) return;
    ttsUnlocked = true;
    try { window.speechSynthesis.resume(); } catch (_) {}
  }

  document.addEventListener('click', unlockTts, { passive: true });
  document.addEventListener('touchstart', unlockTts, { passive: true });

  try {
    if ('speechSynthesis' in window) {
      cachedArabicVoice = getArabicVoice();
      window.speechSynthesis.onvoiceschanged = function() {
        cachedArabicVoice = getArabicVoice();
      };
    }
  } catch (_) {}

  function playGoogleTtsFallback(text) {
    try {
      const encoded = encodeURIComponent(String(text || '').trim());
      const url = 'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=ar&q=' + encoded;

      currentTtsAudio = new Audio(url);
      currentTtsAudio.preload = 'auto';
      currentTtsAudio.onended = function() { currentTtsAudio = null; };
      currentTtsAudio.onerror = function() {
        currentTtsAudio = null;
        showMsg('Озвучка недоступна');
      };
      currentTtsAudio.play().catch(function() {
        currentTtsAudio = null;
        showMsg('Озвучка не запустилась');
      });
    } catch (e) {
      console.error('Google TTS fallback error:', e);
      showMsg('Озвучка недоступна');
    }
  }

  function speak(text, e) {
    if (e) e.stopPropagation();

    if (!canUsePremiumFeatures()) {
      showActivationPrompt();
      return;
    }

    const cleanText = String(text || '').trim();
    if (!cleanText) {
      showMsg('Нет текста для озвучки');
      return;
    }

    unlockTts();
    stopTtsPlayback();

    const hasSpeechApi = typeof window !== 'undefined' && 'speechSynthesis' in window && typeof SpeechSynthesisUtterance !== 'undefined';

    if (!hasSpeechApi) {
      playGoogleTtsFallback(cleanText);
      return;
    }

    let usedFallback = false;

    function useFallbackOnce() {
      if (usedFallback) return;
      usedFallback = true;
      try { window.speechSynthesis.cancel(); } catch (_) {}
      playGoogleTtsFallback(cleanText);
    }

    try {
      const utterance = new SpeechSynthesisUtterance(cleanText);
      const voice = cachedArabicVoice || getArabicVoice();
      cachedArabicVoice = voice || cachedArabicVoice;

      utterance.lang = voice && voice.lang ? voice.lang : 'ar-SA';
      if (voice) utterance.voice = voice;

      utterance.rate = 0.9;
      utterance.pitch = 1.0;
      utterance.volume = 1.0;

      const fallbackTimer = setTimeout(function() {
        const speaking = !!window.speechSynthesis.speaking;
        const pending = !!window.speechSynthesis.pending;
        if (!speaking && !pending) useFallbackOnce();
      }, 700);

      utterance.onstart = function() { clearTimeout(fallbackTimer); };
      utterance.onend = function() { clearTimeout(fallbackTimer); };
      utterance.onerror = function(err) {
        clearTimeout(fallbackTimer);
        console.error('Speech synthesis error:', err);
        useFallbackOnce();
      };

      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);

      setTimeout(function() {
        const speaking = !!window.speechSynthesis.speaking;
        const pending = !!window.speechSynthesis.pending;
        if (!speaking && !pending) useFallbackOnce();
      }, 250);
    } catch (err) {
      console.error('Speak error:', err);
      useFallbackOnce();
    }
  }

  async function applyBulkFolder() {
    if (!user) { openAuthModal(); return; }
    if (!canUsePremiumFeatures()) { showActivationPrompt(); return; }
    const ids = Array.from(selectedFavoriteIds);
    if (!ids.length) { showMsg('Сначала выберите слова'); return; }
    const existing = document.getElementById('bulkFolderSelect').value.trim();
    const typed = document.getElementById('bulkFolderInput').value.trim();
    const folder = typed || existing;
    if (!folder) { showMsg('Выберите или введите папку'); return; }

    try {
      const batch = db.batch();
      ids.forEach(id => {
        const ref = db.collection('users').doc(user.uid).collection('favorites').doc(id);
        batch.update(ref, {
          collection: folder,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      });
      await batch.commit();
      document.getElementById('bulkFolderInput').value = '';
      document.getElementById('bulkFolderSelect').value = '';
      showMsg('Папка сохранена');
      toggleFavoriteSelectionMode(false);
    } catch (e) {
      console.error(e);
      showMsg('Ошибка массового сохранения');
    }
  }

  function renderDictionary() {
    if (typeof dictBase === 'undefined' || !Array.isArray(dictBase)) return '<div class="empty">База ещё не загружена</div>';

    const q = document.getElementById('queryInput').value.toLowerCase().trim();
    if (!q) return '<div class="empty">Начните вводить слово для поиска</div>';

    const nQ = normalize(q);
    const stems = getArabicStems(nQ);
    const mappedPastTense = reverseVerbsMap[nQ];

    const filtered = dictBase.filter(w => {
      const nWordAr = normalize(w.ar);
      const nRoot = normalize(w.root || '');
      const nWordRu = String(w.ru || '').toLowerCase();

      if (nWordRu.includes(q)) return true;
      if (mappedPastTense && nWordAr === mappedPastTense) return true;
      for (const stem of stems) {
        if (nWordAr.includes(stem) || (nRoot && nRoot.includes(stem))) return true;
      }
      return false;
    });

    filtered.sort((a, b) => {
      const normAAr = normalize(a.ar);
      const normBAr = normalize(b.ar);
      const ruA = String(a.short_ru || a.ru || '').toLowerCase().replace(/^[\d\)\s]+/, '');
      const ruB = String(b.short_ru || b.ru || '').toLowerCase().replace(/^[\d\)\s]+/, '');
      if (mappedPastTense) {
        if (normAAr === mappedPastTense && normBAr !== mappedPastTense) return -1;
        if (normBAr === mappedPastTense && normAAr !== mappedPastTense) return 1;
      }
      if (normAAr === nQ && normBAr !== nQ) return -1;
      if (normBAr === nQ && normAAr !== nQ) return 1;
      const startsRuA = ruA.startsWith(q);
      const startsRuB = ruB.startsWith(q);
      if (startsRuA && !startsRuB) return -1;
      if (startsRuB && !startsRuA) return 1;
      return String(a.ru || '').length - String(b.ru || '').length;
    });

    currentRenderedWords = filtered.slice(0, 50);

    if (!currentRenderedWords.length) return '<div class="empty">Ничего не найдено</div>';

    return currentRenderedWords.map((w, idx) => {
      const fav = getFavoriteByWord(w);
      const present = normalizedVerbs[normalize(w.ar)];
      const locked = isPremiumLocked();

      return `
        <div class="item collapsible" onclick="this.classList.toggle('expanded')">
          <div class="item-head">
            <div class="item-left">
              <div class="ru">${escapeHtml(w.short_ru || String(w.ru || '').split(';')[0] || '')}</div>
              <div class="ar">${escapeHtml(w.ar)}</div>
              ${present ? `<div class="hint">Настоящее время: <b>${escapeHtml(present)}</b></div>` : ''}
              ${fav ? `<div class="hint">⭐ Уже в избранном</div>` : ''}
            </div>
          </div>

          <div class="item-details" onclick="event.stopPropagation()">
            <div class="full-translation">${escapeHtml(w.ru || '')}</div>
            ${present ? `<div class="verb-box"><div>Настоящее время</div><span>${escapeHtml(present)}</span></div>` : ''}
            <div class="actions">
              <button class="btn ${locked ? 'locked' : ''}" onclick="${locked ? "showActivationPrompt()" : `speak('${escapeJs(w.ar)}', event)`}">${locked ? '🔒 Озвучка' : '🔊 Слушать'}</button>
              <button class="btn ${locked ? 'locked' : (fav ? 'warn' : '')}" onclick="${locked ? "showActivationPrompt()" : `toggleFavoriteDirect(${idx})`}">${locked ? '🔒 Избранное' : (fav ? '★ Уже в избранном' : '☆ В избранное')}</button>
              ${fav && !locked ? `<button class="btn" onclick="openFavModal(${idx})">✏️ Изменить перевод</button>` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function startUserListeners() {
    if (!user) return;

    unsubAccess = db.collection('users').doc(user.uid)
      .onSnapshot((doc) => {
        const data = doc.exists ? (doc.data() || {}) : {};

        let premiumEndMs = 0;
        let isActive = !!(data.premiumActive || data.premium || data.isPremium);

        if (data.premiumUntil) {
          if (typeof data.premiumUntil === 'string') {
            const parsedMs = new Date(data.premiumUntil).getTime();
            if (!isNaN(parsedMs)) {
              premiumEndMs = parsedMs;
              isActive = true; 
            }
          } else {
            premiumEndMs = Number(data.premiumUntil);
          }
        } else if (data.premiumUntilMs || data.accessUntilMs) {
          premiumEndMs = Number(data.premiumUntilMs || data.accessUntilMs || 0);
        }

        userAccess = {
          premiumActive: isActive,
          premiumUntilMs: premiumEndMs
        };
        updateTrialIndicator();
        renderApp();
      }, (e) => {
        console.error(e);
        userAccess = { premiumActive: false, premiumUntilMs: 0 };
        updateTrialIndicator();
      });

    unsubFavs = db.collection('users').doc(user.uid).collection('favorites')
      .onSnapshot((snap) => {
        favSnapshotPending = !!snap.metadata.hasPendingWrites;
        favorites = snap.docs.map(doc => ({ id: doc.id, ...(doc.data() || {}) }));
        updateSyncIndicator();
        renderApp();
      }, (e) => {
        console.error(e);
        favSnapshotPending = false;
        updateSyncIndicator();
        showMsg('Ошибка синхронизации избранного');
      });

    unsubNotes = db.collection('users').doc(user.uid).collection('notes')
      .onSnapshot((snap) => {
        noteSnapshotPending = !!snap.metadata.hasPendingWrites;
        const cloud = snap.docs.map(doc => ({ id: doc.id, ...(doc.data() || {}) }));
        const temp = notes.filter(n => n.isLocalTemp);
        const merged = [...temp, ...cloud];
        const map = new Map();
        merged.forEach(n => map.set(n.id, n));
        notes = Array.from(map.values());
        updateSyncIndicator();
        renderApp();
      }, (e) => {
        console.error(e);
        noteSnapshotPending = false;
        updateSyncIndicator();
        showMsg('Ошибка синхронизации блокнота');
      });
  }

  async function toggleAuth() {
    try {
      if (user) {
        await auth.signOut();
        return;
      }
      try {
        await auth.signInWithPopup(provider);
      } catch (popupError) {
        console.error('Popup auth error:', popupError);
        const codes = [
          'auth/popup-blocked',
          'auth/popup-closed-by-user',
          'auth/cancelled-popup-request',
          'auth/operation-not-supported-in-this-environment'
        ];
        if (codes.includes(popupError.code)) {
          await auth.signInWithRedirect(provider);
          return;
        }
        throw popupError;
      }
    } catch (e) {
      console.error('Auth error:', e);
      showMsg('Ошибка входа через Google');
    }
  }

  auth.getRedirectResult().catch((e) => {
    console.error('Redirect auth error:', e);
  });

  auth.onAuthStateChanged((u) => {
    stopListeners();
    user = u;
    favorites = [];
    notes = notes.filter(n => n.isLocalTemp);

    const btn = document.getElementById('authBtn');
    const userLine = document.getElementById('userLine');

    if (user) {
      btn.innerText = `Выйти (${(user.displayName || 'Пользователь').split(' ')[0]})`;
      userLine.innerText = user.email || user.uid;
      startUserListeners();
    } else {
      btn.innerText = '🌐 Войти через Google';
      userLine.innerText = 'Не выполнен вход';
    }
    updateSyncIndicator();
    updateTrialIndicator();
    renderApp();
  });

  const initStartedAt = Date.now();
  const initInterval = setInterval(() => {
    if (typeof dictBase !== 'undefined' && Array.isArray(dictBase)) {
      clearInterval(initInterval);
      setStatus(`✅ База готова: ${dictBase.length} слов`, 'ok');

      if (typeof verbsBase !== 'undefined') {
        for (const pastTense in verbsBase) {
          const presentTense = verbsBase[pastTense];
          normalizedVerbs[normalize(pastTense)] = presentTense;
          reverseVerbsMap[normalize(presentTense)] = normalize(pastTense);
        }
      }
      renderApp();
      return;
    }

    if (Date.now() - initStartedAt > 10000) {
      clearInterval(initInterval);
      setStatus('❌ Не удалось загрузить base.js или verbs.js', 'err');
    }
  }, 100);

  ['favModalWrap', 'folderModalWrap', 'authModalWrap'].forEach(id => {
    const modal = document.getElementById(id);
    modal.addEventListener('click', (e) => {
      if (e.target !== modal) return;
      if (id === 'favModalWrap') closeFavModal();
      if (id === 'folderModalWrap') closeFolderModal();
      if (id === 'authModalWrap') closeAuthModal();
    });
  });

  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    closeFavModal();
    closeFolderModal();
    closeAuthModal();
  });

  trialIndicatorEl?.addEventListener('click', () => {
    if (!user) {
      openAuthModal();
      return;
    }
    openActivationContact();
  });

  window.addEventListener('online', updateSyncIndicator);
  window.addEventListener('offline', updateSyncIndicator);
  window.addEventListener('load', () => {
    updateSyncIndicator();
    updateTrialIndicator();
    renderApp();
  });
</script>

<style>

  @keyframes compactPulse {

  .compact-auth-title {

  .compact-auth-card {
    border: 1px solid #e2e8f0;

  .compact-auth-card small {

  .compact-auth-actions .btn {

  body.logged-in-compact .auth-row,
  body.logged-in-compact #syncIndicator,
  body.logged-in-compact #trialIndicator,
  body.logged-in-compact #userLine {
    display: none !important;
  }

  body.logged-in-compact #status.compact-hideable {
    display: none !important;

  body.logged-in-compact .header {

  body.dict-searching .compact-auth-bar {

</style>

<script>
(function () {
  function ready(fn) {
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', fn);
    else fn();
  }

  ready(function () {
    const headerEl = document.querySelector('.header');
    if (!headerEl) return;

    let compactBar = document.getElementById('compactAuthBar');
    if (!compactBar) {
      compactBar = document.createElement('div');
      compactBar.id = 'compactAuthBar';
      compactBar.className = 'compact-auth-bar';
      compactBar.innerHTML = `
        <button id="compactAuthBtn" class="compact-auth-btn" type="button">
          <span id="compactAuthDot" class="compact-auth-dot"></span>
          <span id="compactAuthLabel" class="compact-auth-label">Статус</span>
          <span class="compact-auth-menu-icon">☰</span>
        </button>
      `;
      headerEl.insertAdjacentElement('afterend', compactBar);
    }

    let modalWrap = document.getElementById('compactAuthModalWrap');
    if (!modalWrap) {
      modalWrap = document.createElement('div');
      modalWrap.id = 'compactAuthModalWrap';
      modalWrap.className = 'modal-overlay';
      modalWrap.innerHTML = `
        <div class="modal compact-auth-modal">
          <h3 class="compact-auth-title">Аккаунт и синхронизация</h3>

          <div class="compact-auth-card">
            <small>Пользователь</small>
            <div id="compactAuthUser" class="compact-auth-main">—</div>
            <div id="compactAuthUserSub" class="compact-auth-sub"></div>
          </div>

          <div class="compact-auth-card">
            <small>Статус</small>
            <div class="compact-auth-status-line">
              <span id="compactAuthStatusDot" class="compact-auth-dot"></span>
              <div>
                <div id="compactAuthStatusMain" class="compact-auth-main">—</div>
                <div id="compactAuthStatusSub" class="compact-auth-sub"></div>
              </div>
            </div>
          </div>

          <div class="compact-auth-card">
            <small>Доступ</small>
            <div id="compactAuthAccessMain" class="compact-auth-main">—</div>
            <div id="compactAuthAccessSub" class="compact-auth-sub"></div>
          </div>

          <div class="compact-auth-actions">
            <button id="compactAuthAccessBtn" class="btn primary" type="button">💎 Доступ</button>
            <button id="compactAuthLogoutBtn" class="btn danger" type="button">🚪 Выйти</button>
            <button id="compactAuthCloseBtn" class="btn" type="button">Закрыть</button>
          </div>
        </div>
      `;
      document.body.appendChild(modalWrap);
    }

    const compactBtn = document.getElementById('compactAuthBtn');
    const compactDot = document.getElementById('compactAuthDot');
    const compactLabel = document.getElementById('compactAuthLabel');

    const modalUser = document.getElementById('compactAuthUser');
    const modalUserSub = document.getElementById('compactAuthUserSub');
    const modalStatusDot = document.getElementById('compactAuthStatusDot');
    const modalStatusMain = document.getElementById('compactAuthStatusMain');
    const modalStatusSub = document.getElementById('compactAuthStatusSub');
    const modalAccessMain = document.getElementById('compactAuthAccessMain');
    const modalAccessSub = document.getElementById('compactAuthAccessSub');

    const accessBtn = document.getElementById('compactAuthAccessBtn');
    const logoutBtn = document.getElementById('compactAuthLogoutBtn');
    const closeBtn = document.getElementById('compactAuthCloseBtn');

    const statusEl = document.getElementById('status');
    const syncEl = document.getElementById('syncIndicator');
    const trialEl = document.getElementById('trialIndicator');
    const authRow = document.querySelector('.auth-row');
    const userLine = document.getElementById('userLine');

    function isLoggedInNow() {
      try { return typeof user !== 'undefined' && !!user; } catch (_) { return false; }
    }

    function getSyncState() {
      try {
        if (!isLoggedInNow()) {
          return {
            tone: 'warn',
            short: 'Вход',
            main: 'Требуется вход',
            sub: 'Войдите через Google, чтобы включить синхронизацию'
          };
        }

        const pending = !!(
          (typeof favSnapshotPending !== 'undefined' && favSnapshotPending) ||
          (typeof noteSnapshotPending !== 'undefined' && noteSnapshotPending)
        );

        if (!navigator.onLine && pending) {
          return {
            tone: 'warn',
            short: 'Офлайн',
            main: 'Нет сети',
            sub: 'Изменения сохранены локально и ждут синхронизации'
          };
        }

        if (!navigator.onLine) {
          return {
            tone: 'warn',
            short: 'Офлайн',
            main: 'Нет сети',
            sub: 'Последние данные доступны локально'
          };
        }

        if (pending) {
          return {
            tone: 'sync',
            short: 'Синхр.',
            main: 'Синхронизация',
            sub: 'Данные отправляются в облако'
          };
        }

        return {
          tone: 'ok',
          short: 'OK',
          main: 'Синхронизировано',
          sub: 'Всё сохранено в облаке'
        };
      } catch (_) {
        return {
          tone: 'warn',
          short: 'Статус',
          main: 'Статус обновляется',
          sub: ''
        };
      }
    }

    function getAccessState() {
      try {
        if (!isLoggedInNow()) {
          return {
            main: 'Войдите в Google',
            sub: 'После входа начнётся пробный период и включится синхронизация'
          };
        }

        if (typeof hasPaidAccess === 'function' && hasPaidAccess()) {
          if (typeof userAccess !== 'undefined' && userAccess && userAccess.premiumUntilMs) {
            const d = new Date(userAccess.premiumUntilMs);
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            return {
              main: 'Премиум активен',
              sub: 'Доступ до ' + day + '.' + month + '.' + year
            };
          }
          return {
            main: 'Премиум активен',
            sub: 'Полный доступ включён'
          };
        }

        if (typeof getTrialInfo === 'function') {
          const trial = getTrialInfo();
          if (trial && trial.active) {
            return {
              main: 'Пробный период активен',
              sub: 'Осталось дней: ' + trial.daysLeft
            };
          }
        }

        return {
          main: 'Пробный период закончился',
          sub: 'Открой меню и нажми “Доступ”, чтобы написать тебе для активации'
        };
      } catch (_) {
        return {
          main: 'Доступ обновляется',
          sub: ''
        };
      }
    }

    function updateVisibility() {
      const logged = isLoggedInNow();
      document.body.classList.toggle('logged-in-compact', logged);

      if (compactBar) compactBar.style.display = logged ? 'flex' : 'none';
      if (authRow) authRow.style.display = logged ? 'none' : 'flex';
      if (userLine) userLine.style.display = logged ? 'none' : '';

      if (syncEl) syncEl.style.display = logged ? 'none' : '';
      if (trialEl) trialEl.style.display = logged ? 'none' : '';

      if (statusEl) {
        const hideable = statusEl.classList.contains('ok');
        statusEl.classList.toggle('compact-hideable', logged && hideable);
        if (logged && hideable) statusEl.style.display = 'none';
        else statusEl.style.display = '';
      }
    }

    function applyDot(el, tone) {
      if (!el) return;
      el.className = 'compact-auth-dot ' + tone;
    }

    function refreshCompactUi() {
      updateVisibility();

      const syncState = getSyncState();
      const accessState = getAccessState();

      applyDot(compactDot, syncState.tone);
      applyDot(modalStatusDot, syncState.tone);

      if (compactLabel) compactLabel.textContent = syncState.short;
      if (modalStatusMain) modalStatusMain.textContent = syncState.main;
      if (modalStatusSub) modalStatusSub.textContent = syncState.sub;

      if (modalUser) {
        if (isLoggedInNow()) {
          try {
            modalUser.textContent = user.displayName || user.email || 'Пользователь';
            modalUserSub.textContent = user.email || '';
          } catch (_) {
            modalUser.textContent = 'Пользователь';
            modalUserSub.textContent = '';
          }
        } else {
          modalUser.textContent = 'Не выполнен вход';
          modalUserSub.textContent = '';
        }
      }

      if (modalAccessMain) modalAccessMain.textContent = accessState.main;
      if (modalAccessSub) modalAccessSub.textContent = accessState.sub;
    }

    function openCompactMenu() {
      refreshCompactUi();
      modalWrap.style.display = 'flex';
    }

    function closeCompactMenu() {
      modalWrap.style.display = 'none';
    }

    compactBtn.addEventListener('click', openCompactMenu);
    closeBtn.addEventListener('click', closeCompactMenu);

    modalWrap.addEventListener('click', function (e) {
      if (e.target === modalWrap) closeCompactMenu();
    });

    accessBtn.addEventListener('click', function () {
      closeCompactMenu();
      try {
        if (!isLoggedInNow()) {
          if (typeof openAuthModal === 'function') openAuthModal();
          else if (typeof toggleAuth === 'function') toggleAuth();
          return;
        }
        if (typeof openActivationContact === 'function') openActivationContact();
      } catch (_) {}
    });

    logoutBtn.addEventListener('click', function () {
      closeCompactMenu();
      try {
        if (typeof toggleAuth === 'function' && isLoggedInNow()) toggleAuth();
      } catch (_) {}
    });

    const originalUpdateSyncIndicator = typeof updateSyncIndicator === 'function' ? updateSyncIndicator : null;
    if (originalUpdateSyncIndicator) {
      updateSyncIndicator = function () {
        const result = originalUpdateSyncIndicator.apply(this, arguments);
        refreshCompactUi();
        return result;
      };
    }

    const originalUpdateTrialIndicator = typeof updateTrialIndicator === 'function' ? updateTrialIndicator : null;
    if (originalUpdateTrialIndicator) {
      updateTrialIndicator = function () {
        const result = originalUpdateTrialIndicator.apply(this, arguments);
        refreshCompactUi();
        return result;
      };
    }

    const originalRenderApp = typeof renderApp === 'function' ? renderApp : null;
    if (originalRenderApp) {
      renderApp = function () {
        const result = originalRenderApp.apply(this, arguments);
        refreshCompactUi();
        return result;
      };
    }

    const originalSetStatus = typeof setStatus === 'function' ? setStatus : null;
    if (originalSetStatus) {
      setStatus = function () {
        const result = originalSetStatus.apply(this, arguments);
        refreshCompactUi();
        return result;
      };
    }

    window.addEventListener('online', refreshCompactUi);
    window.addEventListener('offline', refreshCompactUi);
    document.addEventListener('visibilitychange', refreshCompactUi);

    setInterval(refreshCompactUi, 1200);
    refreshCompactUi();
  });
})();
</script>

</body>
