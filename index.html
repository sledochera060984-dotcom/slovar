
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#27ae60">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2907/2907253.png">
    
    <title>Arabus Pro</title>
    
    <!-- Firebase Libraries (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --main-color: #27ae60; --bg-color: #f4f4f9; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: env(safe-area-inset-top) 10px 10px 10px; 
            -webkit-tap-highlight-color: transparent;
        }
        .container { background: white; padding: 15px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 600px; margin: 0 auto; }
        
        .status-box { text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; font-weight: bold; }
        .status-ok { background: #e8f8f5; color: #1e8449; border: 1px solid #a3e4d7; }
        .status-warn { background: #fef9e7; color: #9c640c; border: 1px solid #f7dc6f; }
        
        .google-btn { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 15px; font-weight: bold; color: #444; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .tabs { display: flex; margin-bottom: 15px; border-radius: 10px; overflow: hidden; border: 1px solid var(--main-color); background: white; }
        .tab { flex: 1; padding: 12px 5px; text-align: center; background: white; color: var(--main-color); border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
        .tab.active { background: var(--main-color); color: white; }
        
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        textarea, input[type="text"] { 
            width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; 
            font-size: 16px; box-sizing: border-box; outline: none; font-family: inherit;
        }
        textarea { height: 120px; resize: none; border-color: #d5dbdb; }
        
        .word-list { list-style: none; padding: 0; margin: 0; }
        .word-item { border-bottom: 1px solid #f0f0f0; padding: 14px 0; }
        .word-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        /* Стили для словаря */
        .arabic { font-size: 24px; font-weight: bold; color: var(--main-color); direction: rtl; }
        .russian { font-size: 16px; color: #333; flex: 1; padding-right: 15px; }
        
        /* Стили для режима Переводчика (Русский первым) */
        .mode-translator .russian { font-weight: bold; font-size: 18px; color: #2c3e50; }
        .mode-translator .arabic-hint { color: #bdc3c7; font-size: 14px; margin-top: 4px; display: block; text-align: right; }
        
        .details { display: none; padding-top: 15px; font-size: 15px; color: #444; line-height: 1.6; border-top: 1px dashed #eee; margin-top: 12px; }
        .expanded .details { display: block; }
        .expanded .arabic-main { font-size: 28px; font-weight: bold; color: var(--main-color); direction: rtl; margin-bottom: 15px; display: block; }
        
        .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .btn { 
            flex: 1; min-width: 80px; padding: 12px 8px; border-radius: 10px; border: 1px solid #ddd; 
            background: #fdfdfd; cursor: pointer; font-size: 13px; font-weight: bold; color: #555; 
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-main { background: var(--main-color); color: white; border: none; }
        .btn-speak { color: #2980b9; border-color: #a9cce3; background: #ebf5fb; }
        .btn-fav.active { background: #fff9e6; border-color: #f1c40f; color: #d35400; }
        .btn-delete { color: #e74c3c; border-color: #fadbd8; background: #fdf2f2; }

        .loader { display: none; text-align: center; padding: 10px; color: var(--main-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="statusBox" class="status-box status-warn">⏳ Загрузка Arabus Pro...</div>
    
    <button id="authBtn" class="google-btn" onclick="toggleAuth()">🌐 Войти через Google</button>

    <div class="tabs">
        <button id="tabDict" class="tab active" onclick="setTab('dict')">📚 Словарь</button>
        <button id="tabFav" class="tab" onclick="setTab('fav')">⭐ Избранное</button>
        <button id="tabTrans" class="tab" onclick="setTab('trans')">📝 Переводчик</button>
    </div>

    <!-- Раздел Словаря -->
    <div id="searchSection">
        <input type="text" id="searchInput" placeholder="Поиск (араб / рус / корень)..." oninput="handleSearch()" autocomplete="off">
    </div>

    <!-- Раздел Переводчика -->
    <div id="translatorSection" style="display:none;">
        <div class="input-group">
            <textarea id="arInput" placeholder="Вставьте арабский текст из интернета здесь..."></textarea>
            <div id="translateLoader" class="loader">✨ ИИ переводит...</div>
            <button class="btn btn-main" onclick="processTranslation()">Перевести и сохранить</button>
        </div>
        <div style="font-size: 12px; color: #888; margin-bottom: 10px;">Ваши сохраненные фразы (Русский -> Арабский):</div>
    </div>
    
    <div id="list" class="word-list"></div>
</div>

<script src="base.js?v=6000"></script>

<script>
    const apiKey = ""; // API ключ предоставляется средой выполнения
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'arabus-pro-final';
    
    let dictionaryData = (typeof dictBase !== 'undefined') ? dictBase : [];
    let user = null;
    let favorites = JSON.parse(localStorage.getItem('arabus_favs')) || [];
    let myTranslations = []; 
    let activeTab = 'dict';

    // Firebase Init
    const firebaseConfig = {
      apiKey: "AIzaSyDDwIWq8VCk-ivjjCJJZoio-wGD2gU1rtE",
      authDomain: "arabus-dict-96c12.firebaseapp.com",
      projectId: "arabus-dict-96c12",
      storageBucket: "arabus-dict-96c12.firebasestorage.app",
      messagingSenderId: "814248156149",
      appId: "1:814248156149:web:e2acce197a00eb3ceb5ebc"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    // Слушатель авторизации
    auth.onAuthStateChanged(async (u) => {
        user = u;
        const btn = document.getElementById('authBtn');
        if (user) {
            btn.innerText = `Выйти (${user.displayName.split(' ')[0]})`;
            updateStatus(`✅ Синхронизация: ${user.email}`, 'status-ok');
            syncData();
        } else {
            btn.innerText = "🌐 Войти через Google";
            updateStatus(`📚 База: ${dictionaryData.length} слов. Оффлайн.`, "status-ok");
        }
    });

    async function syncData() {
        if (!user) return;
        
        // Избранное
        const favDoc = await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('data').doc('favorites').get();
        if (favDoc.exists) {
            favorites = favDoc.data().list || [];
            localStorage.setItem('arabus_favs', JSON.stringify(favorites));
        }

        // Подписка на личные переводы
        db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('my_translations')
          .onSnapshot(snap => {
              myTranslations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
              if (activeTab === 'trans') renderList();
          });
          
        renderList();
    }

    function updateStatus(text, className) {
        const box = document.getElementById('statusBox');
        box.className = `status-box ${className}`;
        box.innerText = text;
    }

    // --- ЛОГИКА ПЕРЕВОДА ---
    async function callGeminiTranslate(text) {
        const prompt = `Переведи арабский текст на русский язык максимально точно и красиво. Выдай ТОЛЬКО текст перевода: "${text}"`;
        let delay = 1000;
        for (let i = 0; i < 5; i++) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const json = await res.json();
                return json.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "Ошибка перевода";
            } catch (e) {
                if (i === 4) return "Ошибка связи с ИИ";
                await new Promise(r => setTimeout(r, delay));
                delay *= 2;
            }
        }
    }

    async function processTranslation() {
        const input = document.getElementById('arInput');
        const text = input.value.trim();
        if (!text) return;
        if (!user) { alert("Войдите в систему для сохранения!"); return; }

        document.getElementById('translateLoader').style.display = 'block';
        try {
            const translation = await callGeminiTranslate(text);
            
            // Сохранение в Firebase
            await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('my_translations').add({
                ar: text,
                ru: translation,
                created: Date.now()
            });
            
            input.value = "";
            alert("Фраза сохранена в блокнот!");
        } catch (e) {
            alert("Не удалось сохранить. Проверьте интернет.");
        } finally {
            document.getElementById('translateLoader').style.display = 'none';
        }
    }

    async function removeTranslation(id, e) {
        e.stopPropagation();
        if (confirm("Удалить эту запись?")) {
            await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('my_translations').doc(id).delete();
        }
    }

    // --- ОТРИСОВКА ---
    function handleSearch() {
        renderList(document.getElementById('searchInput').value.toLowerCase().trim());
    }

    function renderList(query = "") {
        const list = document.getElementById('list');
        list.innerHTML = "";
        
        if (activeTab === 'trans') {
            // Режим ПЕРЕВОДЧИКА: Русский сверху
            const sorted = myTranslations.sort((a,b) => b.created - a.created);
            sorted.forEach(item => {
                const el = document.createElement('div');
                el.className = 'word-item mode-translator';
                el.innerHTML = `
                    <div class="word-header" onclick="this.parentElement.classList.toggle('expanded')">
                        <div class="russian">${item.ru}</div>
                        <span class="arabic-hint">${item.ar.substring(0, 15)}...</span>
                    </div>
                    <div class="details">
                        <span class="arabic-main">${item.ar}</span>
                        <div class="btn-row">
                            <button class="btn btn-speak" onclick="speak('${item.ar}', event)">🔊 Слушать</button>
                            <button class="btn btn-delete" onclick="removeTranslation('${item.id}', event)">🗑 Удалить</button>
                        </div>
                    </div>`;
                list.appendChild(el);
            });
            return;
        }

        // Режим СЛОВАРЯ
        const normQuery = query.replace(/[\u064B-\u0652]/g, "").replace(/[أإآ]/g, "ا");
        let filtered = dictionaryData.filter(w => {
            if (activeTab === 'fav' && !favorites.includes(w.ar)) return false;
            if (!query) return activeTab === 'fav';
            const arClean = w.ar.replace(/[\u064B-\u0652]/g, "").replace(/[أإآ]/g, "ا");
            return w.ru.toLowerCase().includes(query) || arClean.includes(normQuery);
        });

        if (query) {
            filtered.sort((a, b) => a.ru.length - b.ru.length);
        }

        filtered.slice(0, 50).forEach(w => {
            const isFav = favorites.includes(w.ar);
            const el = document.createElement('div');
            el.className = 'word-item';
            el.innerHTML = `
                <div class="word-header" onclick="this.parentElement.classList.toggle('expanded')">
                    <div class="russian">${w.short_ru || w.ru.split(';')[0]}</div>
                    <div class="arabic">${w.ar}</div>
                </div>
                <div class="details">
                    <div style="white-space: pre-wrap; margin-bottom:12px;">${w.ru}</div>
                    <div class="btn-row">
                        <button class="btn btn-speak" onclick="speak('${w.ar}', event)">🔊 Слушать</button>
                        <button class="btn btn-fav ${isFav ? 'active' : ''}" onclick="toggleFavorite('${w.ar}', this, event)">
                            ${isFav ? '★ Избранное' : '☆ В избранное'}
                        </button>
                    </div>
                </div>`;
            list.appendChild(el);
        });
    }

    function setTab(t) {
        activeTab = t;
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
        
        document.getElementById('searchSection').style.display = t === 'trans' ? 'none' : 'block';
        document.getElementById('translatorSection').style.display = t === 'trans' ? 'block' : 'none';
        
        renderList();
    }

    async function toggleFavorite(ar, btn, e) {
        e.stopPropagation();
        if (favorites.includes(ar)) favorites = favorites.filter(v => v !== ar);
        else favorites.push(ar);
        
        localStorage.setItem('arabus_favs', JSON.stringify(favorites));
        btn.classList.toggle('active');
        btn.innerText = favorites.includes(ar) ? '★ Избранное' : '☆ В избранное';
        
        if (user) {
            await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('data').doc('favorites').set({ list: favorites });
        }
        if (activeTab === 'fav') renderList();
    }

    function speak(text, e) {
        e.stopPropagation();
        window.speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance(text);
        utt.lang = 'ar-SA';
        window.speechSynthesis.speak(utt);
    }

    async function toggleAuth() {
        if (user) auth.signOut();
        else await auth.signInWithPopup(provider);
    }

    window.onload = () => { setTab('dict'); };
</script>
</body>
</html>
