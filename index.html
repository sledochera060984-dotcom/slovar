
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#27ae60">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2907/2907253.png">
    
    <title>Arabus Pro</title>
    
    <!-- Firebase Libraries (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --main-color: #27ae60; --bg-color: #f4f4f9; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: env(safe-area-inset-top) 10px 10px 10px; 
            -webkit-tap-highlight-color: transparent;
        }
        .container { background: white; padding: 15px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 600px; margin: 0 auto; }
        
        .status-box { text-align: center; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 13px; font-weight: 600; line-height: 1.4; }
        .status-ok { background: #e8f8f5; color: #1e8449; border: 1px solid #a3e4d7; }
        .status-warn { background: #fef9e7; color: #9c640c; border: 1px solid #f7dc6f; }
        
        .google-btn { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 15px; font-weight: bold; color: #444; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .tabs { display: flex; margin-bottom: 15px; border-radius: 10px; overflow: hidden; border: 1px solid var(--main-color); background: white; }
        .tab { flex: 1; padding: 12px 5px; text-align: center; background: white; color: var(--main-color); border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
        .tab.active { background: var(--main-color); color: white; }
        
        /* Поля ввода */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        textarea, input[type="text"] { 
            width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; 
            font-size: 16px; box-sizing: border-box; outline: none; font-family: inherit;
        }
        textarea { height: 100px; resize: none; }
        
        /* Список слов */
        .word-list { list-style: none; padding: 0; margin: 0; }
        .word-item { border-bottom: 1px solid #f0f0f0; padding: 14px 0; }
        .word-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .arabic { font-size: 24px; font-weight: bold; color: var(--main-color); direction: rtl; }
        .russian { font-size: 16px; color: #333; flex: 1; padding-right: 15px; }
        
        /* Стиль для личных переводов (Русский сверху) */
        .custom-item .russian { font-weight: bold; color: #333; font-size: 18px; }
        .custom-item .arabic { font-size: 18px; color: #666; font-weight: normal; }
        .expanded.custom-item .arabic { font-size: 26px; color: var(--main-color); font-weight: bold; }
        
        .details { display: none; padding-top: 15px; font-size: 15px; color: #444; line-height: 1.6; border-top: 1px dashed #eee; margin-top: 12px; }
        .expanded .details { display: block; }
        
        .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .btn { 
            flex: 1; min-width: 80px; padding: 12px 8px; border-radius: 10px; border: 1px solid #ddd; 
            background: #fdfdfd; cursor: pointer; font-size: 13px; font-weight: bold; color: #555; 
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-main { background: var(--main-color); color: white; border: none; }
        .btn-speak { color: #2980b9; border-color: #a9cce3; background: #ebf5fb; }
        .btn-fav.active { background: #fff9e6; border-color: #f1c40f; color: #d35400; }
        .delete-btn { color: #e74c3c; border-color: #fadbd8; background: #fdf2f2; }

        .loading-spinner { display: none; text-align: center; padding: 10px; color: var(--main-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="statusBox" class="status-box status-warn">⏳ Загрузка Arabus Pro...</div>
    
    <button id="authBtn" class="google-btn" onclick="toggleAuth()">🌐 Войти через Google</button>

    <div class="tabs">
        <button id="tabAll" class="tab active" onclick="setTab('all')">Словарь</button>
        <button id="tabFav" class="tab" onclick="setTab('fav')">Избранное</button>
        <button id="tabTranslate" class="tab" onclick="setTab('translate')">Переводчик</button>
    </div>

    <!-- Вкладки Словарь и Избранное -->
    <div id="searchSection">
        <input type="text" id="searchInput" placeholder="Поиск (араб / рус / корень)..." oninput="filterWords()" autocomplete="off">
    </div>

    <!-- Вкладка Переводчик -->
    <div id="translateSection" style="display:none;">
        <div class="input-group">
            <textarea id="arInput" placeholder="Вставьте арабский текст здесь..."></textarea>
            <div id="translateLoading" class="loading-spinner">✨ ИИ переводит...</div>
            <button class="btn btn-main" onclick="handleTranslate()">Перевести и сохранить</button>
        </div>
    </div>
    
    <div id="list" class="word-list"></div>
</div>

<script src="base.js?v=5000"></script>

<script>
    const apiKey = ""; // Ключ предоставляется средой
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'arabus-pro';
    
    let data = (typeof dictBase !== 'undefined') ? dictBase : [];
    let currentUser = null;
    let savedFavorites = JSON.parse(localStorage.getItem('arabus_favs')) || [];
    let customTranslations = []; 
    let currentTab = 'all';

    const firebaseConfig = {
      apiKey: "AIzaSyDDwIWq8VCk-ivjjCJJZoio-wGD2gU1rtE",
      authDomain: "arabus-dict-96c12.firebaseapp.com",
      projectId: "arabus-dict-96c12",
      storageBucket: "arabus-dict-96c12.firebasestorage.app",
      messagingSenderId: "814248156149",
      appId: "1:814248156149:web:e2acce197a00eb3ceb5ebc"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    // Авторизация
    auth.onAuthStateChanged(async (user) => {
        currentUser = user;
        const authBtn = document.getElementById('authBtn');
        if (user) {
            authBtn.innerText = `Выйти (${user.displayName || user.email.split('@')[0]})`;
            updateStatus(`✅ Синхронизация: ${user.email}`, 'status-ok');
            loadCloudData();
        } else {
            authBtn.innerText = "🌐 Войти через Google";
            updateStatusDefault();
        }
    });

    async function loadCloudData() {
        if (!currentUser) return;
        
        // Загрузка Избранного
        const favDoc = await db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('settings').doc('favorites').get();
        if (favDoc.exists) {
            savedFavorites = favDoc.data().list || [];
            localStorage.setItem('arabus_favs', JSON.stringify(savedFavorites));
        }

        // Загрузка Личных Переводов (Rule 2: Fetch all)
        db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('translations')
          .onSnapshot(snapshot => {
            customTranslations = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            if (currentTab === 'translate') renderList();
          });
          
        filterWords();
    }

    function updateStatus(text, className) {
        const box = document.getElementById('statusBox');
        box.className = `status-box ${className}`;
        box.innerText = text;
    }

    function updateStatusDefault() {
        updateStatus(`✅ База: ${data.length} слов`, "status-ok");
    }

    function normalize(text) { 
        return text ? text.toLowerCase().replace(/[\u064B-\u0652]/g, "").replace(/[أإآ]/g, "ا").replace(/ة/g, "ه").replace(/ى/g, "ي").trim() : ""; 
    }

    // --- ЛОГИКА ПЕРЕВОДА ЧЕРЕЗ GEMINI ---
    async function translateText(text) {
        const prompt = `Переведи этот арабский текст на русский язык. Дай только перевод, без лишних слов: "${text}"`;
        let retries = 5;
        let delay = 1000;

        for (let i = 0; i < retries; i++) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "Ошибка перевода";
            } catch (e) {
                if (i === retries - 1) throw e;
                await new Promise(r => setTimeout(r, delay));
                delay *= 2;
            }
        }
    }

    async function handleTranslate() {
        const arText = document.getElementById('arInput').value.trim();
        if (!arText) return;
        if (!currentUser) { alert("Войдите в аккаунт, чтобы сохранять переводы!"); return; }

        document.getElementById('translateLoading').style.display = 'block';
        try {
            const ruText = await translateText(arText);
            
            // Сохранение в Firestore (Rule 1: Path)
            await db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('translations').add({
                ar: arText,
                ru: ruText,
                timestamp: Date.now()
            });
            
            document.getElementById('arInput').value = "";
            alert("Сохранено!");
        } catch (e) {
            alert("Сбой сети. Попробуйте еще раз.");
        } finally {
            document.getElementById('translateLoading').style.display = 'none';
        }
    }

    async function deleteTranslation(id, event) {
        event.stopPropagation();
        if (!confirm("Удалить этот перевод?")) return;
        await db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('translations').doc(id).delete();
    }

    // --- ОТРИСОВКА СПИСКОВ ---
    function filterWords() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        renderList(query);
    }

    function renderList(query = "") {
        const list = document.getElementById('list');
        list.innerHTML = "";
        const normQuery = normalize(query);

        let items = [];

        if (currentTab === 'translate') {
            // Показываем личные переводы (Русский сверху)
            items = customTranslations.sort((a,b) => b.timestamp - a.timestamp);
            items.forEach(w => {
                const item = document.createElement('div');
                item.className = 'word-item custom-item';
                item.innerHTML = `
                    <div class="word-header" onclick="this.parentElement.classList.toggle('expanded')">
                        <div class="russian">${w.ru}</div>
                        <div class="arabic">${w.ar.substring(0, 20)}...</div>
                    </div>
                    <div class="details">
                        <div class="arabic" style="margin-bottom:15px;">${w.ar}</div>
                        <div class="btn-row">
                            <button class="btn btn-speak" onclick="speakWord('${w.ar}', event)">🔊 Слушать</button>
                            <button class="btn delete-btn" onclick="deleteTranslation('${w.id}', event)">🗑 Удалить</button>
                        </div>
                    </div>`;
                list.appendChild(item);
            });
            return;
        }

        // Обычный словарь
        let filtered = data.filter(w => {
            if (currentTab === 'fav' && !savedFavorites.includes(w.ar)) return false;
            if (!query) return currentTab === 'fav';
            return w.ru.toLowerCase().includes(query) || normalize(w.ar).includes(normQuery);
        });

        if (query) {
            filtered.sort((a, b) => {
                if (normalize(a.ar) === normQuery) return -1;
                if (a.ru.toLowerCase().startsWith(query)) return -1;
                return a.ru.length - b.ru.length;
            });
        }

        filtered.slice(0, 50).forEach(w => {
            const isFav = savedFavorites.includes(w.ar);
            const item = document.createElement('div');
            item.className = 'word-item';
            item.innerHTML = `
                <div class="word-header" onclick="this.parentElement.classList.toggle('expanded')">
                    <div class="russian">${w.short_ru || w.ru.split(';')[0]}</div>
                    <div class="arabic">${w.ar}</div>
                </div>
                <div class="details">
                    <div style="white-space: pre-wrap; margin-bottom:12px;">${w.ru}</div>
                    <div class="btn-row">
                        <button class="btn btn-speak" onclick="speakWord('${w.ar}', event)">🔊 Слушать</button>
                        <button class="btn btn-fav ${isFav ? 'active' : ''}" onclick="toggleFav('${w.ar}', this, event)">
                            ${isFav ? '★ В избранном' : '☆ В избранное'}
                        </button>
                    </div>
                </div>`;
            list.appendChild(item);
        });
    }

    function setTab(t) { 
        currentTab = t; 
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('searchSection').style.display = t === 'translate' ? 'none' : 'block';
        document.getElementById('translateSection').style.display = t === 'translate' ? 'block' : 'none';
        
        renderList(); 
    }

    async function toggleFav(word, btn, event) {
        event.stopPropagation();
        if (savedFavorites.includes(word)) savedFavorites = savedFavorites.filter(v => v !== word);
        else savedFavorites.push(word);
        
        localStorage.setItem('arabus_favs', JSON.stringify(savedFavorites));
        btn.classList.toggle('active');
        btn.innerText = savedFavorites.includes(word) ? '★ В избранном' : '☆ В избранное';
        
        if (currentUser) {
            await db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('settings').doc('favorites').set({ list: savedFavorites });
        }
        if (currentTab === 'fav') renderList();
    }

    function speakWord(text, event) {
        event.stopPropagation();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ar-SA';
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
    }

    async function toggleAuth() {
        if (currentUser) auth.signOut();
        else await auth.signInWithPopup(provider);
    }

    window.onload = () => { renderList(); };
</script>
</body>
</html>
