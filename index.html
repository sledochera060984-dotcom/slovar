
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#27ae60">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2907/2907253.png">
    
    <title>Arabus Pro</title>
    
    <!-- Firebase Libraries (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --main-color: #27ae60; --bg-color: #f4f4f9; --text-color: #2c3e50; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: env(safe-area-inset-top) 10px 10px 10px; 
            -webkit-tap-highlight-color: transparent;
            color: var(--text-color);
        }
        .container { background: white; padding: 15px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 600px; margin: 0 auto; }
        
        /* Авторизация и статусы */
        .header-status { text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; font-weight: bold; border: 1px solid #ddd; }
        .status-ok { background: #e8f8f5; color: #1e8449; border-color: #a3e4d7; }
        .google-btn { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 15px; font-weight: bold; color: #444; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* Вкладки */
        .tabs { display: flex; margin-bottom: 15px; border-radius: 10px; overflow: hidden; border: 1px solid var(--main-color); background: white; }
        .tab { flex: 1; padding: 12px 5px; text-align: center; background: white; color: var(--main-color); border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
        .tab.active { background: var(--main-color); color: white; }
        
        /* Инпуты */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        textarea, input[type="text"] { 
            width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; 
            font-size: 16px; box-sizing: border-box; outline: none; font-family: inherit;
        }
        textarea { height: 100px; resize: none; border-color: #d5dbdb; }
        
        /* Предпросмотр перевода */
        #translationPreview { 
            display: none; background: #fdfefe; border: 2px dashed var(--main-color); 
            padding: 15px; border-radius: 12px; margin-bottom: 20px; animation: fadeIn 0.3s ease;
        }
        .preview-label { font-size: 11px; color: var(--main-color); text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .preview-text { font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #333; }
        
        /* Список элементов */
        .word-list { list-style: none; padding: 0; margin: 0; }
        .word-item { border-bottom: 1px solid #f0f0f0; padding: 14px 0; }
        .word-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        /* Универсальные стили текста */
        .arabic { font-size: 24px; font-weight: bold; color: var(--main-color); direction: rtl; }
        .russian { font-size: 16px; color: #333; flex: 1; padding-right: 15px; }
        
        /* Стили для сохраненных переводов (Русский сверху) */
        .saved-trans .russian { font-weight: bold; font-size: 18px; color: #2c3e50; display: block; margin-bottom: 4px; }
        .saved-trans .arabic-hint { color: #bdc3c7; font-size: 14px; direction: rtl; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* Детали при клике */
        .details { display: none; padding-top: 15px; border-top: 1px dashed #eee; margin-top: 12px; }
        .expanded .details { display: block; }
        .expanded .arabic-full { font-size: 28px; font-weight: bold; color: var(--main-color); direction: rtl; display: block; margin-bottom: 15px; line-height: 1.4; }
        
        /* Кнопки */
        .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .btn { 
            flex: 1; min-width: 80px; padding: 12px 8px; border-radius: 10px; border: 1px solid #ddd; 
            background: #fdfdfd; cursor: pointer; font-size: 13px; font-weight: bold; color: #555; 
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-primary { background: var(--main-color); color: white; border: none; }
        .btn-speak { color: #2980b9; border-color: #a9cce3; background: #ebf5fb; }
        .btn-fav.active { background: #fff9e6; border-color: #f1c40f; color: #d35400; }
        .btn-delete { color: #e74c3c; border-color: #fadbd8; background: #fdf2f2; }

        .loader { display: none; text-align: center; padding: 10px; color: var(--main-color); font-weight: bold; font-size: 14px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div id="statusBox" class="header-status status-ok">Загрузка...</div>
    
    <button id="authBtn" class="google-btn" onclick="toggleAuth()">🌐 Войти через Google</button>

    <div class="tabs">
        <button id="tabDict" class="tab active" onclick="setTab('dict')">📚 Словарь</button>
        <button id="tabFav" class="tab" onclick="setTab('fav')">⭐ Избранное</button>
        <button id="tabTrans" class="tab" onclick="setTab('trans')">📝 Переводчик</button>
    </div>

    <!-- Словарь и Избранное -->
    <div id="searchSection">
        <input type="text" id="searchInput" placeholder="Поиск (араб / рус / корень)..." oninput="handleSearch()" autocomplete="off">
    </div>

    <!-- Переводчик -->
    <div id="translatorSection" style="display:none;">
        <div class="input-group">
            <textarea id="arInput" placeholder="Вставьте арабский текст для перевода..."></textarea>
            <div id="translateLoader" class="loader">✨ ИИ подбирает перевод...</div>
            <button class="btn btn-primary" id="btnTranslate" onclick="requestTranslation()">Перевести</button>
        </div>

        <!-- Окно предпросмотра (появляется после перевода) -->
        <div id="translationPreview">
            <div class="preview-label">Результат перевода:</div>
            <div id="previewResult" class="preview-text"></div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="saveTranslation()">💾 Сохранить в блокнот</button>
                <button class="btn" onclick="clearPreview()">Отмена</button>
            </div>
        </div>

        <div style="font-size: 12px; color: #888; margin-bottom: 10px; font-weight: bold;">Ваши записи (Русский -> Арабский):</div>
    </div>
    
    <div id="list" class="word-list"></div>
</div>

<script src="base.js?v=7000"></script>

<script>
    const apiKey = ""; // Ключ API предоставляется средой
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'arabus-pro-final';
    
    let dictionaryData = (typeof dictBase !== 'undefined') ? dictBase : [];
    let user = null;
    let favorites = JSON.parse(localStorage.getItem('arabus_favs')) || [];
    let myTranslations = []; 
    let activeTab = 'dict';
    let currentPreview = null;

    // Firebase Init
    const firebaseConfig = {
      apiKey: "AIzaSyDDwIWq8VCk-ivjjCJJZoio-wGD2gU1rtE",
      authDomain: "arabus-dict-96c12.firebaseapp.com",
      projectId: "arabus-dict-96c12",
      storageBucket: "arabus-dict-96c12.firebasestorage.app",
      messagingSenderId: "814248156149",
      appId: "1:814248156149:web:e2acce197a00eb3ceb5ebc"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const provider = new firebase.auth.GoogleAuthProvider();

    // Мониторинг входа
    auth.onAuthStateChanged(async (u) => {
        user = u;
        const btn = document.getElementById('authBtn');
        if (user) {
            btn.innerText = `Выйти (${user.displayName.split(' ')[0]})`;
            document.getElementById('statusBox').innerText = `✅ Синхронизация: ${user.email}`;
            startSync();
        } else {
            btn.innerText = "🌐 Войти через Google";
            document.getElementById('statusBox').innerText = `📚 База: ${dictionaryData.length} слов`;
        }
    });

    async function startSync() {
        if (!user) return;
        
        // Синхронизация избранного
        const favRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('data').doc('favorites');
        const favSnap = await favRef.get();
        if (favSnap.exists) {
            favorites = favSnap.data().list || [];
            localStorage.setItem('arabus_favs', JSON.stringify(favorites));
        }

        // Подписка на личные фразы
        db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('my_translations')
          .onSnapshot(snap => {
              myTranslations = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              if (activeTab === 'trans' || activeTab === 'fav') renderList();
          }, err => console.log("Firestore error:", err));
          
        renderList();
    }

    // --- ЛОГИКА ПЕРЕВОДА (GEMINI) ---
    async function requestTranslation() {
        const input = document.getElementById('arInput').value.trim();
        if (!input) return;

        const loader = document.getElementById('translateLoader');
        const btn = document.getElementById('btnTranslate');
        const preview = document.getElementById('translationPreview');

        loader.style.display = 'block';
        btn.disabled = true;
        preview.style.display = 'none';

        try {
            const prompt = `Translate this Arabic text to Russian language accurately and naturally. Provide ONLY the translated text without any explanations or extra characters: "${input}"`;
            
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const result = await response.json();
            const translatedText = result.candidates?.[0]?.content?.parts?.[0]?.text?.trim();

            if (translatedText) {
                currentPreview = { ar: input, ru: translatedText };
                document.getElementById('previewResult').innerText = translatedText;
                preview.style.display = 'block';
            } else {
                alert("Не удалось получить перевод. Попробуйте другую фразу.");
            }
        } catch (e) {
            alert("Ошибка сети. Попробуйте еще раз.");
        } finally {
            loader.style.display = 'none';
            btn.disabled = false;
        }
    }

    async function saveTranslation() {
        if (!user) { alert("Войдите через Google, чтобы сохранять фразы в облако!"); return; }
        if (!currentPreview) return;

        try {
            await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('my_translations').add({
                ar: currentPreview.ar,
                ru: currentPreview.ru,
                created: Date.now()
            });
            clearPreview();
            document.getElementById('arInput').value = "";
        } catch (e) {
            alert("Ошибка сохранения.");
        }
    }

    function clearPreview() {
        document.getElementById('translationPreview').style.display = 'none';
        currentPreview = null;
    }

    async function deleteItem(id, e) {
        e.stopPropagation();
        if (confirm("Удалить этот перевод навсегда?")) {
            await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('my_translations').doc(id).delete();
        }
    }

    // --- ОТРИСОВКА СПИСКА ---
    function handleSearch() {
        renderList(document.getElementById('searchInput').value.toLowerCase().trim());
    }

    function renderList(query = "") {
        const list = document.getElementById('list');
        list.innerHTML = "";
        
        if (activeTab === 'trans') {
            // ОТОБРАЖЕНИЕ ПЕРЕВОДЧИКА: РУССКИЙ СВЕРХУ
            const sorted = myTranslations.sort((a,b) => b.created - a.created);
            sorted.forEach(item => {
                const el = document.createElement('div');
                el.className = 'word-item saved-trans';
                el.innerHTML = `
                    <div class="word-header" onclick="this.parentElement.classList.toggle('expanded')">
                        <div class="russian">${item.ru}</div>
                        <div class="arabic-hint">${item.ar}</div>
                    </div>
                    <div class="details">
                        <span class="arabic-full">${item.ar}</span>
                        <div class="btn-row">
                            <button class="btn btn-speak" onclick="speak('${item.ar}', event)">🔊 Слушать</button>
                            <button class="btn btn-delete" onclick="deleteItem('${item.id}', event)">🗑 Удалить</button>
                        </div>
                    </div>`;
                list.appendChild(el);
            });
            return;
        }

        // ОТОБРАЖЕНИЕ СЛОВАРЯ И ИЗБРАННОГО
        const normQuery = query.replace(/[\u064B-\u0652]/g, "").replace(/[أإآ]/g, "ا");
        let filtered = dictionaryData.filter(w => {
            if (activeTab === 'fav' && !favorites.includes(w.ar)) return false;
            if (!query) return activeTab === 'fav';
            const arClean = w.ar.replace(/[\u064B-\u0652]/g, "").replace(/[أإآ]/g, "ا");
            return w.ru.toLowerCase().includes(query) || arClean.includes(normQuery);
        });

        if (query) filtered.sort((a, b) => a.ru.length - b.ru.length);

        filtered.slice(0, 50).forEach(w => {
            const isFav = favorites.includes(w.ar);
            const el = document.createElement('div');
            el.className = 'word-item';
            el.innerHTML = `
                <div class="word-header" onclick="this.parentElement.classList.toggle('expanded')">
                    <div class="russian">${w.short_ru || w.ru.split(';')[0]}</div>
                    <div class="arabic">${w.ar}</div>
                </div>
                <div class="details">
                    <div style="white-space: pre-wrap; margin-bottom:12px;">${w.ru}</div>
                    <div class="btn-row">
                        <button class="btn btn-speak" onclick="speak('${w.ar}', event)">🔊 Слушать</button>
                        <button class="btn btn-fav ${isFav ? 'active' : ''}" onclick="toggleFavorite('${w.ar}', this, event)">
                            ${isFav ? '★ Избранное' : '☆ В избранное'}
                        </button>
                    </div>
                </div>`;
            list.appendChild(el);
        });
    }

    function setTab(t) {
        activeTab = t;
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        const tabMap = { dict: 'tabDict', fav: 'tabFav', trans: 'tabTrans' };
        document.getElementById(tabMap[t]).classList.add('active');
        
        document.getElementById('searchSection').style.display = t === 'trans' ? 'none' : 'block';
        document.getElementById('translatorSection').style.display = t === 'trans' ? 'block' : 'none';
        
        renderList();
    }

    async function toggleFavorite(ar, btn, e) {
        e.stopPropagation();
        if (favorites.includes(ar)) favorites = favorites.filter(v => v !== ar);
        else favorites.push(ar);
        
        localStorage.setItem('arabus_favs', JSON.stringify(favorites));
        btn.classList.toggle('active');
        btn.innerText = favorites.includes(ar) ? '★ Избранное' : '☆ В избранное';
        
        if (user) {
            await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('data').doc('favorites').set({ list: favorites });
        }
        if (activeTab === 'fav') renderList();
    }

    function speak(text, e) {
        e.stopPropagation();
        window.speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance(text);
        utt.lang = 'ar-SA';
        window.speechSynthesis.speak(utt);
    }

    async function toggleAuth() {
        if (user) auth.signOut();
        else await auth.signInWithPopup(provider);
    }

    window.onload = () => { renderList(); };
</script>
</body>
</html>
